<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:," />
<title>课间枪战 · FFA</title>
<!--
  ============================================================================
  课间枪战 · 第一人称多人 FFA 枪战 (纯静态)
  ============================================================================
  - 纯静态：无服务端、无构建步骤。所有第三方库已 vendor 到 ./vendor，
    用普通 <script src> 引入，运行时零外部 CDN 依赖（绝不使用 importmap / esm.sh）。
  - Three.js 用 r137 的 UMD 全局构建（暴露 window.THREE）。
  - 第一人称控制（指针锁定 / 鼠标视角 / 移动）全部手写，不依赖 PointerLockControls。
  - 联机：PeerJS（vendor 到本地），信令走其公共 broker（这部分需要联网，属正常）。

  【WebRTC / NAT 说明】
  PeerJS 默认使用其公共 broker 做信令，并配了 Google/Twilio 的 STUN。
  在大多数家庭 / 校园网络里 WebRTC 可以直连。但 WebRTC 受 NAT 穿透限制：
  在某些对称型 NAT / 严格防火墙下两端可能连不上。若出现连不上的情况，可以：
    1) 改用自建 PeerServer 做信令（npm i -g peer; peerjs --port 9000），
       然后给下面的 PEER_OPTS 增加 { host, port, path } 指向你的 PeerServer；
    2) 并/或在 iceServers 里加入一个 TURN 服务器做中继（穿透失败时兜底）。
  当前版本用公共 broker 即可满足"同学之间填同一个房间号联机"的需求。
  ============================================================================
-->
<style>
  :root{
    --bg:#0b0f14; --panel:rgba(16,22,30,.92); --line:#1e2a37;
    --text:#e8eef5; --muted:#8fa3b8; --accent:#36c6ff; --accent2:#ffd24a;
    --good:#46d17a; --bad:#ff5a5a; --warn:#ffb454;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif;
    overflow:hidden; }
  #game{ position:fixed; inset:0; }
  #game canvas{ display:block; width:100%; height:100%; }

  /* ---- 通用面板 ---- */
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:12px;
    box-shadow:0 10px 40px rgba(0,0,0,.45); }

  /* ---- 加载/库错误横幅 ---- */
  #loaderr{ position:fixed; top:0; left:0; right:0; z-index:50; padding:14px 18px;
    background:#3a0d0d; color:#ffdede; border-bottom:2px solid var(--bad);
    font-size:14px; line-height:1.5; }
  #loaderr b{ color:#fff; }

  /* ---- 主菜单 ---- */
  #menu{ position:fixed; inset:0; z-index:40; display:flex; align-items:center;
    justify-content:center; backdrop-filter:blur(2px);
    background:radial-gradient(1200px 700px at 50% 30%, rgba(20,30,42,.35), rgba(6,9,13,.78)); }
  #menu .card{ width:min(440px,92vw); padding:26px 26px 22px; }
  #menu h1{ margin:0 0 2px; font-size:26px; letter-spacing:.5px; }
  #menu .sub{ color:var(--muted); font-size:13px; margin-bottom:18px; }
  #menu label{ display:block; font-size:12px; color:var(--muted); margin:12px 0 6px; }
  #menu input{ width:100%; padding:11px 12px; font-size:15px; border-radius:9px;
    border:1px solid var(--line); background:#0e151d; color:var(--text); }
  #menu input:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent); }
  #joinBtn{ margin-top:18px; width:100%; padding:12px 14px; font-size:16px; font-weight:600;
    color:#04222e; background:linear-gradient(180deg,#5fd6ff,#22b6f0); border:0; border-radius:10px;
    cursor:pointer; }
  #joinBtn:hover{ filter:brightness(1.06); }
  #joinBtn:focus-visible{ outline:2px solid #fff; outline-offset:2px; }
  #joinBtn:disabled{ filter:grayscale(.6) brightness(.8); cursor:not-allowed; }
  /* 创建/加入房间 UI */
  .bigbtn{ flex:1; padding:12px 14px; font-size:16px; font-weight:600; color:#04222e;
    background:linear-gradient(180deg,#5fd6ff,#22b6f0); border:0; border-radius:10px; cursor:pointer; }
  .bigbtn:hover{ filter:brightness(1.07); }
  .bigbtn.ghost{ color:var(--text); background:#162230; border:1px solid var(--line); }
  .row2{ display:flex; gap:10px; margin-top:14px; }
  #menu label{ display:block; margin-top:14px; margin-bottom:6px; font-size:13px; color:var(--muted); }
  .seg{ display:flex; flex-wrap:wrap; gap:8px; }
  .seg button{ flex:1 1 46%; padding:9px 10px; text-align:left; border-radius:9px; cursor:pointer;
    border:1px solid var(--line); background:#0e151d; color:var(--text); font-size:13px; line-height:1.25; }
  .seg button small{ display:block; color:var(--muted); font-size:11px; margin-top:2px; }
  .seg button:hover{ border-color:var(--accent); }
  .seg button.sel{ border-color:var(--accent2); background:rgba(255,210,74,.14); color:#ffe08a; }
  .seg button.sel small{ color:#d9c277; }
  .codebox{ margin-top:14px; padding:12px; border:1px dashed var(--accent2); border-radius:10px; text-align:center;
    font-size:14px; color:var(--muted); }
  .codebox span{ display:block; font-size:34px; font-weight:800; letter-spacing:6px; color:#ffe08a; font-family:ui-monospace,monospace; }
  .codebox small{ display:block; margin-top:4px; font-size:11px; }
  .libstatus{ margin-top:16px; font-size:12px; color:var(--muted); display:flex; gap:14px; flex-wrap:wrap; }
  .libstatus span{ display:inline-flex; align-items:center; gap:6px; }
  .dot{ width:9px; height:9px; border-radius:50%; background:var(--muted); }
  .dot.ok{ background:var(--good); } .dot.no{ background:var(--bad); }
  .hint{ margin-top:14px; font-size:11.5px; color:#6f8194; line-height:1.6; }
  kbd{ background:#0e151d; border:1px solid var(--line); border-bottom-width:2px; border-radius:5px;
    padding:1px 6px; font-size:11px; color:#cdd9e6; }

  /* ---- HUD ---- */
  #hud{ position:fixed; inset:0; z-index:20; pointer-events:none; font-variant-numeric:tabular-nums; }
  #hud[hidden]{ display:none; }
  /* 准星 */
  #crosshair{ position:absolute; left:50%; top:50%; width:24px; height:24px;
    transform:translate(-50%,-50%); }
  #crosshair::before,#crosshair::after{ content:""; position:absolute; background:#eafaff;
    box-shadow:0 0 2px rgba(0,0,0,.8); }
  #crosshair::before{ left:50%; top:0; width:2px; height:100%; transform:translateX(-50%); }
  #crosshair::after{ top:50%; left:0; height:2px; width:100%; transform:translateY(-50%); }
  #crosshair .dot{ position:absolute; left:50%; top:50%; width:3px; height:3px; border-radius:50%;
    background:#eafaff; transform:translate(-50%,-50%); }
  /* 命中标记 */
  #hitmarker{ position:absolute; left:50%; top:50%; width:26px; height:26px;
    transform:translate(-50%,-50%) rotate(45deg); opacity:0; }
  #hitmarker::before,#hitmarker::after{ content:""; position:absolute; background:#ff5a5a; }
  #hitmarker::before{ left:50%; top:0; width:3px; height:100%; transform:translateX(-50%); }
  #hitmarker::after{ top:50%; left:0; height:3px; width:100%; transform:translateY(-50%); }
  /* 爆头：更大、金色 */
  #hitmarker.head{ width:34px; height:34px; }
  #hitmarker.head::before,#hitmarker.head::after{ background:#ffd24a; }

  /* 顶部中央临时提示（捡到超级武器等） */
  #notice{ position:absolute; left:50%; top:14%; transform:translateX(-50%); opacity:0;
    transition:opacity .25s; font-size:17px; font-weight:700; color:#eafaff; text-align:center;
    text-shadow:0 0 10px rgba(0,0,0,.9); padding:8px 16px; border-radius:10px;
    background:rgba(10,40,52,.55); border:1px solid rgba(102,255,255,.5); }

  /* 狙击镜：中间透明圆=镜片(看到放大后的世界)，外圈黑色=镜身，叠加准星刻线 */
  #scope{ position:absolute; inset:0; z-index:24; pointer-events:none; opacity:0; transition:opacity .1s; }
  #scope .lens{ position:absolute; inset:0; background: radial-gradient(circle at 50% 50%,
      rgba(0,0,0,0) 0, rgba(0,0,0,0) 33vmin, rgba(0,0,0,.35) 33.2vmin,
      rgba(0,0,0,.92) 35vmin, #03060a 36vmin, #03060a 100%); }
  #scope .ring{ position:absolute; left:50%; top:50%; width:70vmin; height:70vmin;
    transform:translate(-50%,-50%); border-radius:50%; border:4px solid #11181f;
    box-shadow: inset 0 0 40px 8px rgba(0,0,0,.85), 0 0 0 2px rgba(120,140,160,.22); }
  #scope .reticle{ position:absolute; left:50%; top:50%; width:66vmin; height:66vmin;
    transform:translate(-50%,-50%); filter:drop-shadow(0 0 1px rgba(255,255,255,.45)); }

  /* 左下：血量 + 武器 */
  #botleft{ position:absolute; left:22px; bottom:20px; min-width:230px; }
  #hpwrap{ height:16px; border-radius:8px; background:#10202a; border:1px solid var(--line); overflow:hidden; }
  #hpbar{ height:100%; width:100%; background:linear-gradient(90deg,#46d17a,#9bee7a); transition:width .12s; }
  #hpnum{ font-size:13px; color:var(--muted); margin-top:5px; }
  #wepname{ font-size:20px; font-weight:700; margin-top:10px; }
  #wepname small{ font-size:12px; color:var(--muted); font-weight:400; }

  /* 右下：弹药 */
  #botright{ position:absolute; right:24px; bottom:18px; text-align:right; }
  #ammo{ font-size:40px; font-weight:800; line-height:1; }
  #ammo .res{ font-size:18px; color:var(--muted); font-weight:500; }
  #reloading{ font-size:13px; color:var(--accent2); margin-top:4px; height:16px; }

  /* 武器槽 */
  #slots{ position:absolute; left:50%; bottom:18px; transform:translateX(-50%); display:flex; gap:8px; }
  .slot{ padding:6px 10px; border-radius:8px; background:rgba(10,16,22,.7); border:1px solid var(--line);
    font-size:12px; color:var(--muted); }
  .slot b{ color:var(--accent); margin-right:5px; }
  .slot.active{ background:rgba(54,198,255,.18); border-color:var(--accent); color:#fff; }
  .slot.super{ background:rgba(102,255,255,.2); border-color:#66ffff; color:#dffefe; }
  .slot.super b{ color:#66ffff; }

  /* 右上：积分板 + killfeed */
  #scorebox{ position:absolute; right:20px; top:16px; width:230px; }
  #scorebox .panel{ padding:8px 10px; }
  #scorebox h3{ margin:0 0 6px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .scrow{ display:flex; justify-content:space-between; font-size:13px; padding:2px 0; }
  .scrow .nm{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:150px; }
  .scrow .kd{ color:var(--muted); }
  .scrow.me .nm{ color:var(--accent2); font-weight:700; }
  #killfeed{ position:absolute; right:20px; top:0; margin-top:8px; text-align:right; }
  #killfeed.below{ position:static; margin-top:8px; }
  .kf{ font-size:13px; margin:3px 0; opacity:1; transition:opacity .5s; }
  .kf .k{ color:var(--accent); font-weight:600; } .kf .v{ color:var(--bad); font-weight:600; }
  .kf .w{ color:var(--muted); }

  /* 网络状态 */
  #netstat{ position:absolute; left:22px; top:16px; font-size:12px; color:var(--muted);
    display:flex; align-items:center; gap:7px; }
  #netstat .dot{ width:9px; height:9px; }
  /* 左上角测试按钮（z-index 高于暂停层，松开鼠标后可点） */
  #testpanel{ position:absolute; left:22px; top:38px; z-index:60; pointer-events:auto; display:flex; gap:6px; }
  #devpanel{ position:absolute; left:22px; top:72px; z-index:60; pointer-events:auto; width:210px;
    background:rgba(10,16,22,.9); border:1px solid var(--accent2); border-radius:9px; padding:9px 10px; }
  #devpanel .dp-t{ font-size:12px; font-weight:700; color:var(--accent2); margin-bottom:7px; }
  #devpanel .dp-row{ display:flex; gap:6px; }
  #devpanel button{ flex:1; padding:6px 4px; font-size:12px; border-radius:7px; cursor:pointer;
    border:1px solid var(--line); background:#0e151d; color:var(--text); }
  #devpanel button:hover{ border-color:var(--accent2); color:#ffe08a; }
  #devpanel .dp-hint{ margin-top:7px; font-size:11px; color:var(--muted); line-height:1.4; }
  #testbtn{ width:26px; height:26px; padding:0; border-radius:7px; border:1px solid var(--line);
    background:rgba(10,16,22,.85); color:#cdd9e6; font-size:14px; cursor:pointer; line-height:1; }
  #testbtn:hover{ border-color:var(--accent); }
  #testbtn.on{ border-color:var(--accent2); background:rgba(255,210,74,.18); }
  #testpw{ width:88px; padding:3px 8px; font-size:12px; border-radius:7px; border:1px solid var(--accent);
    background:#0e151d; color:var(--text); }
  #testpw:focus-visible{ outline:2px solid var(--accent); }

  /* 死亡 / 暂停 大屏提示 */
  .bigmsg{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:8px; text-align:center; pointer-events:none; }
  #deathmsg{ display:none; }
  #deathmsg .t{ font-size:30px; font-weight:800; color:var(--bad); }
  #deathmsg .s{ font-size:16px; color:var(--text); }
  #pausemsg{ display:none; pointer-events:auto; background:rgba(6,9,13,.55); }
  #pausemsg .t{ font-size:26px; font-weight:800; }
  #pausemsg .s{ font-size:14px; color:var(--muted); }
  #pausemsg button{ margin-top:14px; padding:10px 22px; font-size:15px; border-radius:9px; border:0;
    background:var(--accent); color:#04222e; font-weight:700; cursor:pointer; }

  /* 全屏积分板 (Tab) */
  #fullboard{ position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(6,9,13,.6); }
  #fullboard .panel{ width:min(560px,92vw); padding:18px 20px; }
  #fullboard h2{ margin:0 0 12px; font-size:18px; }
  #fullboard table{ width:100%; border-collapse:collapse; font-size:14px; }
  #fullboard th{ text-align:left; color:var(--muted); font-size:11px; text-transform:uppercase;
    border-bottom:1px solid var(--line); padding:6px 4px; }
  #fullboard td{ padding:7px 4px; border-bottom:1px solid rgba(30,42,55,.5); }
  #fullboard tr.me td{ color:var(--accent2); font-weight:700; }

  /* 受伤红屏 */
  #dmgflash{ position:absolute; inset:0; background:radial-gradient(circle at 50% 60%, rgba(255,0,0,0), rgba(180,0,0,.55));
    opacity:0; pointer-events:none; transition:opacity .12s; }
  /* 处于激光范围内：屏幕渐亮（不是纯白挡视线） */
  #beamflash{ position:absolute; inset:0; pointer-events:none; opacity:0;
    background:radial-gradient(circle at 50% 50%, rgba(255,255,255,.95), rgba(220,235,255,.4)); mix-blend-mode:screen; }
  /* 崩星咆哮炮蓄力：力量汇聚的压暗角(只压边缘，中心清楚，不糊持枪者) */
  #chargevig{ position:absolute; inset:0; pointer-events:none; opacity:0;
    background:radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 30%, rgba(40,0,40,.5) 70%, rgba(10,0,16,.92) 100%); }
  /* 机甲座舱 HUD + 滤镜（穿上机甲时） */
  #mechhud{ position:absolute; inset:0; pointer-events:none; --mhc:255,154,60; }
  #mechhud.god{ --mhc:255,60,120; }
  #mechhud::before{ content:''; position:absolute; inset:0; box-shadow:inset 0 0 240px rgba(var(--mhc),.30); }
  #mechhud::after{ content:''; position:absolute; inset:0; opacity:.5;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 3px, rgba(var(--mhc),.05) 4px, rgba(0,0,0,0) 5px); }
  .mh-corner{ position:absolute; width:78px; height:78px; border:3px solid rgba(var(--mhc),.85); box-shadow:0 0 14px rgba(var(--mhc),.5); }
  .mh-corner.tl{ top:16px; left:16px; border-right:0; border-bottom:0; }
  .mh-corner.tr{ top:16px; right:16px; border-left:0; border-bottom:0; }
  .mh-corner.bl{ bottom:16px; left:16px; border-right:0; border-top:0; }
  .mh-corner.br{ bottom:16px; right:16px; border-left:0; border-top:0; }
  .mh-ring{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:360px; height:360px; max-width:48vw; max-height:48vw;
    border:2px solid rgba(var(--mhc),.45); border-radius:50%; }
  .mh-ring.inner{ width:170px; height:170px; border-style:dashed; opacity:.6; }
  .mh-tag{ position:absolute; top:18px; left:50%; transform:translateX(-50%); color:rgba(var(--mhc),.95);
    font-size:12px; font-weight:800; letter-spacing:3px; text-shadow:0 0 10px rgba(var(--mhc),.7); }

  @media (prefers-reduced-motion: reduce){
    #hpbar{ transition:none; } .kf{ transition:none; } #dmgflash{ transition:none; } #notice{ transition:none; }
    #scope{ transition:none; }
  }
</style>
</head>
<body>
  <div id="game"></div>

  <!-- 库加载失败横幅（默认隐藏；存在性检查失败时显示，并指明是哪一个库） -->
  <div id="loaderr" hidden></div>

  <!-- HUD -->
  <div id="hud" hidden aria-hidden="true">
    <div id="crosshair"><span class="dot"></span></div>
    <div id="hitmarker"></div>
    <div id="notice"></div>

    <!-- 狙击镜：开镜时显示。中间圆形镜片(透出放大后的世界) + 周围黑色镜身 + 准星刻线 -->
    <div id="scope">
      <div class="lens"></div>
      <div class="ring"></div>
      <svg class="reticle" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <g stroke="#0a0a0a" stroke-width="1.1" fill="none">
          <line x1="100" y1="6"   x2="100" y2="86"/>
          <line x1="100" y1="114" x2="100" y2="194"/>
          <line x1="6"   y1="100" x2="86"  y2="100"/>
          <line x1="114" y1="100" x2="194" y2="100"/>
          <!-- 密位刻度 -->
          <line x1="120" y1="98" x2="120" y2="102"/><line x1="140" y1="97" x2="140" y2="103"/>
          <line x1="160" y1="96" x2="160" y2="104"/>
          <line x1="80"  y1="98" x2="80"  y2="102"/><line x1="60"  y1="97" x2="60"  y2="103"/>
          <line x1="40"  y1="96" x2="40"  y2="104"/>
          <line x1="98" y1="120" x2="102" y2="120"/><line x1="97" y1="140" x2="103" y2="140"/>
          <line x1="98" y1="80"  x2="102" y2="80"/> <line x1="97" y1="60"  x2="103" y2="60"/>
        </g>
        <circle cx="100" cy="100" r="1.7" fill="#e23b3b"/>
      </svg>
    </div>

    <div id="netstat"><span class="dot" id="netdot"></span><span id="nettext">未连接</span></div>

    <!-- 左上角测试按钮：输入密码 67 获得超级武器 / 再输一次补满弹药 -->
    <div id="testpanel">
      <button id="testbtn" type="button" title="测试超级武器">🔧</button>
      <input id="testpw" type="text" inputmode="numeric" maxlength="6" placeholder="密码" hidden autocomplete="off" />
    </div>
    <!-- 开发者模式面板（输入 67 后出现）：添加假人 -->
    <div id="devpanel" hidden>
      <div class="dp-t">开发者模式 · 添加假人</div>
      <div class="dp-row">
        <button type="button" data-dummy="normal">普通</button>
        <button type="button" data-dummy="mecha">超级机甲</button>
        <button type="button" data-dummy="godmecha">终焉机神</button>
      </div>
      <div class="dp-row" style="margin-top:6px;">
        <button type="button" data-equip="execute" style="color:#00ffe0;border-color:#0a6;">☠ 绝对处死之炮</button>
      </div>
      <div class="dp-hint">机甲无法退出(只有死亡才失去) · 滚轮/数字键切换全部武器 · ☠按钮一键装绝对处死之炮</div>
    </div>

    <div id="scorebox">
      <div class="panel"><h3>积分板 · FFA</h3><div id="scorerows"></div></div>
      <div id="killfeed"></div>
    </div>

    <div id="botleft">
      <div id="hpwrap"><div id="hpbar"></div></div>
      <div id="hpnum">HP 100</div>
    </div>

    <div id="botright">
      <div id="ammo">0<span class="res"> / 0</span></div>
      <div id="reloading"></div>
    </div>

    <div id="slots"></div>

    <div id="deathmsg" class="bigmsg">
      <div class="t">你被击杀了</div>
      <div class="s" id="respawnText">3 秒后重生…</div>
    </div>

    <div id="dmgflash"></div>
    <div id="beamflash"></div>
    <div id="chargevig"></div>
    <div id="mechhud" hidden>
      <div class="mh-corner tl"></div><div class="mh-corner tr"></div><div class="mh-corner bl"></div><div class="mh-corner br"></div>

  (function () {
    var missing = [];

    else { dotThree.className = 'dot ok'; }
    if (typeof window.Peer === 'undefined')  { missing.push('PeerJS（./vendor/peerjs.min.js）'); dotPeer.className = 'dot no'; }
    else { dotPeer.className = 'dot ok'; }

    if (missing.length) {
      var el = document.getElementById('loaderr');
      el.hidden = false;
      el.innerHTML = '<b>加载失败：</b>以下本地库没能加载成功 → <b>' + missing.join('、') +

      // 标记：让自测脚本能区分"库缺失"导致的未启动
      window.__libError = missing.slice();

  })();

    var FROSTFORT_THEME = { floor:0xdfeefc, wall:0x9fc4e0, accent:0x46e8ff, ice:0xbfe0f5, deep:0x0a1430 };

    // ---- 自写极光天穹 fragment shader(复用 GLSL_NOISE) ----
    var FROSTFORT_SKY_VS = 'varying vec3 vDir; void main(){ vDir = normalize(position); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }';
    var FROSTFORT_SKY_FS = GLSL_NOISE + '\n' + [
      'varying vec3 vDir; uniform float uTime;',
      'uniform vec3 uDeep, uGreen, uCyan, uMag;',
      'void main(){',
      '  float hh = clamp(vDir.y*0.5+0.5, 0.0, 1.0);',
      '  // 暗夜空底色，越高越深',
      '  vec3 col = mix(uDeep*1.4, uDeep*0.5, smoothstep(0.0,1.0,hh));',
      '  // 极光主要出现在中上空(hh 0.45~0.95)的水平带',
      '  float band = smoothstep(0.40,0.62,hh) * (1.0 - smoothstep(0.86,0.99,hh));',
      '  vec2 uv = vec2(atan(vDir.z, vDir.x)*0.9, vDir.y*2.2);',
      '  // 缓慢水平平移的飘带',
      '  float curtain = fbm(uv*2.2 + vec2(uTime*0.035, uTime*0.012));',
      '  float curtain2 = fbm(uv*4.1 - vec2(uTime*0.05, 0.0));',
      '  float w = curtain*0.65 + curtain2*0.35;',
      '  // 沿高度分层取色: 低->绿, 中->青, 高->品红',
      '  vec3 aur = mix(uGreen, uCyan, smoothstep(0.30,0.62,hh));',
      '  aur = mix(aur, uMag, smoothstep(0.66,0.92,hh) * 0.7);',
      '  // 竖直褶皱使飘带呈条纹',
      '  float streak = smoothstep(0.45,0.85,w);',
      '  float glow = streak * band;',
      '  col += aur * glow * 1.25;',
      '  // 高处稀疏星点',
      '  float st = h21(floor(uv*40.0));',
      '  col += vec3(0.7,0.8,1.0) * smoothstep(0.992,1.0,st) * hh;',
      '  gl_FragColor = vec4(col, 1.0);',

      g.add(_tcMesh(new THREE.BoxGeometry(W, H, D), body, 0, H * 0.5, 0));
      // 斜顶补块 (后高)
      var slope = _tcMesh(new THREE.BoxGeometry(W, 0.06, D + 0.1), mats.metalDark, 0, H + 0.04, -0.04);
      slope.rotation.x = -0.12; g.add(slope);
      // 顶缘前后框
      g.add(_tcMesh(new THREE.BoxGeometry(W + 0.06, 0.08, 0.08), mats.metalDark, 0, H, D * 0.5));
      g.add(_tcMesh(new THREE.BoxGeometry(W + 0.06, 0.08, 0.08), mats.metalDark, 0, H + 0.13, -D * 0.5));
      // 侧面竖楞 (波纹铁皮感, 多道)
      var i, n = 9;
      for (i = 0; i < n; i++) {
        var px = -W * 0.5 + 0.12 + (i / (n - 1)) * (W - 0.24);
        g.add(_tcMesh(new THREE.BoxGeometry(0.04, H * 0.8, 0.03), mats.metalDark, px, H * 0.5, D * 0.5 + 0.005));
        g.add(_tcMesh(new THREE.BoxGeometry(0.04, H * 0.8, 0.03), mats.metalDark, px, H * 0.5, -D * 0.5 - 0.005));
      }
      // 双开顶盖 (塑料盖, 微开掀)
      var lidMat = mats.plasticBlack;
      var lidL = _tcMesh(new THREE.BoxGeometry(W * 0.48, 0.05, D * 0.92), lidMat, -W * 0.25, H + 0.18, 0.02);
      var lidR = _tcMesh(new THREE.BoxGeometry(W * 0.48, 0.05, D * 0.92), lidMat, W * 0.25, H + 0.16, 0.02);
      if (opts.open !== false) { lidL.rotation.x = -0.55; lidL.position.y += 0.18; lidL.position.z -= 0.18; }
      g.add(lidL); g.add(lidR);
      // 溢出的垃圾袋 (从开口探出几个鼓包)
      var bag1 = _tcMesh(new THREE.SphereGeometry(0.3, 10, 8), mats.plasticBlack, -W * 0.18, H + 0.28, 0.12);
      bag1.scale.set(1, 0.75, 1); g.add(bag1);
      var bag2 = _tcMesh(new THREE.SphereGeometry(0.24, 9, 7), mats.plasticBlack, -W * 0.42, H + 0.2, 0.0);
      bag2.scale.set(1, 0.8, 1); g.add(bag2);
      g.add(_tcMesh(new THREE.BoxGeometry(0.3, 0.22, 0.26), mats.cardboard, W * 0.0, H + 0.22, -0.1));
      var pap = _tcMesh(new THREE.PlaneGeometry(0.4, 0.3), mats.paper, W * 0.2, H + 0.2, 0.15);
      pap.rotation.set(-0.6, 0.3, 0.1); pap.material.side = THREE.DoubleSide; g.add(pap);
      // 四角小轮
      var wy = 0.12, k;
      var corners = [[-W * 0.4, D * 0.4], [W * 0.4, D * 0.4], [-W * 0.4, -D * 0.4], [W * 0.4, -D * 0.4]];
      for (k = 0; k < 4; k++) {
        var w = _tcMesh(new THREE.CylinderGeometry(0.12, 0.12, 0.08, 12), mats.tire, corners[k][0], wy, corners[k][1]);
        w.rotation.x = Math.PI / 2; g.add(w);
      }
      // 侧面大锈斑 (rust 贴片)
      var r1 = _tcMesh(new THREE.PlaneGeometry(0.5, 0.7), mats.rust, -W * 0.28, H * 0.45, D * 0.5 + 0.012);
      r1.material.side = THREE.DoubleSide; g.add(r1);
      var r2 = _tcMesh(new THREE.PlaneGeometry(0.35, 0.5), mats.rust, W * 0.35, H * 0.35, D * 0.5 + 0.012);
      r2.material.side = THREE.DoubleSide; g.add(r2);
      // 侧面编号标牌
      var plate = _tcMesh(new THREE.PlaneGeometry(0.4, 0.22), mats.paintYellow, 0, H * 0.68, D * 0.5 + 0.013);
      plate.material.side = THREE.DoubleSide; g.add(plate);
      return g;
    }

    // ----------------------------------------------------------------------------
    // 鼓胀黑垃圾袋: 不规则球体扭一下, 顶部扎口, 底部坐地; 可成堆 (opts.pile)
    // opts: { mat: plasticBlack(默认)/trashMix, seed:n, pile:false }
    // ----------------------------------------------------------------------------
    function makeGarbageBag(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var bm = opts.mat ? mats[opts.mat] : mats.plasticBlack;
      if (!bm) bm = mats.plasticBlack;
      var seed = opts.seed || 1;

      function oneBag(cx, cz, s, sd) {
        var bag = _tcMesh(new THREE.SphereGeometry(0.32 * s, 12, 10), bm, cx, 0.27 * s, cz);
        // 鼓胀微变形
        bag.scale.set(1.0 + (_tcRand(sd) - 0.5) * 0.3, 0.85 + _tcRand(sd + 1) * 0.2, 1.0 + (_tcRand(sd + 2) - 0.5) * 0.3);
        bag.rotation.y = _tcRand(sd + 3) * Math.PI;
        g.add(bag);
        // 几个鼓包 (内容物顶起)
        var b, bn = 3;
        for (b = 0; b < bn; b++) {
          var ba = (b / bn) * Math.PI * 2 + sd;
          var lump = _tcMesh(new THREE.SphereGeometry(0.1 * s, 8, 6), bm,
            cx + Math.cos(ba) * 0.18 * s, (0.32 + _tcRand(sd + b) * 0.12) * s, cz + Math.sin(ba) * 0.18 * s);
          g.add(lump);
        }
        // 顶部扎口 (锥)
        g.add(_tcMesh(new THREE.ConeGeometry(0.06 * s, 0.14 * s, 8), bm, cx, (0.5 + 0.06) * s, cz));
      }

      if (opts.pile) {
        oneBag(0, 0, 1.0, seed);
        oneBag(0.34, 0.1, 0.85, seed + 7);
        oneBag(-0.28, 0.22, 0.9, seed + 13);
        oneBag(0.1, -0.3, 0.78, seed + 19);
        // 顶上压一个
        var top = _tcMesh(new THREE.SphereGeometry(0.26, 10, 8), bm, 0.04, 0.62, 0.0);
        top.scale.set(1.1, 0.8, 1); g.add(top);
      } else {
        oneBag(0, 0, 1.0, seed);
      }
      return g;
    }

    // ----------------------------------------------------------------------------
    // 垃圾堆: 纸箱 + 黑袋 + 瓶罐 + 木板 随意堆叠的一小堆 (脏乱视觉锚点)
    // opts: { seed:n }
    // ----------------------------------------------------------------------------
    function makeTrashPile(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var sd = opts.seed || 1;
      // 底层: 两个塌瘪纸箱
      var box1 = _tcMesh(new THREE.BoxGeometry(0.5, 0.34, 0.42), mats.cardboard, -0.15, 0.17, 0.05);
      box1.rotation.y = 0.2; g.add(box1);
      var box2 = _tcMesh(new THREE.BoxGeometry(0.44, 0.28, 0.4), mats.cardboard, 0.25, 0.14, -0.12);
      box2.rotation.y = -0.35; g.add(box2);
      // 纸箱开盖翻片
      var flap = _tcMesh(new THREE.PlaneGeometry(0.24, 0.22), mats.cardboard, -0.15, 0.36, 0.26);
      flap.rotation.x = -1.1; flap.material.side = THREE.DoubleSide; g.add(flap);
      // 中层黑袋
      var bag = _tcMesh(new THREE.SphereGeometry(0.26, 10, 8), mats.plasticBlack, 0.05, 0.5, 0.0);
      bag.scale.set(1.1, 0.85, 1); g.add(bag);
      var bag2 = _tcMesh(new THREE.SphereGeometry(0.2, 9, 7), mats.plasticBlack, -0.3, 0.42, 0.18);
      bag2.scale.set(1, 0.8, 1); g.add(bag2);
      // 散落瓶子 (立/倒)
      var bottle = _tcMesh(new THREE.CylinderGeometry(0.04, 0.05, 0.24, 10), mats.glass, 0.34, 0.46, 0.22);
      bottle.rotation.z = 1.3; g.add(bottle);
      g.add(_tcMesh(new THREE.CylinderGeometry(0.035, 0.045, 0.2, 10), mats.plasticGreen, -0.05, 0.74, 0.05));
      // 易拉罐
      var can = _tcMesh(new THREE.CylinderGeometry(0.04, 0.04, 0.12, 12), mats.chrome, 0.42, 0.3, -0.18);
      can.rotation.x = 1.4; g.add(can);
      g.add(_tcMesh(new THREE.CylinderGeometry(0.04, 0.04, 0.12, 12), mats.paintRed, -0.38, 0.3, -0.1));
      // 斜插木板
      var plank = _tcMesh(new THREE.BoxGeometry(0.06, 0.7, 0.12), mats.woodBrown, 0.18, 0.5, 0.25);
      plank.rotation.set(0.4, 0.3, 0.5); g.add(plank);
      // 顶上几张脏纸
      var p, pn = 3;
      for (p = 0; p < pn; p++) {
        var pp = _tcMesh(new THREE.PlaneGeometry(0.2, 0.16), mats.paper,
          (_tcRand(sd + p) - 0.5) * 0.5, 0.6 + p * 0.05, (_tcRand(sd + p + 9) - 0.5) * 0.4);
        pp.rotation.set(-1.3 + _tcRand(sd + p) * 0.4, _tcRand(sd + p) * Math.PI, 0.2);
        pp.material.side = THREE.DoubleSide; g.add(pp);
      }
      return g;
    }

    // ----------------------------------------------------------------------------
    // 地上散落垃圾场 (InstancedMesh): 在矩形区随机平铺纸片/易拉罐/瓶子/烟头
    // 一次 draw call 出几百片; 返回含 4 个 InstancedMesh 的 Group.
    // makeLitterField(mats, count, x0,z0, x1,z1)  count=总片数(默认 300)
    // 注意: 返回 Group 的局部坐标即世界坐标区间 [x0..x1]x[z0..z1], 装配时直接 add 不再平移.
    // ----------------------------------------------------------------------------
    function makeLitterField(mats, count, x0, z0, x1, z1) {
      count = count || 300;
      if (x0 == null) { x0 = -1; z0 = -1; x1 = 1; z1 = 1; }
      var g = new THREE.Group();
      var dummy = new THREE.Object3D();
      // 分配各类型数量
      var nPaper = Math.floor(count * 0.4);
      var nCan = Math.floor(count * 0.25);
      var nBottle = Math.floor(count * 0.15);
      var nButt = count - nPaper - nCan - nBottle; // 烟头补足

      function rx() { return x0 + Math.random() * (x1 - x0); }
      function rz() { return z0 + Math.random() * (z1 - z0); }

      // 纸片 (薄平面, 贴地微旋)
      var paperGeo = new THREE.PlaneGeometry(0.18, 0.14);
      var paperIM = new THREE.InstancedMesh(paperGeo, mats.paper, nPaper);
      paperIM.receiveShadow = true;
      var i;
      for (i = 0; i < nPaper; i++) {
        dummy.position.set(rx(), 0.012 + Math.random() * 0.01, rz());
        dummy.rotation.set(-Math.PI / 2 + (Math.random() - 0.5) * 0.3, 0, Math.random() * Math.PI * 2);
        var ps = 0.6 + Math.random() * 0.9; dummy.scale.set(ps, ps, ps);
        dummy.updateMatrix(); paperIM.setMatrixAt(i, dummy.matrix);
      }
      paperIM.instanceMatrix.needsUpdate = true;
      if (paperIM.material) paperIM.material.side = THREE.DoubleSide;
      g.add(paperIM);

      // 易拉罐 (倒地小圆柱)
      var canGeo = new THREE.CylinderGeometry(0.035, 0.035, 0.11, 10);
      var canIM = new THREE.InstancedMesh(canGeo, mats.chrome, nCan);
      canIM.castShadow = true; canIM.receiveShadow = true;
      for (i = 0; i < nCan; i++) {
        dummy.position.set(rx(), 0.035, rz());
        dummy.rotation.set(Math.PI / 2, Math.random() * Math.PI * 2, 0);
        var cs = 0.85 + Math.random() * 0.4; dummy.scale.set(cs, cs, cs);
        dummy.updateMatrix(); canIM.setMatrixAt(i, dummy.matrix);
      }
      canIM.instanceMatrix.needsUpdate = true;
      g.add(canIM);

      // 瓶子 (倒地细长圆柱)
      var botGeo = new THREE.CylinderGeometry(0.035, 0.045, 0.22, 10);
      var botIM = new THREE.InstancedMesh(botGeo, mats.glass, nBottle);
      botIM.castShadow = true; botIM.receiveShadow = true;
      for (i = 0; i < nBottle; i++) {
        dummy.position.set(rx(), 0.04, rz());
        dummy.rotation.set(Math.PI / 2, Math.random() * Math.PI * 2, 0);
        var bs = 0.8 + Math.random() * 0.5; dummy.scale.set(bs, bs, bs);
        dummy.updateMatrix(); botIM.setMatrixAt(i, dummy.matrix);
      }
      botIM.instanceMatrix.needsUpdate = true;
      g.add(botIM);

      // 烟头 / 小碎屑 (极小圆柱)
      var buttGeo = new THREE.CylinderGeometry(0.012, 0.012, 0.05, 6);
      var buttIM = new THREE.InstancedMesh(buttGeo, mats.trashMix, nButt);
      for (i = 0; i < nButt; i++) {
        dummy.position.set(rx(), 0.012, rz());
        dummy.rotation.set(Math.PI / 2, Math.random() * Math.PI * 2, Math.random());
        var us = 0.8 + Math.random() * 0.6; dummy.scale.set(us, us, us);
        dummy.updateMatrix(); buttIM.setMatrixAt(i, dummy.matrix);
      }
      buttIM.instanceMatrix.needsUpdate = true;
      g.add(buttIM);

      return g;
    }

    // ===== town prop set 1 =====
    // ============================================================ 街道物件 · 路灯/交通/标牌
    // 约定: 每个 builder 返回一个 THREE.Group(局部坐标, 底部坐 y=0, 大致居中 x=z=0, 正面朝 +Z)。
    // 只引用 mats 调色板键。发光部件用 emissive 键让 bloom 点亮。ES5 风格(var/function)。
    // 小工具: 把 mesh 放进 group 并设阴影(避免每处重复)。
    function _propPart(g, geo, mat, x, y, z, rx, ry, rz) {
      var m = new THREE.Mesh(geo, mat);
      m.position.set(x || 0, y || 0, z || 0);
      if (rx) m.rotation.x = rx; if (ry) m.rotation.y = ry; if (rz) m.rotation.z = rz;
      m.castShadow = true; m.receiveShadow = true;
      g.add(m); return m;
    }

    // 路灯: 八角底座 + 锈渍法兰 + 微锥灯杆 + 维修盖 + 弯悬臂 + 灯罩 + 发光灯泡 + 灯臂吊环
    // opts.lit(默认 true 开灯), opts.height(默认 5), opts.double(双臂, 默认 false)
    function makeLampPost(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var lit = opts.lit !== false;
      var H = opts.height || 5;
      var glow = lit ? mats.lampGlow : mats.metalGray;
      // 八角混凝土底座
      _propPart(g, new THREE.CylinderGeometry(0.34, 0.42, 0.34, 8), mats.concrete, 0, 0.17, 0);
      // 锈蚀地脚法兰 + 四颗螺栓盘
      _propPart(g, new THREE.CylinderGeometry(0.3, 0.3, 0.08, 12), mats.rust, 0, 0.38, 0);
      // 灯杆(微锥, 上细下粗)
      _propPart(g, new THREE.CylinderGeometry(0.075, 0.13, H, 12), mats.metalGray, 0, 0.42 + H / 2, 0);
      // 维修检修盖(杆下部矩形板)
      _propPart(g, new THREE.BoxGeometry(0.16, 0.42, 0.04), mats.metalDark, 0, 1.0, 0.12);
      // 杆上一圈锈渍环(磨损细节)
      _propPart(g, new THREE.CylinderGeometry(0.105, 0.115, 0.12, 12), mats.rust, 0, 2.1, 0);
      var topY = 0.42 + H;
      // 单/双悬臂
      var arms = opts.double ? [1, -1] : [1];
      for (var a = 0; a < arms.length; a++) {
        var dir = arms[a];
        // 弯曲悬臂(斜杆)
        var arm = _propPart(g, new THREE.CylinderGeometry(0.05, 0.06, 1.15, 8), mats.metalGray, dir * 0.42, topY - 0.18, 0, 0, 0, dir * (Math.PI / 2 - 0.55));
        // 灯罩(倒锥, 喇叭口朝下)
        var headX = dir * 0.86;
        _propPart(g, new THREE.ConeGeometry(0.26, 0.26, 12, 1, true), mats.metalDark, headX, topY - 0.02, 0, Math.PI, 0, 0);
        // 罩顶小帽
        _propPart(g, new THREE.CylinderGeometry(0.08, 0.16, 0.1, 12), mats.metalGray, headX, topY + 0.1, 0);
        // 发光灯泡(球, emissive)
        var bulb = new THREE.Mesh(new THREE.SphereGeometry(0.14, 12, 10), glow);
        bulb.position.set(headX, topY - 0.16, 0); bulb.castShadow = false; g.add(bulb);
        // 灯罩与杆之间的吊环细节
        _propPart(g, new THREE.TorusGeometry(0.05, 0.018, 6, 10), mats.metalDark, dir * 0.2, topY - 0.05, 0, Math.PI / 2);
      }
      return g;
    }

    // 交通灯: 锈底座 + 立杆 + 横臂 + 三灯黑箱(红/黄/绿发光) + 每灯遮檐 + 行人小箱
    // opts.state(0=红/1=黄/2=绿, 默认 0 红), opts.arm(横臂悬挂灯箱, 默认 true)
    function makeTrafficLight(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var state = (opts.state == null) ? 0 : opts.state;
      // 地脚锈法兰
      _propPart(g, new THREE.CylinderGeometry(0.28, 0.34, 0.18, 12), mats.rust, 0, 0.09, 0);
      // 立杆
      var poleH = 5.2;
      _propPart(g, new THREE.CylinderGeometry(0.1, 0.13, poleH, 12), mats.metalDark, 0, 0.18 + poleH / 2, 0);
      // 横臂(悬出灯箱)
      var armLen = opts.arm === false ? 0 : 2.6;
      if (armLen) _propPart(g, new THREE.CylinderGeometry(0.07, 0.07, armLen, 10), mats.metalDark, armLen / 2 - 0.05, poleH + 0.05, 0, 0, 0, Math.PI / 2);
      // 灯箱(黑塑料壳)位于杆顶或横臂端
      var bx = armLen ? armLen - 0.1 : 0, by = armLen ? poleH - 0.45 : poleH - 0.4;
      _propPart(g, new THREE.BoxGeometry(0.34, 1.06, 0.3), mats.plasticBlack, bx, by, 0.05);
      // 三灯: 红(上)黄(中)绿(下), 点亮的用对应 emissive, 灭的用 metalDark
      var lampKeys = [mats.trafficRed, mats.trafficYellow, mats.trafficGreen];
      var lampOff = mats.plasticBlack;
      for (var i = 0; i < 3; i++) {
        var ly = by + 0.34 - i * 0.34;
        var on = (i === state);
        var lens = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.06, 12), on ? lampKeys[i] : lampOff);
        lens.position.set(bx, ly, 0.22); lens.rotation.x = Math.PI / 2; lens.castShadow = false; g.add(lens);
        // 遮檐(每灯上方小弧檐)
        _propPart(g, new THREE.CylinderGeometry(0.14, 0.14, 0.16, 12, 1, true, 0, Math.PI), mats.metalDark, bx, ly + 0.05, 0.2, Math.PI / 2);
      }
      // 杆侧行人信号小箱
      _propPart(g, new THREE.BoxGeometry(0.26, 0.4, 0.22), mats.plasticBlack, 0, 2.4, 0.18);
      _propPart(g, new THREE.PlaneGeometry(0.18, 0.18), state === 2 ? mats.trafficGreen : mats.trafficRed, 0, 2.42, 0.3);
      return g;
    }

    // 路牌: 杆 + 路名牌(横) + 方向指示牌(可选第二块) + 杆顶帽 + 螺栓抱箍
    // opts.signColor(主牌底色键, 默认 paintGreen), opts.second(加第二块牌, 默认 true)
    function makeStreetSign(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var col = opts.signColor || mats.paintGreen;
      // 圆盘底座
      _propPart(g, new THREE.CylinderGeometry(0.16, 0.2, 0.1, 10), mats.concrete, 0, 0.05, 0);
      // 杆
      var H = 2.8;
      _propPart(g, new THREE.CylinderGeometry(0.05, 0.06, H, 10), mats.metalGray, 0, 0.1 + H / 2, 0);
      // 杆顶帽
      _propPart(g, new THREE.SphereGeometry(0.06, 8, 6), mats.metalGray, 0, 0.1 + H, 0);
      // 主路名牌(绿/蓝长牌, 略带白边用第二薄板表现)
      _propPart(g, new THREE.BoxGeometry(1.5, 0.32, 0.04), col, 0, H - 0.2, 0);
      _propPart(g, new THREE.BoxGeometry(1.42, 0.24, 0.045), mats.paintWhite, 0, H - 0.2, 0.005);
      // 抱箍螺栓(牌与杆连接处)
      _propPart(g, new THREE.CylinderGeometry(0.07, 0.07, 0.1, 8), mats.metalDark, 0, H - 0.2, -0.02);
      // 第二块方向指示牌(垂直交错, 蓝底)
      if (opts.second !== false) {
        _propPart(g, new THREE.BoxGeometry(0.9, 0.28, 0.04), mats.paintBlue, 0.05, H - 0.58, 0, 0, Math.PI / 2.6, 0);
        _propPart(g, new THREE.CylinderGeometry(0.06, 0.06, 0.09, 8), mats.metalDark, 0, H - 0.58, 0);
      }
      return g;
    }

    // 停车计时器: 锈杆 + 鼓形表头 + 暗显示屏(微亮) + 投币口 + 顶帽
    // opts.lit(屏幕微亮, 默认 true)
    function makeParkingMeter(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var lit = opts.lit !== false;
      // 底座
      _propPart(g, new THREE.CylinderGeometry(0.1, 0.14, 0.12, 10), mats.metalDark, 0, 0.06, 0);
      // 杆
      var H = 1.2;
      _propPart(g, new THREE.CylinderGeometry(0.05, 0.06, H, 10), mats.metalGray, 0, 0.12 + H / 2, 0);
      // 杆上锈渍环
      _propPart(g, new THREE.CylinderGeometry(0.055, 0.06, 0.14, 10), mats.rust, 0, 0.6, 0);
      // 表头主体(扁鼓形, 漆色机壳)
      var headY = 0.12 + H + 0.18;
      _propPart(g, new THREE.BoxGeometry(0.26, 0.42, 0.18), mats.paintGreen, 0, headY, 0);
      // 表头圆顶

    // ===== town prop set 2 =====
    // ============================================================
    // 街道物件 · 座椅/站点/箱体 builders (Three.js r137, ES5)
    // 约定: 每个 make* 返回 THREE.Group, 底部坐落 y=0, 居中 x=z=0, 正面朝 +Z
    // 材质只引用传入的 mats 调色板键。装配阶段负责 add/碰撞/回收。

    // 小工具: 在组里加一个 box / cyl 子 mesh (局部坐标, 带阴影)

    // 长椅: 木板条座+木靠背+两端铸铁支架+横撑+磨损 (≈长1.8 高0.9)

        _siBox(g, 0.06, 0.45, 0.5, frame, fx, 0.225, 0);          // 立腿板
        _siBox(g, 0.06, 0.06, 0.62, frame, fx, 0.02, 0);          // 着地横脚(微沉)
        _siBox(g, 0.05, 0.42, 0.05, frame, fx, 0.66, -0.18);      // 靠背支柱

      _siBox(g, len - 0.1, 0.04, 0.04, frame, 0, 0.30, 0.16);

      }
      return g;
    }

    // 公交站: 顶棚+后玻璃墙+两/三根立柱+下置长椅+侧广告灯箱(glassLit发光)+站牌
    // opts.lit 默认 true(灯箱亮), opts.color 顶棚漆色键(默认 paintBlue)

      var W = 3.4, D = 1.3, H = 2.5;
      // 立柱(后侧3根)
      var px;
      for (px = -1; px <= 1; px++) {
        _siBox(g, 0.08, H, 0.08, post, px * (W / 2 - 0.1), H / 2, -D / 2 + 0.05);

      _siBox(g, 0.08, H, 0.08, post, -(W / 2 - 0.1), H / 2, D / 2 - 0.05);
      _siBox(g, 0.08, H, 0.08, post, (W / 2 - 0.1), H / 2, D / 2 - 0.05);

      var rf = _siBox(g, W + 0.2, 0.07, D + 0.25, roof, 0, H + 0.04, 0);

    }

    // 电话亭: 铝框玻璃亭(4面)+顶冠+底座+内置话机+话筒挂架+顶灯牌(glassLit)
    // opts.color 框架漆色(默认 paintRed 经典红亭), opts.lit 顶灯默认 true
    function makePhoneBooth(mats, opts) {
      opts = opts || {};

      _siBox(g, 0.03, H - 0.4, D - 0.1, glass, -(W / 2 - 0.03), H / 2 + 0.2, 0);          // 左
      _siBox(g, 0.03, H - 0.4, D - 0.1, glass, (W / 2 - 0.03), H / 2 + 0.2, 0);           // 右
      // 门(半开, 朝 +Z, 玻璃带门把)
      var door = new THREE.Group();
      _siBox(door, W - 0.18, H - 0.5, 0.025, glass, (W - 0.18) / 2, 0, 0);

      _siBox(g, W + 0.06, 0.18, D + 0.06, frame, 0, H + 0.21, 0);
      _siBox(g, W - 0.1, 0.12, 0.02, lit && mats.glassLit ? mats.glassLit : mats.paintWhite || frame, 0, H + 0.21, D / 2 + 0.02);

    // 邮筒: 圆顶投信箱(经典美式)+矩形箱体+投信口+下置两腿支柱+把手 (≈高1.1)

    // 报箱: 投币报纸箱(底座腿+主箱+前玻璃窗看报头+投币口+取报拉手+顶斜面)
    // opts.color 漆色(默认 paintOrange); 常成排摆

    // 自行车架: 弯管波浪架(U形重复)+底座板+可选停一辆车(车架/两轮/把手)
    // opts.bays 弯管数(默认4), opts.bike 是否停车(默认 true)
    function makeBikeRack(mats, opts) {

        var wheelR = 0.33;
        var w1 = _siCyl(bk, wheelR, wheelR, 0.04, tire, -0.55, wheelR, 0, 18);

        _siCyl(bk, 0.025, 0.025, 0.8, fr, 0, wheelR + 0.1, 0, 8).rotation.z = Math.PI / 2 - 0.15;
        _siCyl(bk, 0.025, 0.025, 0.5, fr, 0.05, wheelR + 0.28, 0, 8).rotation.z = 0.3;

        // 座
        _siBox(bk, 0.18, 0.05, 0.1, mats.plasticBlack || tire, 0.25, wheelR + 0.5, 0);
        // 把手
        _siBox(bk, 0.04, 0.04, 0.4, mats.metalDark || metal, -0.42, wheelR + 0.55, 0);
        // 倚靠在车架上(略倾)
        bk.position.set(-totalW / 2 + pitch * 0.5, 0, 0.05);
        bk.rotation.z = 0.06;
        g.add(bk);
      }
      return g;
    }

    // ===== town prop set 3 =====
    // ===================== 市政设施 / 墙面附件 构建器 =====================
    // 约定: 每个 makeXxx(mats, opts) 仅返回一个 THREE.Group, 底坐 y=0, 居中 x=z=0, 正面朝 +Z。

    function makeHydrant(mats, opts) {

    // 井盖: 平贴地圆盘 + 内嵌花纹(同心环+辐射格) + 边缘卡口 + 两个起盖孔, 略低于地面一丝

    // 空调外机: 箱体 + 正面圆形风扇格栅(辐射叶) + 侧散热翅片 + 顶盖 + 落地支架(可选) + 锈渍底脚
    function makeACUnit(mats, opts) {

    // 落水管: 竖直主管 + 顶部入口斗 + 底部 90°弯头(出 +Z) + 数道卡箍 + 一处凹瘪/锈段

      m.position.y = H * 0.55; g.add(m);

        m.position.set(0, H * i / (n + 1), -r - 0.04); g.add(m);
      }
      return g;
    }

    // 排气管: 立管 + 顶部蘑菇风帽(锥盖) + 防雨裙 + 底部法兰 + 锈斑, opts.h 控制管高

      m.position.set(0, 0.05 + H * 0.45, r + 0.002); m.rotation.z = 0.3; g.add(m);

    // 配电箱: 灰箱体 + 双开门缝 + 侧铰链 + 门把手 + 黄底警示三角牌 + 顶遮雨檐 + 散热百叶 + 锁
    function makeElectricBox(mats, opts) {

    // 垂落电缆束: 上吊环 + 几股松垂线缆(用细长盒微弯近似垂链) + 中段绑扎 + 末端接头
    // opts.span 两端跨距(默认仅作单侧垂束), opts.n 线数
    function makeCableRun(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var n = opts.n || 4;
      var drop = opts.drop || 1.6;   // 垂落高度
      var top = opts.top || 3.2;     // 吊点高度
      var mat = mats.plasticBlack;
      var m, i, seg, sj, t, py;
      // 吊点支架/绝缘子
      m = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.12, 8), mats.metalDark);
      m.position.y = top + 0.06; g.add(m);
      m = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.08, 8), mats.chrome);
      m.position.y = top - 0.02; g.add(m);
      // 多股线缆: 每股用几段短盒拼出下垂弧(悬链近似), 沿 -Z 微散开
      var segN = 5;
      for (i = 0; i < n; i++) {
        var off = (i - (n - 1) / 2) * 0.05;
        for (seg = 0; seg < segN; seg++) {
          t = seg / (segN - 1);
          // 抛物线垂落: y 从 top 落到 top-drop, 中段最低
          py = top - drop * (1 - (2 * t - 1) * (2 * t - 1)) * 0.5 - t * drop * 0.5;
          var pz = -t * 0.25 + off;
          var len = drop / segN + 0.08;
          m = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, len, 6), mat);
          m.position.set(off, py, pz);
          m.rotation.x = (t - 0.4) * 1.2;   // 段渐倾
          m.castShadow = true; g.add(m);
        }
      }
      // 中段绑扎带(把线束束在一起)
      m = new THREE.Mesh(new THREE.TorusGeometry(0.06, 0.012, 6, 10), mats.metalDark);
      m.position.set(0, top - drop * 0.55, -0.12); m.rotation.x = 0.5; g.add(m);
      // 末端接头盒
      m = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.10, 0.08), mats.plasticBlack);
      m.position.set(0, top - drop, -0.25); m.castShadow = true; g.add(m);
      return g;
    }
    // =================== 市政设施 / 墙面附件 构建器 END ===================

    // ===== town prop set 4 =====
    // ============================================================
    // 楼房立面套件 (building facade kit) — Three.js r137, ES5
    // 全部 builder 返回一个 THREE.Group(局部坐标, 底/背贴 y/z=0, 正面朝 +Z)。
    // 只用传入的 mats 调色板键; 发光件用 emissive 键 (lampGlow/glassLit/neon*).
    // 装配阶段负责 scene.add / 碰撞 / 回收 / 摆放。
    // 共用小工具(局部, 不污染全局): _fmesh 建带阴影 mesh; _frand 伪随机。
    // ============================================================

    // 内部: 造一个带阴影的 mesh 并放到 group(几何由调用方给)
    function _fmesh(geo, mat, x, y, z) {
      var m = new THREE.Mesh(geo, mat);
      m.position.set(x || 0, y || 0, z || 0);
      m.castShadow = true; m.receiveShadow = true;
      return m;
    }
    // 内部: 稳定伪随机(给 seed 出可复现细节)

    // ---------- 窗户: 窗框 + 凹陷玻璃(可亮) + 窗台 + 可选空调/花盆 ----------

    // ---------- 门: 店门/单元门 + 门框 + 台阶 + 门牌 + 门把手 ----------

    // ---------- 雨棚: 斜面条纹篷布 + 前沿垂边 + 两根斜撑 ----------

    // ---------- 店招牌: 招牌底板 + 发光字条 + 边框 + 两个安装托架 ----------
    // opts: w(宽,默认2.6), h(高,默认0.7), neon(霓虹色键, 默认 neonPink), lit(bool 默认true)

    // ---------- 逃生梯: 锈铁立柱 + 平台格栅 + 栏杆 + 斜梯(多级踏板) ----------
    // opts: floors(层数,默认2), w(平台宽,默认2.0), fh(层高,默认2.8)
    function makeFireEscape(mats, opts) {

    // ---------- 阳台: 挑出底板 + 实心栏板/竖栏 + 杂物(箱/盆/晾衣杆) ----------

      g.add(_fmesh(new THREE.SphereGeometry(0.18, 7, 6), mats.foliage || mats.leafGreen, w * 0.32, 0.36, depth * 0.4));

    // ---------- 女儿墙/屋顶压顶: 压顶帽 + 墙身 + 排水口 + 排水管头 ----------

    // ---------- 整面立面: 在 w×h 墙上自动密铺窗+底层店面+雨棚+招牌+落水管+空调 ----------
    // 返回贴在 +Z 面前方的 Group(不含主墙体, 主墙体装配阶段用大盒子)。
    // 楼局部坐标: 立面平面在 z=0, 这里把附件放在 z>0(向外凸), 楼底在 y=0。
    // opts: seed(随机种), color(漆/招牌色), litRatio(亮窗比例,默认0.4)
    function makeBuildingFacade(mats, w, h, opts) {
      opts = opts || {};
      w = w || 10; h = h || 12;
      var seed = opts.seed || 1, litRatio = (opts.litRatio == null) ? 0.4 : opts.litRatio;
      var g = new THREE.Group();
      var z0 = 0.16;   // 附件相对墙面的凸出基准
      // ---- 楼层划分 ----
      var floorH = 3.0;
      var floors = Math.max(1, Math.floor(h / floorH));
      // 每层窗户列数(按宽度估)
      var winW = 1.0, winSpace = 1.9;
      var cols = Math.max(1, Math.floor((w - 1.2) / winSpace));
      var colStart = -(cols - 1) * winSpace / 2;
      var rcount = 0;   // 随机计数器

      // ---- 底层: 店面(门 + 大橱窗 + 雨棚 + 招牌) ----
      var groundShop = (_frand(seed * 3.1) > 0.35);   // 多数底层是店面
      if (groundShop) {
        // 店门(偏一侧)
        var doorX = colStart + winSpace * (cols > 1 ? 0 : 0);
        var door = makeDoor(mats, { shop: true, h: 2.4, lit: true });
        door.position.set(doorX, 0, z0);
        g.add(door);
        // 大橱窗(其余列, 底层用矮亮玻璃)
        for (var c = 1; c < cols; c++) {
          var sx = colStart + winSpace * c;
          var shopWin = makeWindow(mats, { w: 1.5, h: 1.8, lit: (_frand(seed + c * 1.7) < 0.7) });
          shopWin.position.set(sx, 0.5, z0);
          g.add(shopWin);
        }
        // 招牌(横跨店面顶部, 微高于底层)
        var sign = makeShopSign(mats, { w: Math.min(w * 0.7, cols * winSpace * 0.7), h: 0.7,
                                        neon: (_frand(seed * 5.5) > 0.5) ? 'neonPink' : 'neonCyan' });
        sign.position.set(0, floorH - 0.55, z0 + 0.12);
        g.add(sign);
        // 雨棚(店门 + 部分橱窗上方)
        for (var a = 0; a < cols; a++) {
          var ax = colStart + winSpace * a;
          var aw = makeAwning(mats, { w: winSpace * 0.92, depth: 1.0,
                                      color: (_frand(seed + a) > 0.5) ? 'fabricRed' : 'fabricGreen' });
          aw.position.set(ax, floorH - 1.15, z0 + 0.05);
          g.add(aw);
        }
      } else {
        // 非店面底层: 单元门 + 普通窗
        var ud = makeDoor(mats, { shop: false, h: 2.2, lit: true });
        ud.position.set(colStart, 0, z0);
        g.add(ud);
        for (var c2 = 1; c2 < cols; c2++) {
          var w1 = makeWindow(mats, { w: winW, h: 1.3, lit: (_frand(seed + c2) < litRatio) });
          w1.position.set(colStart + winSpace * c2, 0.9, z0);
          g.add(w1);
        }
      }

      // ---- 上层: 密铺住宅窗(部分亮灯/空调/花盆), 间或阳台 ----
      for (var f = 1; f < floors; f++) {
        var fy = f * floorH + 0.6;   // 该层窗底标高
        for (var col = 0; col < cols; col++) {
          var cx = colStart + winSpace * col;
          rcount++;
          var r = _frand(seed * 2.0 + rcount * 1.3);
          var lit = (r < litRatio);
          // 偶发阳台(替代窗户)
          if (_frand(seed + f * 3.7 + col * 0.9) > 0.86 && f < floors) {
            var bal = makeBalcony(mats, { w: winSpace * 0.95, depth: 0.9,
                                          solid: (r > 0.5), lit: lit });
            bal.position.set(cx, fy, z0);
            g.add(bal);
            // 阳台门(矮亮窗在后)
            var bd = makeWindow(mats, { w: winW, h: 1.6, lit: lit });
            bd.position.set(cx, fy, z0 - 0.02);
            g.add(bd);
          } else {
            var win = makeWindow(mats, { w: winW, h: 1.3, lit: lit,
                                         ac: (_frand(seed + rcount * 2.1) > 0.7),
                                         plant: (!lit && _frand(seed + rcount * 0.6) > 0.8) });
            win.position.set(cx, fy, z0);
            g.add(win);
          }
        }
      }

      // ---- 落水管(竖向 2 根, 贴墙边, 带几道卡箍) ----
      var pipeMat = mats.metalGray || mats.rust;
      var pipeXs = [-w / 2 + 0.4, w / 2 - 0.4];
      for (var p = 0; p < pipeXs.length; p++) {
        g.add(_fmesh(new THREE.CylinderGeometry(0.08, 0.08, h - 0.3, 8), pipeMat, pipeXs[p], (h - 0.3) / 2, z0 - 0.02));
        // 卡箍
        for (var cl = 0; cl < floors; cl++)
          g.add(_fmesh(new THREE.TorusGeometry(0.1, 0.02, 6, 10), mats.metalDark || pipeMat, pipeXs[p], 1.2 + cl * floorH, z0 - 0.02));
        // 底部弯头(出水口朝外)
        var elbow = _fmesh(new THREE.CylinderGeometry(0.08, 0.08, 0.4, 8), pipeMat, pipeXs[p], 0.3, z0 + 0.12);
        elbow.rotation.x = Math.PI / 2.4; g.add(elbow);
        // 锈水渍
        g.add(_fmesh(new THREE.BoxGeometry(0.05, h * 0.5, 0.01), mats.rust || mats.dirt, pipeXs[p] + 0.12, h * 0.4, z0 - 0.05));
      }

      // ---- 间或挂一截逃生梯(约一半立面有, 偏一侧) ----
      if (_frand(seed * 7.3) > 0.5 && floors >= 2) {
        var fe = makeFireEscape(mats, { floors: Math.min(floors - 1, 3), w: 1.8, fh: floorH });
        fe.position.set(w * 0.28, 0, z0 + 0.1);
        g.add(fe);
      }

      // ---- 顶部女儿墙 ----
      var par = makeRoofParapet(mats, { w: w, h: 0.9, drains: 2 });
      par.position.set(0, h, z0 - 0.05);
      g.add(par);

      return g;
    }

    // ===== town prop set 5 =====
    // ============================================================================
    // 车辆 / 工地杂物 构建器 (Three.js r137, ES5)
    // 约定: 每个 make* 返回一个 THREE.Group, 底部坐落 y=0, 居中 x=z=0, 正面朝 +Z。
    // 只引用传入的 mats 调色板键; 不 scene.add / 不设 spawnPoints / 不 new Material。
    // ============================================================================

    // --- 内部小工具(局部作用域, 不污染全局; 仅本段使用) ---------------------
    function _vp_box(g, mat, x, y, z, sx, sy, sz, rx, ry, rz) {
      var m = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), mat);
      m.position.set(x, y, z);
      if (rx) m.rotation.x = rx; if (ry) m.rotation.y = ry; if (rz) m.rotation.z = rz;
      m.castShadow = true; m.receiveShadow = true; g.add(m); return m;
    }
    function _vp_cyl(g, mat, x, y, z, rt, rb, h, seg, rx, ry, rz) {
      var m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg || 16), mat);
      m.position.set(x, y, z);
      if (rx) m.rotation.x = rx; if (ry) m.rotation.y = ry; if (rz) m.rotation.z = rz;
      m.castShadow = true; m.receiveShadow = true; g.add(m); return m;
    }
    function _vp_cone(g, mat, x, y, z, r, h, seg, rx, ry, rz) {
      var m = new THREE.Mesh(new THREE.ConeGeometry(r, h, seg || 16), mat);
      m.position.set(x, y, z);
      if (rx) m.rotation.x = rx; if (ry) m.rotation.y = ry; if (rz) m.rotation.z = rz;
      m.castShadow = true; m.receiveShadow = true; g.add(m); return m;
    }
    function _vp_torus(g, mat, x, y, z, r, tube, rseg, tseg, rx, ry, rz) {
      var m = new THREE.Mesh(new THREE.TorusGeometry(r, tube, rseg || 8, tseg || 16), mat);
      m.position.set(x, y, z);
      if (rx) m.rotation.x = rx; if (ry) m.rotation.y = ry; if (rz) m.rotation.z = rz;
      m.castShadow = true; m.receiveShadow = true; g.add(m); return m;
    }
    // 橡胶轮胎(胎面 torus + 黑盘 + 银轮毂), 沿 X 轴卧倒, 返回一个子 Group 便于定位
    function _vp_wheel(mats, R) {
      var w = new THREE.Group();
      _vp_torus(w, mats.tire, 0, 0, 0, R, R * 0.42, 8, 18, 0, Math.PI / 2, 0);   // 胎面绕 X 轴立起
      _vp_cyl(w, mats.tire, 0, 0, 0, R * 0.62, R * 0.62, R * 0.5, 18, 0, 0, Math.PI / 2); // 胎壁圆盘
      _vp_cyl(w, mats.chrome, 0, 0, 0, R * 0.42, R * 0.42, R * 0.54, 12, 0, 0, Math.PI / 2); // 轮毂
      return w;
    }

    // === 1) 轿车: 车体+车顶+引擎盖/后备箱分段+4窗玻璃+4轮+保险杠+车灯/尾灯+后视镜+车牌 ===
    // opts.color = 漆色键(默认 mats.paintRed)
    function makeSedan(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var paint = (typeof opts.color === 'string' ? mats[opts.color] : opts.color) || mats.paintRed;   // 兼容传材质或调色板键
      var L = 4.4, W = 1.8, wheelR = 0.34, sill = wheelR + 0.12; // 底盘离地

      // 下车体(乘员舱底盘段, 微收边)
      _vp_box(g, paint, 0, sill + 0.30, 0, W, 0.60, L * 0.92);
      // 引擎盖(前低段) + 后备箱(后低段) 分段, 比舱体略低
      _vp_box(g, paint, 0, sill + 0.46, L * 0.34, W * 0.96, 0.30, L * 0.30);   // 引擎盖
      _vp_box(g, paint, 0, sill + 0.46, -L * 0.36, W * 0.96, 0.30, L * 0.26);  // 后备箱
      // 车顶舱(更窄, 抬高)
      _vp_box(g, paint, 0, sill + 0.86, -0.05, W * 0.84, 0.52, L * 0.40);
      // 4 个车窗玻璃(前/后/左/右), 略缩进车顶舱
      _vp_box(g, mats.glass, 0, sill + 0.88, L * 0.16, W * 0.78, 0.42, 0.04);   // 前挡风
      _vp_box(g, mats.glass, 0, sill + 0.88, -L * 0.26, W * 0.78, 0.42, 0.04);  // 后挡风
      _vp_box(g, mats.glass, W * 0.42, sill + 0.88, -0.05, 0.04, 0.40, L * 0.34); // 右侧窗
      _vp_box(g, mats.glass, -W * 0.42, sill + 0.88, -0.05, 0.04, 0.40, L * 0.34); // 左侧窗
      // 前后保险杠
      _vp_box(g, mats.metalDark, 0, sill + 0.16, L * 0.50, W * 0.98, 0.22, 0.18);
      _vp_box(g, mats.metalDark, 0, sill + 0.16, -L * 0.50, W * 0.98, 0.22, 0.18);
      // 前大灯(发光) x2 + 尾灯(发光红) x2
      _vp_box(g, mats.lampGlow, W * 0.30, sill + 0.40, L * 0.495, 0.30, 0.16, 0.05);
      _vp_box(g, mats.lampGlow, -W * 0.30, sill + 0.40, L * 0.495, 0.30, 0.16, 0.05);
      _vp_box(g, mats.tailLight, W * 0.30, sill + 0.42, -L * 0.495, 0.28, 0.18, 0.05);
      _vp_box(g, mats.tailLight, -W * 0.30, sill + 0.42, -L * 0.495, 0.28, 0.18, 0.05);
      // 车牌(脏白) 前后
      _vp_box(g, mats.paper, 0, sill + 0.18, L * 0.505, 0.42, 0.14, 0.02);
      _vp_box(g, mats.paper, 0, sill + 0.22, -L * 0.505, 0.42, 0.14, 0.02);
      // 后视镜 x2(臂+镜片)
      _vp_box(g, paint, W * 0.50, sill + 0.78, L * 0.18, 0.14, 0.10, 0.08);
      _vp_box(g, mats.chrome, W * 0.56, sill + 0.78, L * 0.18, 0.04, 0.12, 0.14);
      _vp_box(g, paint, -W * 0.50, sill + 0.78, L * 0.18, 0.14, 0.10, 0.08);
      _vp_box(g, mats.chrome, -W * 0.56, sill + 0.78, L * 0.18, 0.04, 0.12, 0.14);
      // 进气格栅
      _vp_box(g, mats.metalDark, 0, sill + 0.36, L * 0.50, W * 0.5, 0.18, 0.04);
      // 4 轮
      var wx = W * 0.52, wz = L * 0.33;
      var corners = [[wx, wz], [-wx, wz], [wx, -wz], [-wx, -wz]];
      for (var i = 0; i < 4; i++) {
        var wl = _vp_wheel(mats, wheelR);
        wl.position.set(corners[i][0], wheelR, corners[i][1]);
        g.add(wl);
      }
      return g;
    }

    // === 2) 厢式货车: 更高更方 + 侧滑门 + 车顶 + 驾驶舱挡风 + 轮 + 保险杠灯 ===
    // opts.color = 漆色(默认 mats.paintWhite)
    function makeVan(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var paint = (typeof opts.color === 'string' ? mats[opts.color] : opts.color) || mats.paintWhite;   // 兼容传材质或调色板键
      var L = 5.0, W = 2.0, H = 2.4, wheelR = 0.40, sill = wheelR + 0.14;

      // 货厢主体(高大方块)
      _vp_box(g, paint, 0, sill + H * 0.5, -L * 0.16, W, H, L * 0.66);
      // 驾驶舱(略低前突)
      _vp_box(g, paint, 0, sill + H * 0.38, L * 0.40, W * 0.98, H * 0.76, L * 0.30);
      // 前挡风玻璃(斜)
      _vp_box(g, mats.glass, 0, sill + H * 0.62, L * 0.54, W * 0.86, H * 0.40, 0.05, -0.34);
      // 驾驶舱侧窗
      _vp_box(g, mats.glass, W * 0.50, sill + H * 0.55, L * 0.42, 0.04, H * 0.30, L * 0.22);
      _vp_box(g, mats.glass, -W * 0.50, sill + H * 0.55, L * 0.42, 0.04, H * 0.30, L * 0.22);
      // 侧滑门(右侧, 凹槽板 + 把手)
      _vp_box(g, mats.metalGray, W * 0.505, sill + H * 0.46, -L * 0.06, 0.06, H * 0.66, L * 0.34);
      _vp_box(g, mats.metalDark, W * 0.52, sill + H * 0.46, -L * 0.06, 0.03, 0.10, 0.30); // 门轨
      _vp_box(g, mats.metalDark, W * 0.55, sill + H * 0.40, L * 0.04, 0.05, 0.06, 0.18);  // 把手
      // 后双开门 + 缝
      _vp_box(g, paint, 0, sill + H * 0.46, -L * 0.49, W * 0.96, H * 0.70, 0.06);
      _vp_box(g, mats.metalDark, 0, sill + H * 0.46, -L * 0.50, 0.04, H * 0.66, 0.04);
      // 车顶通风/行李架
      _vp_box(g, mats.metalGray, 0, sill + H + 0.05, -L * 0.16, W * 0.7, 0.10, L * 0.5);
      // 保险杠 + 前大灯 + 尾灯
      _vp_box(g, mats.metalDark, 0, sill + 0.20, L * 0.55, W * 0.98, 0.26, 0.18);
      _vp_box(g, mats.lampGlow, W * 0.32, sill + 0.46, L * 0.555, 0.30, 0.20, 0.05);
      _vp_box(g, mats.lampGlow, -W * 0.32, sill + 0.46, L * 0.555, 0.30, 0.20, 0.05);
      _vp_box(g, mats.tailLight, W * 0.34, sill + 0.50, -L * 0.495, 0.20, 0.40, 0.05);
      _vp_box(g, mats.tailLight, -W * 0.34, sill + 0.50, -L * 0.495, 0.20, 0.40, 0.05);
      // 后视镜
      _vp_box(g, mats.metalDark, W * 0.55, sill + H * 0.62, L * 0.46, 0.06, 0.26, 0.16);
      _vp_box(g, mats.metalDark, -W * 0.55, sill + H * 0.62, L * 0.46, 0.06, 0.26, 0.16);
      // 4 轮(后轮略靠后)
      var wx = W * 0.54;
      var corners = [[wx, L * 0.34], [-wx, L * 0.34], [wx, -L * 0.30], [-wx, -L * 0.30]];
      for (var i = 0; i < 4; i++) {
        var wl = _vp_wheel(mats, wheelR);
        wl.position.set(corners[i][0], wheelR, corners[i][1]);
        g.add(wl);
      }
      return g;
    }

    // === 3) 自行车: 车架(双三角)+两轮+车把+座+脚踏+链罩; 默认带支脚微倾 ===
    // opts.color = 车架漆色(默认 mats.paintBlue); opts.upright=true 则不倾斜
    function makeBicycle(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var frame = opts.color || mats.paintBlue;
      var R = 0.34, base = R, wb = 1.05; // 轮半径 / 离地 / 轴距

      // 两轮(沿 X 轴薄, 在 XY 平面立着, 前后排开 -> 沿 Z 轴前后)
      function wheel(z) {
        _vp_torus(g, mats.tire, 0, base, z, R, 0.04, 6, 20, 0, 0, 0);       // 外胎(XY平面)
        _vp_torus(g, mats.chrome, 0, base, z, R * 0.92, 0.015, 4, 18, 0, 0, 0); // 钢圈
        var i, n = 8;
        for (i = 0; i < n; i++) { // 辐条
          _vp_cyl(g, mats.chrome, 0, base, z, 0.006, 0.006, R * 1.7, 4, 0, 0, i * Math.PI / n);
        }
        _vp_cyl(g, mats.metalDark, 0, base, z, 0.03, 0.03, 0.06, 8, 0, 0, Math.PI / 2); // 花鼓
      }
      wheel(wb * 0.5);   // 前轮 (+Z 前)
      wheel(-wb * 0.5);  // 后轮
      // 车架: 五通(中轴)位置
      var bb = base + 0.18; // 中轴高
      // 下管(中轴->前轮花鼓)
      _vp_cyl(g, frame, 0, base + 0.32, wb * 0.30, 0.025, 0.025, 0.62, 8, Math.atan2(wb * 0.30, 0.18) + 0.3, Math.PI / 2, 0);
      // 立管(中轴->座) 沿 +Y 略后倾
      _vp_cyl(g, frame, 0, base + 0.40, -wb * 0.10, 0.025, 0.025, 0.46, 8, 0.18, 0, 0);
      // 上管(座管顶->头管)
      _vp_cyl(g, frame, 0, base + 0.58, wb * 0.12, 0.022, 0.022, 0.56, 8, 0, Math.PI / 2, 0);
      // 后下叉(中轴->后花鼓)
      _vp_cyl(g, frame, 0, base + 0.10, -wb * 0.26, 0.018, 0.018, 0.56, 6, Math.PI / 2 - 0.3, 0, 0);
      // 后上叉(座->后花鼓)
      _vp_cyl(g, frame, 0, base + 0.30, -wb * 0.30, 0.016, 0.016, 0.50, 6, 0.7, 0, 0);
      // 前叉(头管->前花鼓)
      _vp_cyl(g, mats.chrome, 0, base + 0.30, wb * 0.42, 0.018, 0.018, 0.42, 6, 0.18, 0, 0);
      // 头管 + 车把(横杆 + 立管)
      _vp_cyl(g, frame, 0, base + 0.50, wb * 0.40, 0.03, 0.03, 0.18, 8, 0.18, 0, 0);
      _vp_cyl(g, mats.metalDark, 0, base + 0.62, wb * 0.40, 0.02, 0.02, 0.40, 6, 0, 0, Math.PI / 2); // 车把横杆
      _vp_box(g, mats.plasticBlack, 0, base + 0.62, wb * 0.40, 0.05, 0.05, 0.05); // 把立接头
      // 座垫
      _vp_box(g, mats.plasticBlack, 0, base + 0.66, -wb * 0.12, 0.10, 0.05, 0.24);
      // 脚踏曲柄 + 踏板
      _vp_cyl(g, mats.chrome, 0, bb, 0, 0.012, 0.012, 0.30, 6, 0, 0, 0.6);
      _vp_box(g, mats.plasticBlack, 0.12, bb + 0.07, 0, 0.06, 0.03, 0.10);
      _vp_box(g, mats.plasticBlack, -0.12, bb - 0.07, 0, 0.06, 0.03, 0.10);
      // 链罩
      _vp_box(g, mats.metalDark, 0.05, base + 0.10, -wb * 0.16, 0.02, 0.10, 0.40);

      if (!opts.upright) g.rotation.z = 0.10; // 支脚停靠微倾
      return g;
    }

    // === 4) 交通锥: 橙锥(分两段更挺)+反光环x2+方底座+顶尖 ===
    function makeTrafficCone(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      // 方底座
      _vp_box(g, mats.plasticBlack, 0, 0.03, 0, 0.38, 0.06, 0.38);
      _vp_box(g, mats.paintOrange, 0, 0.09, 0, 0.30, 0.06, 0.30);
      // 锥体下段(粗) + 上段(细)
      _vp_cone(g, mats.paintOrange, 0, 0.32, 0, 0.18, 0.40, 14);
      _vp_cone(g, mats.paintOrange, 0, 0.62, 0, 0.07, 0.30, 12);
      // 顶尖小球收口
      _vp_cyl(g, mats.paintOrange, 0, 0.76, 0, 0.025, 0.04, 0.05, 8);
      // 两道反光环(脏白)
      _vp_cyl(g, mats.paintWhite, 0, 0.40, 0, 0.155, 0.165, 0.08, 14);
      _vp_cyl(g, mats.paintWhite, 0, 0.58, 0, 0.085, 0.095, 0.06, 12);
      if (opts.fallen) g.rotation.z = Math.PI / 2 - 0.08; // 个别倒地
      return g;
    }

    // === 5) 木托盘: 顶板条 + 底板条 + 三根纵梁(标准欧式托盘观感) ===
    function makePallet(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var W = 1.2, L = 1.0, deck = 0.025, gap;
      // 三根纵向承重梁(底)
      var beamY = 0.05;
      _vp_box(g, mats.woodBrown, -W * 0.42, beamY, 0, 0.10, 0.10, L);
      _vp_box(g, mats.woodBrown, 0, beamY, 0, 0.10, 0.10, L);
      _vp_box(g, mats.woodBrown, W * 0.42, beamY, 0, 0.10, 0.10, L);
      // 顶面板条(5 条沿 X 铺, 长边沿 X)
      var n = 5, i;
      for (i = 0; i < n; i++) {
        var z = -L * 0.42 + (L * 0.84) * (i / (n - 1));
        _vp_box(g, mats.woodBrown, 0, 0.12, z, W, deck, 0.13);
      }
      // 底面板条(3 条)
      for (i = 0; i < 3; i++) {
        var z2 = -L * 0.40 + (L * 0.80) * (i / 2);
        _vp_box(g, mats.woodBrown, 0, 0.005, z2, W, deck, 0.14);
      }
      return g;
    }

    // === 6) 油桶: 桶身(微锥)+上下顶圈+三道加强棱+顶盖凸口+锈斑块 ===
    // opts.color = 桶身漆色(默认 mats.rust); 立着, 高约 0.9
    function makeBarrel(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var body = opts.color || mats.rust;
      var R = 0.29, H = 0.88;
      // 桶身
      _vp_cyl(g, body, 0, H * 0.5, 0, R, R, H, 20);
      // 上下顶圈(略大)
      _vp_cyl(g, mats.metalDark, 0, H - 0.02, 0, R + 0.02, R + 0.02, 0.05, 20);
      _vp_cyl(g, mats.metalDark, 0, 0.03, 0, R + 0.02, R + 0.02, 0.05, 20);
      // 三道中部加强棱(torus)
      _vp_torus(g, mats.metalDark, 0, H * 0.32, 0, R, 0.022, 6, 18, Math.PI / 2, 0, 0);
      _vp_torus(g, mats.metalDark, 0, H * 0.5, 0, R, 0.022, 6, 18, Math.PI / 2, 0, 0);
      _vp_torus(g, mats.metalDark, 0, H * 0.68, 0, R, 0.022, 6, 18, Math.PI / 2, 0, 0);

      _vp_cyl(g, mats.metalDark, R * 0.55, H + 0.03, 0, 0.05, 0.05, 0.05, 10);

      _vp_box(g, mats.rust, R * 0.86, H * 0.36, R * 0.55, 0.14, 0.20, 0.02, 0, -0.6, 0);

    // === 7) 木条板箱: 6 面镂空木条筐(角柱 + 横条) + 顶部缝隙 ===
    function makeWoodCrate(mats, opts) {
      opts = opts || {};

        _vp_box(g, mats.woodBrown, half, y, 0, t, t * 1.4, S); // 右
        _vp_box(g, mats.woodBrown, -half, y, 0, t, t * 1.4, S); // 左

    }

    // === 8) 地面碎屑场(InstancedMesh): 矩形区随机散布碎砖/木片/金属屑, 一次 draw call ===
    // makeDebrisField(mats, count, x0,z0, x1,z1, opts?)
    // 紧贴地面, 随机旋转/缩放/微沉; 默认材质 mats.trashMix; 可 opts.mat 指定。
    function makeDebrisField(mats, count, x0, z0, x1, z1, opts) {
      opts = opts || {};
      count = count || 300;
      var mat = opts.mat || mats.trashMix;

      var geo = new THREE.BoxGeometry(1, 1, 1);
      var inst = new THREE.InstancedMesh(geo, mat, count);
      inst.castShadow = false; inst.receiveShadow = true;
      var dummy = new THREE.Object3D();
      var minX = Math.min(x0, x1), maxX = Math.max(x0, x1);
      var minZ = Math.min(z0, z1), maxZ = Math.max(z0, z1);
      var hasColor = false, c = new THREE.Color();
      var palette = [0x8a8275, 0x6b4a2f, 0xb04a3a, 0x9a9a9a, 0xd8d2c4]; // 砖/木/锈红/金属/纸
      for (var i = 0; i < count; i++) {
        var px = minX + Math.random() * (maxX - minX);
        var pz = minZ + Math.random() * (maxZ - minZ);
        var sx = 0.06 + Math.random() * 0.22;
        var sz = 0.05 + Math.random() * 0.18;
        var sy = 0.01 + Math.random() * 0.04;
        dummy.position.set(px, sy * 0.5 - 0.005, pz); // 微沉贴地
        dummy.rotation.set((Math.random() - 0.5) * 0.3, Math.random() * Math.PI * 2, (Math.random() - 0.5) * 0.3);
        dummy.scale.set(sx, sy, sz);
        dummy.updateMatrix();

        if (inst.setColorAt) { // 若材质支持顶点色则上随机调色, 否则忽略

      if (hasColor && inst.instanceColor) inst.instanceColor.needsUpdate = true;

      var g = new THREE.Group();
      g.add(inst);
      return g;
    }


    // ===== town prop set 6 =====
    // ===================== 绿化 / 招贴 / 旗 物件构建器 =====================
    // 约定: 每个 make* 返回一个 THREE.Group(底坐 y=0, 居中 x=z=0, 正面朝 +Z)。
    // 只引用传入的 mats 调色板键(MeshStandardMaterial)。不 scene.add / 不设碰撞。
    // 小工具(局部, 不与全局 mBox/mCyl 重名): 直接 new Mesh 并 add 进 group。

    // 局部网格工厂: 盒
    function _gpBox(g, mat, sx, sy, sz, px, py, pz, ry) {
      var m = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), mat);
      m.position.set(px, py, pz); if (ry) m.rotation.y = ry;
      m.castShadow = true; m.receiveShadow = true; g.add(m); return m;
    }
    // 局部网格工厂: 圆柱(r1顶 r2底)
    function _gpCyl(g, mat, r1, r2, h, px, py, pz, seg) {
      var m = new THREE.Mesh(new THREE.CylinderGeometry(r1, r2, h, seg || 12), mat);
      m.position.set(px, py, pz); m.castShadow = true; m.receiveShadow = true; g.add(m); return m;
    }
    // 局部网格工厂: 球(可压扁做树冠/灌木团)
    function _gpSphere(g, mat, r, px, py, pz, seg) {
      var m = new THREE.Mesh(new THREE.SphereGeometry(r, seg || 8, seg || 6), mat);
      m.position.set(px, py, pz); m.castShadow = true; m.receiveShadow = true; g.add(m); return m;
    }
    // 确定性伪随机(给实例化/不规则用, 同 seed 同结果)
    function _gpRng(seed) { var s = seed || 1; return function () { s = (s * 16807) % 2147483647; return s / 2147483647; }; }

    // 花池: 混凝土或木框 + 内泥土 + 几团灌木(foliage) + 露出的塑料袋垃圾
    // opts.wood=true 用木框; opts.size 边长(默认1.4); opts.litter=true 撒点垃圾
    function makePlanter(mats, opts) {
      opts = opts || {}; var g = new THREE.Group();
      var s = opts.size || 1.4, h = 0.55, t = 0.12; // 边长 / 高 / 壁厚
      var wall = opts.wood ? (mats.woodBrown || mats.concrete) : (mats.concrete || mats.sidewalk);
      // 四壁(微外扩做磨损感)
      _gpBox(g, wall, s, h, t, 0, h / 2, s / 2 - t / 2);          // 前
      _gpBox(g, wall, s, h, t, 0, h / 2, -(s / 2 - t / 2));       // 后
      _gpBox(g, wall, t, h, s, s / 2 - t / 2, h / 2, 0);          // 右
      _gpBox(g, wall, t, h, s, -(s / 2 - t / 2), h / 2, 0);       // 左
      // 顶沿压条(混凝土更厚, 模拟磕碰缺角靠轻微下沉的小块)
      _gpBox(g, wall, s + 0.06, 0.06, 0.08, 0, h - 0.03, s / 2 - 0.04);
      _gpBox(g, wall, s + 0.06, 0.06, 0.08, 0, h - 0.03, -(s / 2 - 0.04));

      var fol = mats.foliage || mats.leafGreen;
      var rng = _gpRng(opts.seed || 7);
      for (var i = 0; i < 5; i++) {
        var bx = (rng() - 0.5) * (s - 0.5), bz = (rng() - 0.5) * (s - 0.5);
        var r = 0.22 + rng() * 0.16, m = _gpSphere(g, fol, r, bx, h - 0.05 + r * 0.55, bz, 7);
        m.scale.set(1, 0.8 + rng() * 0.3, 1);

      if (opts.litter !== false) {
        var bag = _gpSphere(g, mats.trashMix || mats.paper, 0.12, (rng() - 0.5) * s * 0.6, h - 0.04, (rng() - 0.5) * s * 0.6, 6);
        bag.scale.set(1.3, 0.5, 1.1);
      }
      return g;
    }

    // 行道树: 树干(微锥/略弯) + 2~3根分叉枝 + 树冠(多个压扁 foliage 球叠成不规则蓬), 略不规则
    // opts.h 总高(默认5); opts.bare=true 落叶光秃(少冠)
    function makeStreetTree(mats, opts) {
      opts = opts || {}; var g = new THREE.Group();
      var H = opts.h || 5, rng = _gpRng(opts.seed || 13);
      var trunkH = H * 0.46, r0 = 0.16 + H * 0.012;
      var bark = mats.woodBrown || mats.dirt;

      for (var i = 0; i < segs; i++) {

      for (var b = 0; b < nb; b++) {

        var bl = 0.7 + rng() * 0.5;
        var br = _gpCyl(g, bark, lastR * 0.4, lastR * 0.7, bl, Math.cos(ang) * bl * 0.3, topY + bl * 0.3, Math.sin(ang) * bl * 0.3, 6);
        br.rotation.set(Math.sin(ang) * 0.7, 0, -Math.cos(ang) * 0.7);
      }
      // 树冠: 一大球 + 若干小球簇(不规则), 落叶款则稀疏
      if (!opts.bare) {
        var crownR = H * 0.26, cy = topY + crownR * 0.5;
        var main = _gpSphere(g, fol, crownR, 0, cy, 0, 9); main.scale.set(1.1, 0.92, 1.05);
        var lobes = 6;
        for (var c = 0; c < lobes; c++) {

          var off = crownR * (0.7 + rng() * 0.3);

        for (var d = 0; d < 4; d++) {
          var a3 = rng() * Math.PI * 2;

        }
      }
      return g;
    }

    // 矮灌木丛: 多团压扁 foliage 球聚成不规则一坨 + 底下零星枯枝
    // opts.r 半径(默认0.6)
    function makeBush(mats, opts) {
      opts = opts || {}; var g = new THREE.Group();
      var R = opts.r || 0.6, fol = mats.foliage || mats.leafGreen, rng = _gpRng(opts.seed || 23);
      var n = 6;
      for (var i = 0; i < n; i++) {
        var a = rng() * Math.PI * 2, d = rng() * R * 0.7;
        var rr = R * (0.4 + rng() * 0.4);

        m.scale.set(1, 0.78, 1);

      var bark = mats.woodBrown || mats.dirt;
      for (var b = 0; b < 3; b++) {
        var ab = rng() * Math.PI * 2;
        var br = _gpCyl(g, bark, 0.015, 0.025, 0.4, Math.cos(ab) * R * 0.4, 0.2, Math.sin(ab) * R * 0.4, 5);
        br.rotation.z = (rng() - 0.5) * 0.8;
      }
      return g;
    }

    // 窗台花箱: 长木/塑料箱 + 泥土 + 一排小花团 + 垂下的藤蔓; 默认贴墙朝 +Z
    // opts.len 长(默认1.2); opts.blue/opts.green 改箱色
    function makeFlowerBox(mats, opts) {
      opts = opts || {}; var g = new THREE.Group();
      var L = opts.len || 1.2, W = 0.26, Hh = 0.24, t = 0.04;
      var box = opts.blue ? (mats.plasticBlue || mats.woodBrown) : (opts.green ? (mats.plasticGreen || mats.woodBrown) : (mats.woodBrown || mats.plasticGreen));
      // 箱体四壁

      _gpBox(g, box, L, Hh, t, 0, Hh / 2, -(W / 2 - t / 2));
      _gpBox(g, box, t, Hh, W, L / 2 - t / 2, Hh / 2, 0);
      _gpBox(g, box, t, Hh, W, -(L / 2 - t / 2), Hh / 2, 0);
      _gpBox(g, box, L - 2 * t, t, W - 2 * t, 0, t / 2, 0); // 底

      _gpBox(g, mats.dirt || mats.woodBrown, L - 2 * t, 0.06, W - 2 * t, 0, Hh - 0.05, 0);
      // 一排小花团(foliage 绿叶 + 彩花点)
      var fol = mats.foliage || mats.leafGreen, rng = _gpRng(opts.seed || 31);

      var cnt = Math.max(3, Math.round(L / 0.28));
      for (var i = 0; i < cnt; i++) {

        _gpSphere(g, fol, 0.1, fx, Hh + 0.05, 0, 6).scale.set(1, 0.9, 1);

        _gpSphere(g, fc, 0.05, fx, Hh + 0.13, (rng() - 0.5) * 0.08, 5);
      }

      for (var v = 0; v < 3; v++) {
        var vx = -L * 0.3 + v * L * 0.3;
        var vine = _gpCyl(g, fol, 0.02, 0.03, 0.22, vx, Hh - 0.11, W / 2 + 0.01, 5);
        vine.scale.set(1, 1, 0.5);
      }
      return g;
    }

    // 横幅/布幅: 两端固定(杆或墙挂), 中间下垂的脏布(fabric), 带磨损破口 + 印字色块
    // opts.span 跨度(默认3); opts.color 选 fabricRed/Blue/Green; opts.tatter 破损
    function makeBanner(mats, opts) {
      opts = opts || {}; var g = new THREE.Group();
      var span = opts.span || 3, sag = 0.45, fh = 0.7, y = 2.4;
      var cloth = opts.color || mats.fabricRed || mats.fabricBlue;

      for (var i = 0; i < segs; i++) {
        var fx = -span / 2 + (i + 0.5) * span / segs;
        var tt = (i + 0.5) / segs * 2 - 1;            // -1..1
        var dy = -sag * (1 - tt * tt);                 // 抛物下垂
        var pm = new THREE.Mesh(new THREE.PlaneGeometry(span / segs + 0.02, fh), cloth);
        pm.position.set(fx, y + dy, 0); pm.rotation.x = 0;

      var ink = mats.paintWhite || mats.paper;

        var kx = -span * 0.28 + k * span * 0.28;
        var bl = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.18), ink);
        bl.position.set(kx, y - sag * 0.55, 0.01); bl.material.side = THREE.DoubleSide; g.add(bl);
      }
      // 两端绳/扣
      var rope = mats.metalDark || mats.rust;

      _gpCyl(g, rope, 0.02, 0.02, 0.25, span / 2, y + 0.1, 0, 5).rotation.z = Math.PI / 2;
      // 破口(底边撕下的一角, 用窄三角靠压扁盒近似)
      if (opts.tatter !== false) {

        rip.position.set(span * 0.32, y - fh * 0.7, 0.005); rip.rotation.z = 0.4;
        rip.material.side = THREE.DoubleSide; g.add(rip);
      }
      return g;
    }

    // 旗: 旗杆(金属) + 顶球 + 布旗(fabric, 微飘/带褶) + 升旗绳
    // opts.h 杆高(默认5); opts.color 旗色; opts.wave 飘动幅度
    function makeFlag(mats, opts) {
      opts = opts || {}; var g = new THREE.Group();
      var H = opts.h || 5, pole = mats.metalGray || mats.chrome;
      // 底座
      _gpCyl(g, mats.concrete || mats.metalDark, 0.2, 0.28, 0.2, 0, 0.1, 0, 12);
      // 杆(上细)
      _gpCyl(g, pole, 0.04, 0.06, H, 0, H / 2 + 0.18, 0, 10);
      // 顶球(金球)
      _gpSphere(g, mats.chrome || mats.paintYellow, 0.09, 0, H + 0.22, 0, 8);
      // 布旗: 多段 plane 顺杆挂, 各段沿 X 渐离杆并加波浪 Z 偏移模拟飘
      var cloth = opts.color || mats.fabricBlue || mats.fabricRed;
      var fw = 1.6, fhh = 1.0, segs = 6, top = H - 0.2, wave = opts.wave == null ? 0.18 : opts.wave;
      for (var i = 0; i < segs; i++) {

        var zoff = Math.sin((t0) * 6.0) * wave * (t0);    // 越远端飘越大
        var pm = new THREE.Mesh(new THREE.PlaneGeometry(fw / segs + 0.01, fhh), cloth);
        pm.position.set(fx, top - fhh / 2, zoff);
        pm.rotation.y = Math.cos(t0 * 6.0) * wave * 1.4;
        pm.material.side = THREE.DoubleSide; pm.castShadow = true; g.add(pm);
      }
