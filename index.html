    }

    // 墙面海报/涂鸦区: 一片叠层破海报(脏白/彩) + 撕角 + 几道霓虹涂鸦发光; 默认贴 +Z 面(墙在 -Z 侧)
    // opts.w,opts.h 区域尺寸(默认2.4x2); opts.neon=true 加发光涂鸦
    function makePosterWall(mats, opts) {
      opts = opts || {}; var g = new THREE.Group();
      var W = opts.w || 2.4, Hh = opts.h || 2.0, rng = _gpRng(opts.seed || 41);
      var posterMats = [mats.paper, mats.paintYellow, mats.paintBlue, mats.paintRed, mats.paintWhite, mats.cardboard];
      // 多张海报随机叠贴(各自微旋, z 微叠避免 z-fighting)
      var n = 9;
      for (var i = 0; i < n; i++) {
        var pw = 0.5 + rng() * 0.7, ph = 0.6 + rng() * 0.8;
        var px = (rng() - 0.5) * (W - pw), py = ph / 2 + rng() * (Hh - ph);
        var mat = posterMats[(i + Math.floor(rng() * 6)) % posterMats.length] || mats.paper;
        var pm = new THREE.Mesh(new THREE.PlaneGeometry(pw, ph), mat);
        pm.position.set(px, py, 0.005 + i * 0.004);
        pm.rotation.z = (rng() - 0.5) * 0.18;
        pm.material.side = THREE.DoubleSide; pm.receiveShadow = true; g.add(pm);
        // 撕角(露出底层): 小块脏白
        if (rng() > 0.5) {
          var tr = new THREE.Mesh(new THREE.PlaneGeometry(pw * 0.3, ph * 0.25), mats.plaster || mats.concrete);
          tr.position.set(px + pw * 0.3, py + ph * 0.3, 0.004 + i * 0.004);
          tr.rotation.z = (rng() - 0.5) * 0.5; tr.material.side = THREE.DoubleSide; g.add(tr);
        }
      }
      // 霓虹涂鸦发光条(可选, 让 bloom 点亮)
      if (opts.neon) {
        var neons = [mats.neonPink, mats.neonCyan];
        for (var k = 0; k < 4; k++) {
          var nm = neons[k % 2] || mats.neonPink;
          var gw = 0.4 + rng() * 0.9;
          var gr = new THREE.Mesh(new THREE.PlaneGeometry(gw, 0.07 + rng() * 0.06), nm);
          gr.position.set((rng() - 0.5) * W, 0.3 + rng() * (Hh - 0.4), 0.05 + k * 0.003);
          gr.rotation.z = (rng() - 0.5) * 1.2; gr.material.side = THREE.DoubleSide; g.add(gr);
        }
      }
      return g;
    }

    // 散落落叶/碎垃圾场(InstancedMesh, 一次 draw call 出几百片): 矩形区 [x0,z0]~[x1,z1] 随机散布
    // 平贴地(略微沉), 随机旋转/缩放; mats 用 leafGreen / foliage / trashMix
    function makeLeafLitterField(mats, count, x0, z0, x1, z1) {
      count = count || 200;
      var mat = mats.leafGreen || mats.foliage || mats.trashMix;
      var geo = new THREE.PlaneGeometry(0.16, 0.1);            // 单片小叶/碎纸
      var inst = new THREE.InstancedMesh(geo, mat, count);
      inst.receiveShadow = true; inst.castShadow = false;
      var dummy = new THREE.Object3D(), rng = _gpRng(987);
      var ax = x0 == null ? -2 : x0, az = z0 == null ? -2 : z0;
      var bx = x1 == null ? 2 : x1, bz = z1 == null ? 2 : z1;
      for (var i = 0; i < count; i++) {
        var px = ax + rng() * (bx - ax), pz = az + rng() * (bz - az);
        dummy.position.set(px, 0.012 + rng() * 0.01, pz);     // 微浮避免穿地
        dummy.rotation.set(-Math.PI / 2 + (rng() - 0.5) * 0.5, rng() * Math.PI * 2, (rng() - 0.5) * 0.4);
        var sc = 0.6 + rng() * 1.1; dummy.scale.set(sc, sc, sc);
        dummy.updateMatrix(); inst.setMatrixAt(i, dummy.matrix);
      }
      inst.instanceMatrix.needsUpdate = true;
      // 包成 Group 以符合统一返回约定
      var g = new THREE.Group(); g.add(inst); return g;
    }

    // ===== town prop set 7 =====
    // ============================================================ 地面细节/路面 builder 群
    // 约定: 每个 builder 返回一个 THREE.Group(局部坐标, 平贴地面 y≈0, 居中 x=z=0)。
    // 全部用平贴地的薄 Plane/Box 做"贴花", 不参与碰撞(装配阶段 mAdd(g,false,false))。
    // 朝向: 正面/纹理走向默认沿 +Z(道路前进方向)。无参也能 build。
    // 薄贴花统一抬起一点点避免 z-fighting; 用 polygonOffset 思路靠微小 y 偏移分层。

    // 小工具: 造一片平贴地的薄长方面片(默认水平躺平), 返回 Mesh。
    // w 沿 x, d 沿 z, y 为离地高度(很小), rotY 绕竖轴旋转。
    function _groundQuad(mat, w, d, y, rotY) {
      var geo = new THREE.PlaneGeometry(w, d);
      var m = new THREE.Mesh(geo, mat);
      m.rotation.x = -Math.PI / 2;        // 躺平朝上
      if (rotY) m.rotation.z = rotY;      // PlaneGeometry 旋平后, 绕原法线即 rotation.z
      m.position.y = (y == null ? 0.012 : y);
      m.receiveShadow = true;
      return m;
    }

    // 斑马线: 一排沿 +Z 排列的白漆横条(每条横向沿 x)。opts.bars 条数, opts.span 总长(沿z)。
    function makeCrosswalk(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var bars = opts.bars || 6;
      var width = opts.width || 4.0;        // 斑马线整体横宽(沿 x)
      var barW = opts.barW || 0.45;         // 单条厚度(沿 z)
      var gap = opts.gap || 0.42;           // 条间空隙
      var paint = mats.paintWhite;
      var pitch = barW + gap;
      var z0 = -((bars - 1) * pitch) / 2;
      for (var i = 0; i < bars; i++) {
        // 略微随机化每条宽度/磨损, 用微小 y 抖动让油漆看着不平整
        var wornW = barW * (0.86 + Math.random() * 0.18);
        var bar = _groundQuad(paint, width * (0.92 + Math.random() * 0.08), wornW, 0.014 + Math.random() * 0.004, 0);
        bar.position.x = (Math.random() - 0.5) * 0.08;
        bar.position.z = z0 + i * pitch;
        g.add(bar);
        // 磨掉一角: 叠一小片沥青色把油漆"擦掉"一块(随机出现)
        if (Math.random() < 0.5) {
          var wear = _groundQuad(mats.asphalt, width * (0.18 + Math.random() * 0.2), wornW * 0.9, 0.016, 0);
          wear.position.x = (Math.random() - 0.5) * width * 0.6;
          wear.position.z = bar.position.z;
          g.add(wear);
        }
      }
      return g;
    }

    // 道路标线: 中线(虚线/实线)、停止线。opts.variant: 'dash'|'solid'|'stop'|'double'。沿 +Z 延伸。
    function makeLaneMarking(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var variant = opts.variant || 'dash';
      var len = opts.length || 8.0;         // 沿 z 总长
      var col = opts.color === 'white' ? mats.paintWhite : mats.paintYellow;
      if (variant === 'stop') {
        // 停止线: 一道横向粗白条(沿 x)
        var stop = _groundQuad(mats.paintWhite, opts.width || 3.6, 0.4, 0.014, 0);
        g.add(stop);
        return g;
      }
      if (variant === 'solid' || variant === 'double') {
        var line = _groundQuad(col, 0.16, len, 0.014, 0);
        line.position.x = (variant === 'double') ? -0.13 : 0;
        g.add(line);
        if (variant === 'double') {
          var line2 = _groundQuad(col, 0.16, len, 0.014, 0);
          line2.position.x = 0.13;
          g.add(line2);
        }
        return g;
      }
      // 默认 dash: 一串虚线段
      var seg = 1.0, gap = 1.0, pitch = seg + gap;
      var n = Math.max(1, Math.floor(len / pitch));
      var z0 = -((n - 1) * pitch) / 2;
      for (var i = 0; i < n; i++) {
        var dash = _groundQuad(col, 0.16, seg * (0.8 + Math.random() * 0.25), 0.014, 0);
        dash.position.z = z0 + i * pitch;
        dash.position.x = (Math.random() - 0.5) * 0.05;
        g.add(dash);
      }
      return g;
    }

    // 水洼: 暗反光不规则水面(几片叠加的圆盘, 略亮/玻璃感模拟反光) + 一圈湿渍边。
    function makePuddle(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var r = opts.radius || 0.9;
      // 湿渍外圈(用 dirt 暗一点, 比水面大)
      var wet = new THREE.Mesh(new THREE.CircleGeometry(r * 1.25, 20), mats.dirt);
      wet.rotation.x = -Math.PI / 2; wet.position.y = 0.008; wet.receiveShadow = true;
      wet.scale.set(1, 1, 0.78 + Math.random() * 0.3);   // 压扁成不规则
      g.add(wet);
      // 水面主体(glass 有反光感) 由 2~3 片偏移圆叠出不规则轮廓
      var blobs = 2 + (Math.random() < 0.5 ? 1 : 0);
      for (var i = 0; i < blobs; i++) {
        var rr = r * (0.55 + Math.random() * 0.5);
        var water = new THREE.Mesh(new THREE.CircleGeometry(rr, 18), mats.glass);
        water.rotation.x = -Math.PI / 2;
        water.position.set((Math.random() - 0.5) * r * 0.5, 0.011 + i * 0.0005, (Math.random() - 0.5) * r * 0.5);
        water.scale.set(1, 1, 0.7 + Math.random() * 0.35);
        water.rotation.z = Math.random() * Math.PI;
        g.add(water);
      }
      return g;
    }

    // 裂缝: 沿 +Z 的细暗线, 由若干小段微转拼成折线裂纹(主缝 + 几条分叉)。
    function makeCrackDecal(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var len = opts.length || 3.0;
      var segs = Math.max(3, Math.floor(len / 0.5));
      var x = 0, z = -len / 2, ang = 0;
      for (var i = 0; i < segs; i++) {
        ang += (Math.random() - 0.5) * 0.6;
        var sl = len / segs;
        var w = 0.04 + Math.random() * 0.04;
        var crk = _groundQuad(mats.metalDark, w, sl * 1.1, 0.013, ang);
        crk.position.x = x + Math.sin(ang) * sl * 0.5;
        crk.position.z = z + Math.cos(ang) * sl * 0.5;
        g.add(crk);
        // 偶尔分叉
        if (Math.random() < 0.3) {
          var bl = sl * (0.6 + Math.random());
          var br = _groundQuad(mats.metalDark, w * 0.7, bl, 0.013, ang + (Math.random() < 0.5 ? 1 : -1) * 0.8);
          br.position.x = crk.position.x; br.position.z = crk.position.z;
          g.add(br);
        }
        x = crk.position.x + Math.sin(ang) * sl * 0.5;
        z = crk.position.z + Math.cos(ang) * sl * 0.5;
      }
      return g;
    }

    // 油污暗斑: 几片叠加的黑亮油渍圆(metalDark 模拟油的暗反光) + 散落小溅点。
    function makeOilStain(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var r = opts.radius || 0.7;
      // 主油斑(扁圆)
      var main = new THREE.Mesh(new THREE.CircleGeometry(r, 20), mats.metalDark);
      main.rotation.x = -Math.PI / 2; main.position.y = 0.009; main.receiveShadow = true;
      main.scale.set(1, 1, 0.6 + Math.random() * 0.4);
      main.rotation.z = Math.random() * Math.PI;
      g.add(main);
      // 中心更亮一层(rust/tire 表现新鲜油层) — 用 tire 黑亮
      var core = new THREE.Mesh(new THREE.CircleGeometry(r * 0.5, 16), mats.tire);
      core.rotation.x = -Math.PI / 2; core.position.y = 0.011;
      core.position.set((Math.random() - 0.5) * r * 0.3, 0.011, (Math.random() - 0.5) * r * 0.3);
      g.add(core);
      // 溅点
      var drops = 4 + Math.floor(Math.random() * 4);
      for (var i = 0; i < drops; i++) {
        var dr = 0.04 + Math.random() * 0.08;
        var d = new THREE.Mesh(new THREE.CircleGeometry(dr, 8), mats.metalDark);
        d.rotation.x = -Math.PI / 2; d.position.y = 0.0095;
        var a = Math.random() * Math.PI * 2, dist = r * (0.7 + Math.random() * 0.7);
        d.position.x = Math.cos(a) * dist; d.position.z = Math.sin(a) * dist;
        g.add(d);
      }
      return g;
    }

    // 落叶满地: InstancedMesh 在矩形区 [x0,z0]~[x1,z1] 随机散布落叶(平贴地, 随机旋转/缩放/微沉)。
    // 一次 draw call 出 count 片。叶片用一小片倾斜的方形(leafGreen/foliage 混)。
    function makeLeafScatter(mats, count, x0, z0, x1, z1) {
      count = count || 200;
      var g = new THREE.Group();
      var leafGeo = new THREE.PlaneGeometry(0.18, 0.13);
      var inst = new THREE.InstancedMesh(leafGeo, mats.leafGreen, count);
      inst.receiveShadow = true; inst.castShadow = false;
      var mat4 = new THREE.Matrix4();
      var q = new THREE.Quaternion();
      var e = new THREE.Euler();
      var pos = new THREE.Vector3();
      var scl = new THREE.Vector3();
      var minX = Math.min(x0, x1), maxX = Math.max(x0, x1);
      var minZ = Math.min(z0, z1), maxZ = Math.max(z0, z1);
      for (var i = 0; i < count; i++) {
        pos.set(minX + Math.random() * (maxX - minX),
                0.006 + Math.random() * 0.01,
                minZ + Math.random() * (maxZ - minZ));
        // 躺平为主 + 轻微翘起, 随机绕竖轴转
        e.set(-Math.PI / 2 + (Math.random() - 0.5) * 0.5, Math.random() * Math.PI * 2, (Math.random() - 0.5) * 0.4);
        q.setFromEuler(e);
        var s = 0.7 + Math.random() * 0.8;
        scl.set(s, s, s);
        mat4.compose(pos, q, scl);
        inst.setMatrixAt(i, mat4);
      }
      inst.instanceMatrix.needsUpdate = true;
      // 第二层枯叶(foliage 偏黄棕) 让颜色不单调
      var inst2 = new THREE.InstancedMesh(new THREE.PlaneGeometry(0.16, 0.12), mats.foliage, Math.floor(count * 0.5));
      inst2.receiveShadow = true;
      var n2 = Math.floor(count * 0.5);
      for (var j = 0; j < n2; j++) {
        pos.set(minX + Math.random() * (maxX - minX), 0.006 + Math.random() * 0.01, minZ + Math.random() * (maxZ - minZ));
        e.set(-Math.PI / 2 + (Math.random() - 0.5) * 0.5, Math.random() * Math.PI * 2, (Math.random() - 0.5) * 0.4);
        q.setFromEuler(e);
        var s2 = 0.6 + Math.random() * 0.7;
        scl.set(s2, s2, s2);
        mat4.compose(pos, q, scl);
        inst2.setMatrixAt(j, mat4);
      }
      inst2.instanceMatrix.needsUpdate = true;
      g.add(inst); g.add(inst2);
      return g;
    }

    // 路缘堆积脏物: 沿 +Z 方向的一条脏物带(贴地脏渍底 + 散落小纸/罐/碎屑小块), 表现路边积污。
    // opts.length 带长(沿z), opts.width 带宽(沿x)。
    function makeGutterTrash(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var len = opts.length || 6.0;
      var wid = opts.width || 0.5;
      // 底层脏渍带(dirt)
      var grime = _groundQuad(mats.dirt, wid, len, 0.007, 0);
      grime.scale.set(1, 1, 1);
      g.add(grime);
      // 沿带随机散落的小垃圾块(纸/卡纸/杂色/罐头), 用小立体块带一点高度更真实
      var n = Math.max(6, Math.floor(len * 2.2));
      var palette = [mats.paper, mats.cardboard, mats.trashMix, mats.plasticGreen, mats.plasticBlue];
      for (var i = 0; i < n; i++) {
        var pick = palette[Math.floor(Math.random() * palette.length)];
        var kind = Math.random();
        var piece;
        if (kind < 0.4) {
          // 平躺的纸片/卡纸
          var pw = 0.1 + Math.random() * 0.22;
          piece = _groundQuad(pick, pw, pw * (0.6 + Math.random() * 0.8), 0.012 + Math.random() * 0.01, Math.random() * Math.PI);
        } else if (kind < 0.7) {
          // 小罐/瓶(横躺的小圆柱)
          piece = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.13, 8), Math.random() < 0.5 ? mats.metalGray : pick);
          piece.rotation.z = Math.PI / 2; piece.rotation.y = Math.random() * Math.PI;
          piece.position.y = 0.035;
          piece.castShadow = true;
        } else {
          // 一小团垃圾(揉皱小块)
          piece = new THREE.Mesh(new THREE.BoxGeometry(0.1 + Math.random() * 0.1, 0.05 + Math.random() * 0.05, 0.1 + Math.random() * 0.1), pick);
          piece.position.y = 0.04; piece.rotation.y = Math.random() * Math.PI;
          piece.castShadow = true;
        }
        piece.position.x = (Math.random() - 0.5) * wid * 0.9;
        piece.position.z = (Math.random() - 0.5) * len * 0.96;
        g.add(piece);
      }
      return g;
    }

    // 墙根污渍/水渍贴片: 一组竖直挂在墙面上的污渍片(默认贴在 z 面, 顶对齐 y=0 向下流的水渍)。
    // 注意: 这组是【竖直】贴片(法线沿 +Z), 装配时贴到墙面外侧; 底部坐落 y=0 向上延伸。
    // opts.height 渍高, opts.width 整体宽。
    function makeStainSet(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var h = opts.height || 2.2;
      var w = opts.width || 2.4;
      // 主水渍(从上往下的暗渍, 用 dirt) — 竖直面片
      var n = 3 + Math.floor(Math.random() * 3);
      for (var i = 0; i < n; i++) {
        var sw = 0.2 + Math.random() * 0.6;
        var sh = h * (0.4 + Math.random() * 0.6);
        var st = new THREE.Mesh(new THREE.PlaneGeometry(sw, sh), Math.random() < 0.6 ? mats.dirt : mats.rust);
        st.position.x = (Math.random() - 0.5) * w;
        st.position.y = h - sh / 2 - Math.random() * 0.2;   // 顶部对齐往下挂
        st.position.z = 0.01 + i * 0.002;                   // 略离墙避免 z-fight
        g.add(st);
      }
      // 墙根积污(贴近地面的横向脏带)
      var base = new THREE.Mesh(new THREE.PlaneGeometry(w, 0.5), mats.dirt);
      base.position.set(0, 0.25, 0.005);
      g.add(base);
      // 几道锈水滴痕(细长 rust 条)
      var drips = 2 + Math.floor(Math.random() * 3);
      for (var j = 0; j < drips; j++) {
        var dh = h * (0.3 + Math.random() * 0.5);
        var dr = new THREE.Mesh(new THREE.PlaneGeometry(0.05 + Math.random() * 0.05, dh), mats.rust);
        dr.position.set((Math.random() - 0.5) * w, h - dh / 2, 0.013);
        g.add(dr);
      }
      return g;
    }


    // ===== 城镇室内家具 builder(6套) =====

    // == int 0 ==
    // ============================================================
    // 店铺(底层商业)室内家具构建器 —— 共 7 件
    // 私有图元助手(命名加 _sh 前缀, 避免与 _siBox/_siCyl 冲突, 自包含)
    // ============================================================
    function _shBox(g, sx, sy, sz, mat, x, y, z) {
      var m = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), mat);
      m.position.set(x || 0, y || 0, z || 0);
      m.castShadow = true; m.receiveShadow = true; g.add(m); return m;
    }
    function _shCyl(g, rt, rb, h, mat, x, y, z, seg) {
      var m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg || 14), mat);
      m.position.set(x || 0, y || 0, z || 0);
      m.castShadow = true; m.receiveShadow = true; g.add(m); return m;
    }
    // 一个随机摆放的小货物(盒/罐/瓶), 返回 mesh
    function _shGoods(g, kind, mat, x, y, z, sx, sy, sz) {
      var m;
      if (kind === 'can') {
        m = new THREE.Mesh(new THREE.CylinderGeometry(sx, sx, sy, 12), mat);
        m.position.set(x, y + sy / 2, z);
      } else if (kind === 'bottle') {
        m = new THREE.Group();
        var body = new THREE.Mesh(new THREE.CylinderGeometry(sx, sx, sy * 0.7, 12), mat);
        body.position.y = sy * 0.35; body.castShadow = true; m.add(body);
        var neck = new THREE.Mesh(new THREE.CylinderGeometry(sx * 0.4, sx * 0.55, sy * 0.3, 10), mat);
        neck.position.y = sy * 0.85; neck.castShadow = true; m.add(neck);
        m.position.set(x, y, z);
      } else { // box
        m = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz || sx), mat);
        m.position.set(x, y + sy / 2, z);
      }
      m.castShadow = true; m.receiveShadow = true; g.add(m); return m;
    }

    // ------------------------------------------------------------
    // 1) makeShopCounter —— 长收银柜台: 台面 + 前脸面板(分块) + 侧板 + 踢脚 + 台下储物隔
    //    opts.len(默认2.2) opts.body(柜身漆色键) opts.top(台面色键) opts.lit(台前光带, 默认false)
    // ------------------------------------------------------------
    function makeShopCounter(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var body = mats[opts.body] || mats.woodDark || mats.woodBrown;
      var top = mats[opts.top] || mats.chrome || mats.metalGray;
      var trim = mats.metalDark || mats.metalGray;
      var len = opts.len || 2.2, depth = 0.6, H = 0.95;

    // 白板: 板面(白漆) + 边框 + 双立柱支架 + 底横梁/脚轮 + 笔槽(含笔+板擦) + 几笔字迹感色块
    // opts: w(宽 默认1.6), h(板高 默认1.0)

    // == int 4 ==
    // ============================================================================
    // 室内隔断 / 门 / 灯具 构建器组 (把楼层分成房间 + 照明)
    // 局部坐标: 底坐 y=0, 大致居中, 正面朝 +Z。返回单个 THREE.Group。
    // 共用小工具: _intMesh(创建带阴影 mesh)。命名 _int* 避免与已有冲突。
    // ============================================================================
    function _intMesh(geo, mat, x, y, z) {
      var m = new THREE.Mesh(geo, mat);
      m.position.set(x || 0, y || 0, z || 0);
      m.castShadow = true; m.receiveShadow = true;
      return m;
    }

    // ----------------------------------------------------------------------------
    // 室内隔断墙段: 墙体(可留门洞) + 上下踢脚/顶线 + 门框 + 表面分缝
    // opts: { w:墙宽(默认3.0), h:墙高(默认2.6), thick:厚(默认0.12),
    //         door:留门洞(默认false), doorW:门洞宽(默认0.95), doorX:门洞中心x偏移(默认0居中),
    //         color:墙面键(默认plaster) }
    // ----------------------------------------------------------------------------
    function makePartitionWall(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var W = opts.w || 3.0, H = opts.h || 2.6, T = opts.thick || 0.12;
      var wallMat = opts.color ? mats[opts.color] : mats.plaster;
      if (!wallMat) wallMat = mats.plaster;
      var dw = opts.doorW || 0.95, dh = 2.05, dx = opts.doorX || 0.0;

      if (opts.door) {
        // 用门洞两侧 + 门楣 拼出带洞的墙
        var leftW = (W * 0.5 + dx) - dw * 0.5;
        var rightW = (W * 0.5 - dx) - dw * 0.5;
        if (leftW < 0.02) leftW = 0.02;
        if (rightW < 0.02) rightW = 0.02;
        // 左段
        g.add(_intMesh(new THREE.BoxGeometry(leftW, H, T), wallMat,
          -W * 0.5 + leftW * 0.5, H * 0.5, 0));
        // 右段
        g.add(_intMesh(new THREE.BoxGeometry(rightW, H, T), wallMat,
          W * 0.5 - rightW * 0.5, H * 0.5, 0));
        // 门楣 (洞上方)
        g.add(_intMesh(new THREE.BoxGeometry(dw, H - dh, T), wallMat,
          dx, dh + (H - dh) * 0.5, 0));
        // 门框 (洞四周白漆框)
        var fr = 0.06;
        g.add(_intMesh(new THREE.BoxGeometry(fr, dh + fr, T + 0.04), mats.paintWhite,
          dx - dw * 0.5 - fr * 0.5, (dh) * 0.5, 0)); // 左框
        g.add(_intMesh(new THREE.BoxGeometry(fr, dh + fr, T + 0.04), mats.paintWhite,
          dx + dw * 0.5 + fr * 0.5, (dh) * 0.5, 0)); // 右框
        g.add(_intMesh(new THREE.BoxGeometry(dw + fr * 2, fr, T + 0.04), mats.paintWhite,
          dx, dh + fr * 0.5, 0)); // 上框
      } else {
        // 整面墙
        g.add(_intMesh(new THREE.BoxGeometry(W, H, T), wallMat, 0, H * 0.5, 0));
      }
      // 踢脚线 (底)
      g.add(_intMesh(new THREE.BoxGeometry(W, 0.1, T + 0.03), mats.woodDark, 0, 0.05, 0));
      // 顶线 (顶部一条)
      g.add(_intMesh(new THREE.BoxGeometry(W, 0.07, T + 0.02), mats.paintWhite, 0, H - 0.035, 0));
      // 表面竖向分缝 (两道, 显墙板拼接)
      var i;
      for (i = 0; i < 2; i++) {
        g.add(_intMesh(new THREE.BoxGeometry(0.015, H - 0.2, 0.01), mats.concrete,
          (i - 0.5) * W * 0.5, H * 0.5, T * 0.5 + 0.006));
      }
      return g;
    }

    // ----------------------------------------------------------------------------
    // 室内门 + 门框 + 把手 + 面板装饰: 可半开
    // opts: { w:门扇宽(默认0.9), h:门高(默认2.05), open:开角(弧度,默认0关; true=>1.0),
    //         color:门面键(默认woodBrown) }
    // 铰链在 -x 边, 门关时填满门洞, 正面朝 +Z。
    // ----------------------------------------------------------------------------
    function makeInteriorDoor(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var W = opts.w || 0.9, H = opts.h || 2.05, T = 0.05;
      var doorMat = opts.color ? mats[opts.color] : mats.woodBrown;
      if (!doorMat) doorMat = mats.woodBrown;
      var openA = opts.open === true ? 1.0 : (opts.open || 0);

      // 门框 (贴洞口的框, 不随门转)
      var fr = 0.07, ft = 0.14;
      g.add(_intMesh(new THREE.BoxGeometry(fr, H + fr, ft), mats.paintWhite, -W * 0.5 - fr * 0.5, H * 0.5, 0));
      g.add(_intMesh(new THREE.BoxGeometry(fr, H + fr, ft), mats.paintWhite, W * 0.5 + fr * 0.5, H * 0.5, 0));
      g.add(_intMesh(new THREE.BoxGeometry(W + fr * 2, fr, ft), mats.paintWhite, 0, H + fr * 0.5, 0));

      // 门扇子组 (绕铰链 -x 边旋转)
      var leaf = new THREE.Group();
      leaf.position.set(-W * 0.5, 0, 0); // 铰链轴

      leaf.add(_intMesh(new THREE.BoxGeometry(W, H, T), doorMat, W * 0.5, H * 0.5, 0));
      // 两块凹板装饰 (前后各贴)
      var pIn = mats.woodDark;
      var py, k;
      for (k = 0; k < 2; k++) {
        py = k === 0 ? H * 0.32 : H * 0.7;
        var ph = k === 0 ? H * 0.42 : H * 0.4;
        var panel = _intMesh(new THREE.BoxGeometry(W * 0.66, ph, 0.012), pIn, W * 0.5, py, T * 0.5 + 0.004);
        leaf.add(panel);
        var panelB = _intMesh(new THREE.BoxGeometry(W * 0.66, ph, 0.012), pIn, W * 0.5, py, -T * 0.5 - 0.004);
        leaf.add(panelB);
      }
      // 把手 (近 +x 自由边, 两面)

      g_handle(leaf, mats, hx, H * 0.48, T);
      g.add(leaf);

    // 门把手小件 (杆 + 球, 前后)

      s = _intMesh(new THREE.CylinderGeometry(0.012, 0.012, 0.06, 8), mats.chrome, x, y, -T * 0.5 - 0.03);

    // ----------------------------------------------------------------------------
    // 吸顶灯板: 边框 + 朝下发光面板 (装配吊在天花 y≈2.8, 灯面朝下)
    // opts: { w:宽(默认0.7), d:深(默认0.7), lit:亮(默认true),

    // 灯面在组的底部(y=0 朝下), 边框略上。摆放时把组放到天花处即可。

    function makeCeilingLight(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();

        g.add(_intMesh(new THREE.BoxGeometry(W - 0.06, 0.012, D - 0.06), lampMat, 0, 0.005, 0)); // 发光面
        // 十字格栅 (两条暗条压在发光面上, 像格栅灯)

    // ----------------------------------------------------------------------------

    function makePendantLamp(mats, opts) {

      var lit = opts.lit === false ? false : true;
      var shade = opts.shade || 'cone';
      var bulbY = 0.18; // 灯泡中心高
      // 吊线 (细)
      g.add(_intMesh(new THREE.CylinderGeometry(0.008, 0.008, drop, 6), mats.metalDark,
        0, bulbY + 0.28 + drop * 0.5, 0));
      // 天花底座盘
      g.add(_intMesh(new THREE.CylinderGeometry(0.05, 0.05, 0.03, 12), mats.metalGray,
        0, bulbY + 0.28 + drop, 0));
      // 灯罩
      if (shade === 'dome') {
        var dome = _intMesh(new THREE.SphereGeometry(0.22, 18, 12, 0, Math.PI * 2, 0, Math.PI * 0.55), shadeMat,
          0, bulbY + 0.26, 0);

        g.add(_intMesh(new THREE.CylinderGeometry(0.2, 0.2, 0.01, 20), shadeMat, 0, bulbY + 0.29, 0)); // 顶盖

          0, bulbY + 0.2, 0);

    // ----------------------------------------------------------------------------
    // 吊扇: 吊杆 + 电机壳 + 3~4 扇叶 + 下挂灯 + 拉绳
    // opts: { blades:叶数(默认4), bladeColor:叶色键(默认woodBrown),
    //         drop:吊杆长(默认0.4), light:带下挂灯(默认true), lit:灯亮(默认true) }
    // 顶端接天花, 扇叶水平铺开。组底 y=0 在下挂灯下沿。
    // ----------------------------------------------------------------------------
    function makeCeilingFan(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var n = opts.blades || 4;
      var bladeMat = opts.bladeColor ? mats[opts.bladeColor] : mats.woodBrown;
      if (!bladeMat) bladeMat = mats.woodBrown;
      var drop = opts.drop || 0.4;
      var withLight = opts.light === false ? false : true;
      var lit = opts.lit === false ? false : true;
      var motorY = 0.42; // 电机中心高
      // 吊杆
      g.add(_intMesh(new THREE.CylinderGeometry(0.018, 0.018, drop, 8), mats.metalGray,
        0, motorY + 0.1 + drop * 0.5, 0));
      // 天花座
      g.add(_intMesh(new THREE.CylinderGeometry(0.06, 0.07, 0.04, 12), mats.metalGray,
        0, motorY + 0.1 + drop, 0));
      // 电机壳 (扁圆鼓)
      g.add(_intMesh(new THREE.CylinderGeometry(0.11, 0.13, 0.12, 16), mats.metalDark, 0, motorY, 0));
      g.add(_intMesh(new THREE.CylinderGeometry(0.13, 0.11, 0.05, 16), mats.chrome, 0, motorY + 0.08, 0)); // 上盖
      // 扇叶 (绕中心铺开, 略下倾)
      var i;
      for (i = 0; i < n; i++) {
        var a = (i / n) * Math.PI * 2;
        var arm = new THREE.Group();
        arm.position.set(0, motorY - 0.02, 0);
        arm.rotation.y = a;
        // 叶柄 (金属连接)
        arm.add(_intMesh(new THREE.BoxGeometry(0.12, 0.012, 0.04), mats.metalGray, 0.14, 0, 0));
        // 叶片
        var blade = _intMesh(new THREE.BoxGeometry(0.52, 0.014, 0.13), bladeMat, 0.42, -0.01, 0);
        blade.rotation.z = 0.12; // 桨距角
        arm.add(blade);
        g.add(arm);
      }
      // 下挂灯
      if (withLight) {
        g.add(_intMesh(new THREE.CylinderGeometry(0.06, 0.04, 0.06, 12), mats.chrome, 0, motorY - 0.12, 0)); // 灯颈
        var globe = _intMesh(new THREE.SphereGeometry(0.11, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.62),
          lit ? mats.glassLit : mats.glass, 0, motorY - 0.2, 0);
        globe.rotation.x = Math.PI; // 开口朝下
        globe.material.side = THREE.DoubleSide;
        g.add(globe);
      }
      // 拉绳 (两条小链)
      g.add(_intMesh(new THREE.CylinderGeometry(0.004, 0.004, 0.16, 5), mats.metalGray, 0.05, motorY - 0.16, 0.05));
      g.add(_intMesh(new THREE.SphereGeometry(0.015, 6, 5), mats.metalDark, 0.05, motorY - 0.25, 0.05));

    // ----------------------------------------------------------------------------
    // 挂画/相框 一组: 1~3 幅框, 贴墙 (正面朝 +Z, 背贴 z=0 平面)
    // opts: { count:幅数(默认2), color:框色键(默认woodDark),
    //         art:画面键(默认随机 fabric*; 可指定), y:整组中心高(默认1.5 由装配定, 这里组底=0) }
    // 组底 y=0, 框挂在 y≈1.2~1.7。装配把组贴到墙面即可。
    // ----------------------------------------------------------------------------
    function makeWallArt(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var count = opts.count || 2;
      if (count < 1) count = 1; if (count > 3) count = 3;
      var frameMat = opts.color ? mats[opts.color] : mats.woodDark;
      if (!frameMat) frameMat = mats.woodDark;
      var artKeys = ['fabricBlue', 'fabricRed', 'fabricGreen', 'fabricBrown', 'fabricCream', 'paper'];
      var i;
      var totalW = 0;
      var sizes = [];
      for (i = 0; i < count; i++) {
        // 随机但稳定的画幅尺寸
        var portrait = (i % 2) === 0;
        var fw = portrait ? 0.5 : 0.7;
        var fh = portrait ? 0.68 : 0.5;
        sizes.push([fw, fh]);
        totalW += fw + 0.18;
      }
      var cursorX = -totalW * 0.5 + 0.09;
      var baseY = 1.45;
      for (i = 0; i < count; i++) {
        var fw2 = sizes[i][0], fh2 = sizes[i][1];
        var cx = cursorX + fw2 * 0.5;
        cursorX += fw2 + 0.18;
        var fy = baseY + (i % 2 === 0 ? 0.0 : 0.08); // 错落
        // 外框
        g.add(_intMesh(new THREE.BoxGeometry(fw2 + 0.06, fh2 + 0.06, 0.04), frameMat, cx, fy, 0.02));
        // 内衬 (浅边)
        g.add(_intMesh(new THREE.BoxGeometry(fw2, fh2, 0.02), mats.paintWhite, cx, fy, 0.04));
        // 画面
        var artMat = opts.art ? mats[opts.art] : mats[artKeys[(i * 2) % artKeys.length]];
        if (!artMat) artMat = mats.fabricBlue;
        var canvas = _intMesh(new THREE.PlaneGeometry(fw2 - 0.06, fh2 - 0.06), artMat, cx, fy, 0.052);
        canvas.material.side = THREE.DoubleSide;
        g.add(canvas);
      }
      return g;
    }

    // ----------------------------------------------------------------------------
    // 楼梯/楼板边栏杆: 底导轨 + 顶扶手 + 竖向栏杆条 + 端柱
    // opts: { len:长(默认3.0), h:高(默认1.0), color:键(默认metalGray),
    //         posts:竖条数(默认按len算), wood:木扶手(默认false=>金属) }
    // 沿 +x 方向铺一段, 栏杆面在 z=0。组底 y=0。
    // ----------------------------------------------------------------------------
    function makeStairRailing(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var L = opts.len || 3.0, H = opts.h || 1.0;
      var railMat = opts.color ? mats[opts.color] : mats.metalGray;
      if (!railMat) railMat = mats.metalGray;
      var handMat = opts.wood ? mats.woodBrown : railMat;
      if (opts.wood && !handMat) handMat = mats.woodBrown;
      // 端柱 (两端粗立柱)

      g.add(_intMesh(new THREE.BoxGeometry(0.06, H, 0.06), railMat, -L * 0.5, H * 0.5, 0));
      g.add(_intMesh(new THREE.BoxGeometry(0.06, H, 0.06), railMat, L * 0.5, H * 0.5, 0));

      g.add(_intMesh(new THREE.SphereGeometry(0.045, 10, 8), handMat, -L * 0.5, H + 0.02, 0));
      g.add(_intMesh(new THREE.SphereGeometry(0.045, 10, 8), handMat, L * 0.5, H + 0.02, 0));
      // 顶扶手
      var hand = _intMesh(new THREE.CylinderGeometry(pR, pR, L, 12), handMat, 0, H, 0);
      hand.rotation.z = Math.PI / 2; g.add(hand);
      // 底导轨

        // 箱体
        _vp_box(g, card, ox, y + s[1] * 0.5, oz, s[0], s[1], s[2], 0, ry, 0);

    // 4) 扫把 + 拖把 + 水桶 靠墙(背面 -Z 当墙)
    function makeBroomBucket(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var lean = -0.16; // 上端向后 -Z 倚墙
      // --- 水桶 ---

      // --- 扫把(竿 + 刷头, 倚墙) ---

      var bx = -0.18;
      _vp_cyl(g, mats.woodLight, bx, poleH * 0.5, 0.02, 0.014, 0.014, poleH, 8, lean, 0, 0);

      // --- 拖把(竿 + 灰白拖头) ---
      var mx = 0.16;
      _vp_cyl(g, mats.metalGray, mx, poleH * 0.5, 0.02, 0.013, 0.013, poleH, 8, lean, 0, 0);

    // 5) 人字梯(A 形折梯): 两侧梯腿 + 踏板 + 顶台 + 铰链 + 拉绳
    function makeStepLadder(mats, opts) {
      opts = opts || {};
      var g = new THREE.Group();
      var side = opts.color || mats.paintOrange;
      var H = opts.height || 1.5;
      var spread = 0.36;   // 前后腿张开半距
      var widthHalf = 0.28; // 左右半宽
      var tilt = Math.atan2(spread, H); // 腿与竖直的夹角
      var legSx = 0.05, legSz = 0.05;
      // 前腿(向 +Z 张) 2 根
      var i, sgn;
      for (i = 0; i < 2; i++) {
        sgn = i === 0 ? 1 : -1;
        // 前(+Z)梯腿
        _vp_box(g, side, sgn * widthHalf, H * 0.5, spread * 0.5, legSx, H, legSz, tilt, 0, 0);
        // 后(-Z)梯腿(无踏板那侧, 是支撑架)
        _vp_box(g, side, sgn * widthHalf, H * 0.5, -spread * 0.5, legSx, H, legSz, -tilt, 0, 0);
      }
      // 踏板(前侧 4 级, 随高度向 +Z 后退因腿外张)
      var steps = 4;
      for (i = 1; i <= steps; i++) {
        var fy = (H * 0.92) * (i / (steps + 1));
        var fz = spread * 0.5 * (1 - fy / H); // 腿外张, 越高越靠中
        _vp_box(g, mats.metalGray, 0, fy, fz, widthHalf * 2 + 0.06, 0.025, 0.10);
      }
      // 顶台(平台)
      _vp_box(g, mats.metalGray, 0, H * 0.93, 0, widthHalf * 2 + 0.08, 0.03, spread * 0.5 + 0.06);
      // 顶端工具槽边
      _vp_box(g, side, 0, H * 0.97, -spread * 0.22, widthHalf * 2 + 0.06, 0.04, 0.02);
      // 后腿横撑 2 道
      _vp_box(g, side, 0, H * 0.30, -spread * 0.5 * 0.72, widthHalf * 2, 0.03, 0.025);
      _vp_box(g, side, 0, H * 0.60, -spread * 0.5 * 0.46, widthHalf * 2, 0.03, 0.025);
      // 防滑脚(4 个黑胶)
      var feet = [[widthHalf, spread * 0.5], [-widthHalf, spread * 0.5], [widthHalf, -spread * 0.5], [-widthHalf, -spread * 0.5]];
      for (i = 0; i < 4; i++) {
        _vp_box(g, mats.plasticBlack, feet[i][0], 0.02, feet[i][1], legSx + 0.01, 0.04, legSz + 0.01);
      }
      return g;
    }

    function makeIndoorPotRow(mats, opts) {

    // 9) 搬家纸箱 + 杂物外露: 大箱并排堆叠, 部分敞口露出书/衣/线缆/台灯
    function makeMovingBoxes(mats, opts) {

      var boxW = 0.50, boxH = 0.42, boxD = 0.46;
      function box(x, y, z, open, ry) {

        _vp_box(g, card, x, y + boxH * 0.5, z + boxD * 0.5 - t * 0.5, boxW, boxH, t, 0, ry, 0); // 前
        _vp_box(g, card, x, y + boxH * 0.5, z - boxD * 0.5 + t * 0.5, boxW, boxH, t, 0, ry, 0); // 后
        _vp_box(g, card, x + boxW * 0.5 - t * 0.5, y + boxH * 0.5, z, t, boxH, boxD, 0, ry, 0); // 右
        _vp_box(g, card, x - boxW * 0.5 + t * 0.5, y + boxH * 0.5, z, t, boxH, boxD, 0, ry, 0); // 左
        _vp_box(g, card, x, y + t * 0.5, z, boxW, t, boxD, 0, ry, 0); // 底
        if (!open) {

          _vp_box(g, mats.paper, x, y + boxH + 0.003, z, boxW * 0.16, 0.005, boxD * 0.96, 0, ry, 0);

      box(-0.30, 0, 0, false, 0.04);
      box(0.30, 0, 0.02, false, -0.05);

      _vp_box(g, mats.woodBrown, -0.08, topY - 0.02, 0.05, 0.18, 0.04, 0.24, 0, 0.1, 0);
      _vp_box(g, mats.fabricBlue, -0.05, topY + 0.02, 0.03, 0.17, 0.04, 0.23, 0, -0.1, 0.05);
      _vp_box(g, mats.fabricRed, 0.10, topY, -0.02, 0.16, 0.05, 0.22, 0, 0.3, -0.04);
      // 一卷线缆探出
      _vp_torus(g, mats.plasticBlack, 0.12, topY + 0.06, 0.10, 0.07, 0.018, 6, 12, 0.4, 0.3, 0);
      // 揉团衣物
      _vp_box(g, mats.fabricGreen, -0.10, topY + 0.05, -0.08, 0.18, 0.10, 0.14, 0.3, 0.5, 0.2);
      // 一盏小台灯探出(灯罩 emissive 暖光)
      _vp_cyl(g, mats.metalDark, 0.0, topY + 0.04, 0.14, 0.012, 0.012, 0.16, 6, 0.5, 0, 0.2);
      _vp_cone(g, mats.glassLit, 0.06, topY + 0.14, 0.18, 0.07, 0.10, 10, Math.PI, 0, 0);
      return g;
    }

    function townPut(group, x, y, z, ry, mode) {

      if (!box.isEmpty()) {

        var movement = (mode === 'solid' || mode === 'cover');                // 挡移动(原行为)
        var blockable = (sz.y > 0.12 && Math.max(sz.x, sz.z) < 8);            // 有体积的物体挡子弹+可破坏(含吸顶灯等矮件); 排除巨型散垃圾InstancedField与平贴地贴花
        if (movement) solidBoxes.push(box);
        if (blockable) {                                                      // 挡子弹: 隐形 collider 进 worldSolids
          var ctr = new THREE.Vector3(); box.getCenter(ctr);

          _col.position.copy(ctr); scene.add(_col); mapMeshes.push(_col); worldSolids.push(_col);

    // 带窗洞的外墙: 沿 axis('x'墙体顺x走/'z'顺z走), fixed=另一轴坐标, a0..a1=墙跨度, nFloors层
    //   每层每开间: sill(底1.0实心,挡走出/低射) + 窗洞(1.0~2.2空, 子弹与视线可穿) + lintel(2.2~3.0实心) + 立柱(实心)

    function windowedWall(M, mat, axis, fixed, a0, a1, nFloors, doorBay) {

      var nb = Math.max(1, Math.round(len / 3.4)), rb = len / nb, pw = 0.5, ww = rb - pw;

      for (var f = 0; f < nFloors; f++) {

        for (var p = 0; p <= nb; p++) box(a0 + p * rb, yb + 1.5, 3.0, pw);   // 立柱(含两端)

    function buildViewGun() {
      if (viewGun) camera.remove(viewGun);
      viewGun = zBatActive ? zBuildBat() : buildGunModel(activeWeapon(), mechaWorn ? mechaWeapon : 0);

      // 枪口闪光（贴在枪管口，默认隐藏，开火时闪一下）
      gunMuzzle = new THREE.Sprite(new THREE.SpriteMaterial({
        map:flashTex, color:0xffd9a0, transparent:true, blending:THREE.AdditiveBlending,
        depthTest:false, depthWrite:false, rotation:0 }));
      gunMuzzle.position.set(0, 0.02, (viewGun.userData.muzzleZ || -0.7) - 0.02);
      gunMuzzle.scale.setScalar(0.001);
      gunMuzzle.visible = false;
      viewGun.add(gunMuzzle);

      // 充能能量球（贴在炮口，蓄力武器按下后逐渐汇聚变大、辉光点亮，发射时爆开）
      gunCharge = new THREE.Sprite(new THREE.SpriteMaterial({
        map:glowTex, color:0xffffff, transparent:true, blending:THREE.AdditiveBlending,
        depthTest:false, depthWrite:false }));
      gunCharge.position.set(0, 0.02, (viewGun.userData.muzzleZ || -0.7) - 0.04);
      gunCharge.scale.setScalar(0.001);
      gunCharge.visible = false;
      viewGun.add(gunCharge);

      // 崩星咆哮炮：弹巢里关着一颗脉动的小星 + 两道自转轨道环（"里面困着一颗星"）
      roarOrbit = null;
      if (activeWeapon().kind === 'roar') {
        var rc = activeWeapon().col, chamberZ = 0.2;
        var star = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 14), gmat(0xffffff, rc));
        star.position.set(0, 0, chamberZ);
        var ringMat = gmat(rc, rc);
        var r1 = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.018, 8, 28), ringMat); r1.position.set(0,0,chamberZ); r1.rotation.x = 1.2;
        var r2 = new THREE.Mesh(new THREE.TorusGeometry(0.26, 0.014, 8, 28), ringMat); r2.position.set(0,0,chamberZ); r2.rotation.y = 1.0;
        viewGun.add(star); viewGun.add(r1); viewGun.add(r2);
        roarOrbit = { star:star, r1:r1, r2:r2 };
      }

      viewGun.position.set(GUN_BASE.x, GUN_BASE.y, GUN_BASE.z);
      viewGun.rotation.order = 'YXZ';
      camera.add(viewGun);
      if (!camera.parent) scene.add(camera); // 让 viewGun 随相机一起渲染
    }

    function makeLabelSprite() {
      var cv = document.createElement('canvas'); cv.width = 256; cv.height = 80;
      var tex = new THREE.CanvasTexture(cv);
      tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter; tex.generateMipmaps = false;
      var mat = new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false, depthWrite:false });
      var sp = new THREE.Sprite(mat);
      sp.scale.set(2.4, 0.75, 1);
      sp.renderOrder = 10;
      sp.userData = { cv:cv, ctx:cv.getContext('2d'), tex:tex };
      return sp;
    }
    function drawLabel(sp, name, hp, alive, max) {
      var ctx = sp.userData.ctx; ctx.clearRect(0,0,256,80);
      // 名字
      ctx.font = 'bold 26px system-ui, "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.lineWidth = 5; ctx.strokeStyle = 'rgba(0,0,0,.85)';
      ctx.strokeText(name, 128, 22); ctx.fillStyle = '#ffffff'; ctx.fillText(name, 128, 22);
      // 血条
      var bw = 200, bh = 14, bx = 28, by = 48;
      ctx.fillStyle = 'rgba(0,0,0,.6)'; ctx.fillRect(bx-2, by-2, bw+4, bh+4);
      ctx.fillStyle = '#26323d'; ctx.fillRect(bx, by, bw, bh);
      var frac = Math.max(0, Math.min(1, hp/(max||100)));
      ctx.fillStyle = alive ? (frac > 0.5 ? '#46d17a' : frac > 0.25 ? '#ffb454' : '#ff5a5a') : '#555';
      ctx.fillRect(bx, by, bw*frac, bh);
      sp.userData.tex.needsUpdate = true;
    }

        keys[e.code] = true;

        if (cheatMode && CHEAT_KEYS[e.code]) { cheatEquip(CHEAT_KEYS[e.code]); return; }

          if (zShop && zShop.open && n >= 1 && n <= 3) { zBuyItem(n - 1); return; }   // 僵尸休息商店: 1/2/3 购买
          if (n >= 1 && n <= 7) { selectWeapon(n - 1); }   // 1-5基础枪, 6超级武器, 7仙器

      document.addEventListener('mousemove', function (e) {
        if (document.pointerLockElement !== canvas) return;

        var mxv = e.movementX || 0, myv = e.movementY || 0;
        var effSens = SENS * (1 - adsAmt * 0.5);
        yaw   -= mxv * effSens;
        pitch -= myv * effSens;

        var avail = [0,1,2,3,4];

      document.addEventListener('pointerlockchange', function () {

    var COMP_FS = [
      'varying vec2 vUv; uniform sampler2D tScene; uniform sampler2D tBloom; uniform float strength; uniform float exposure; uniform vec2 texel;',
      'vec3 fin(vec2 uv){ vec3 c = texture2D(tScene,uv).rgb + texture2D(tBloom,uv).rgb*strength; return clamp(c*exposure, 0.0, 1.0); }',
      'float lum(vec3 c){ return dot(c, vec3(0.299,0.587,0.114)); }',
      'void main(){',
      '  vec3 cM = fin(vUv); float lM = lum(cM);',
      '  float lNW=lum(fin(vUv+vec2(-texel.x,-texel.y))), lNE=lum(fin(vUv+vec2(texel.x,-texel.y)));',
      '  float lSW=lum(fin(vUv+vec2(-texel.x, texel.y))), lSE=lum(fin(vUv+vec2(texel.x, texel.y)));',
      '  float lMin=min(lM,min(min(lNW,lNE),min(lSW,lSE))), lMax=max(lM,max(max(lNW,lNE),max(lSW,lSE)));',
      '  if (lMax-lMin < 0.05) { gl_FragColor=vec4(cM,1.0); return; }',
      '  vec2 dir=vec2(-((lNW+lNE)-(lSW+lSE)), ((lNW+lSW)-(lNE+lSE)));',

      '  vec3 b=a*0.5+0.25*(fin(vUv+dir*(-0.5))+fin(vUv+dir*0.5));',

      flash.position.copy(origin).addScaledVector(dir, 4.0); flash.scale.setScalar(ROAR_RADIUS*0.9);
      scene.add(flash); fx.push({ obj:flash, ttl:0.35, life:0, fade:true, maxOp:0.95, expandFrom:ROAR_RADIUS*0.9, expandTo:ROAR_RADIUS*1.6 });
      // 贴地冲击波(在炮口正下方地面扩张)
      var ground = new THREE.Mesh(new THREE.TorusGeometry(ROAR_RADIUS*1.4, 0.6, 10, 80), addMat(0xffffff, 0.9));
      ground.rotation.x = -Math.PI/2; ground.position.set(origin.x, 0.15, origin.z); ground.scale.setScalar(0.05);
      scene.add(ground); fx.push({ obj:ground, ttl:0.7, life:0, fade:true, maxOp:0.9, expandFrom:0.05, expandTo:1, ease:true });
      if (!reduced) for (var i = 0; i < 6; i++) {
        var ring = new THREE.Mesh(new THREE.TorusGeometry(ROAR_RADIUS, 0.9, 10, 64), addMat(i%2?0xffffff:col, 0.85));
        ring.position.copy(origin).addScaledVector(dir, 5 + i*7);
        ring.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), dir);
        ring.scale.setScalar(0.1); scene.add(ring);
        fx.push({ obj:ring, ttl:0.6 + i*0.05, life:0, fade:true, maxOp:0.85, expandFrom:0.1, expandTo:1, ease:true });
      }
    }

    // ------------------------------------------------------------------ 受伤 / 死亡 / 重生 / 回血
    function applyDamage(dmg, byId, weapon, head) {
      if (!me.alive) return;
      me.hp -= dmg;
      lastDamageAt = now();    // 受伤计时：重新开始等回血
      flashDamage(); hurtSound();
      updateHpHud();
      if (me.hp <= 0) { me.hp = 0; die(byId, weapon, !!head); }
    }
    // 回血：alive 且未满血，且距上次受伤 > 8s → 8s 回满
    function updateRegen(dt) {
      if (isZombieMode()) return;   // 僵尸模式: 残血不自动回血(只能买医疗包, M4/M5)
      if (!me.alive || me.hp >= maxHp) return;
      if (now() - lastDamageAt < REGEN_DELAY) return;
      me.hp = Math.min(maxHp, me.hp + dt * (maxHp / (REGEN_FULL / 1000)) * (mechaWorn ? 0.5 : 1));   // 机甲回血慢50%
      updateHpHud();
    }
    function flashDamage() {
      var f = document.getElementById('dmgflash');
      f.style.opacity = '0.9';
      setTimeout(function () { f.style.opacity = '0'; }, 90);
    }
    function die(byId, weapon, head) {
      me.alive = false; me.deaths++;
      deadUntil = now() + 3000;
      slamUntil = 0; slamImpactDone = true;   // 取消未落下的青龙刀，死后不再造成伤害
      chargeUntil = 0;                         // 取消蓄力动画
      ads = false;
      deathSound();
      if (isZombieMode()) { zOnPlayerDeath(byId); return; }   // 僵尸: 保留武器/观战待队友复活/不走FFA计分
      dropAllSupers();         // 死亡失去全部超级武器/仙器
      // 广播击杀事件（由被击杀方广播，更新所有人的计分/击杀提示）
      netSend({ type:'kill', from:me.id, killer:byId, victim:me.id, weapon:weapon, head:!!head });
      updateKill(byId, me.id, weapon, !!head);
      document.getElementById('deathmsg').style.display = 'flex';
      updateScoreboard();
    }
    function respawn() {
      me.alive = true;
      vy = 0; tumbleUntil = 0; tumbleKiller = null; slamUntil = 0; slamImpactDone = true; shake = 0;
      for (var i = 0; i < ammo.length; i++) ammo[i] = WEAPONS[i].mag;
      dropAllSupers();         // 重生用普通武器
      if (inRealm) exitRealm(false); // 在秘境里死亡 → 落败，回到主竞技场
      else { me.hp = 100; maxHp = 100; playerPos.copy(randomSpawn()); }
      lastDamageAt = now();
      document.getElementById('deathmsg').style.display = 'none';
      updateHpHud(); updateAmmoHud();
    }

    // ------------------------------------------------------------------ 秘境 1v1
    function enterRealm(opponentId, myPos, asHolder) {
      if (inRealm || !me.alive) return;     // 已在秘境 / 已死亡：忽略（避免被拖入第二个秘境）
      inRealm = true; realmOpponent = opponentId; realmEnteredAt = now();
      var keepMecha = mechaWorn;   // 穿着机甲被拉进秘境 → 机甲留在身上(保留血量/武器)
      var keepRealmGun = !mechaWorn && superActive && superKind === 'realm';   // 秘境炮：留在手中,只耗弹
      if (!keepMecha && !keepRealmGun) dropSuper();
      ads = false; tumbleUntil = 0; tumbleKiller = null;
      playerPos.copy(myPos); vy = 0;
      yaw = asHolder ? -Math.PI/2 : Math.PI/2; pitch = 0;   // 面朝对手
      if (!keepMecha) {
        for (var i = 0; i < ammo.length; i++) ammo[i] = WEAPONS[i].mag;  // 秘境里用初始武器，弹匣装满
        if (asHolder) { maxHp = 200; me.hp = 200; fireRateMul = 0.55; }  // 持枪者：200血 + 更快射速
        else          { maxHp = 100; me.hp = 100; fireRateMul = 1; }
      } else { fireRateMul = asHolder ? 0.55 : 1; }   // 机甲：沿用自己的血量/武器
      lastDamageAt = now();
      updateHpHud(); updateWeaponHud(); updateAmmoHud();
      showNotice(asHolder ? '⚔ 进入秘境！200 血 + 高射速，干掉对手！' : '⚔ 你被拖入秘境！1v1 决生死！');
    }
    function exitRealm(won) {
      if (!inRealm) return;
      inRealm = false; realmOpponent = null;
      if (!mechaWorn) { maxHp = 100; me.hp = 100; }   // 机甲保留自己的血量
      fireRateMul = 1; tumbleUntil = 0; tumbleKiller = null;
      playerPos.copy(randomSpawn()); vy = 0;
      lastDamageAt = now();
      updateHpHud(); updateWeaponHud(); updateAmmoHud();
      showNotice(won ? '🏆 你赢了！回到战场' : '🏁 秘境结束，回到战场');
    }

    // ------------------------------------------------------------------ 计分 / 击杀提示
    function selfScore() { return { name:me.name, kills:me.kills, deaths:me.deaths, color:me.colorHex, me:true }; }
    function allScores() {
      var list = [];
      list.push(selfScore());
      for (var id in scores) list.push(scores[id]);
      list.sort(function (a, b) { return (b.kills - a.kills) || (a.deaths - b.deaths); });
      return list;
    }
    // 计分板渲染节流：state 包每秒来很多次，只标脏，由主循环每 ~250ms 真正重建一次 DOM
    var scoreDirty = true, lastScoreRender = 0;
    function updateScoreboard() { scoreDirty = true; }
    function renderScoreboard() {
      scoreDirty = false; lastScoreRender = now();
      var rows = allScores();
      var top = rows.slice(0, 6).map(function (s) {
        return '<div class="scrow' + (s.me ? ' me' : '') + '"><span class="nm">' + esc(s.name) +
               '</span><span class="kd">' + s.kills + ' / ' + s.deaths + '</span></div>';
      }).join('');
      document.getElementById('scorerows').innerHTML = top || '<div class="scrow"><span class="nm">等待玩家…</span></div>';
      if (boardOpen) renderFullBoard();
    }
    function renderFullBoard() {
      var rows = allScores();
      document.getElementById('fullrows').innerHTML = rows.map(function (s) {
        return '<tr class="' + (s.me ? 'me' : '') + '"><td>' + esc(s.name) + '</td><td>' + s.kills + '</td><td>' + s.deaths + '</td></tr>';
      }).join('');
    }
    function updateKill(killerId, victimId, weapon, head) {
      // 计分：击杀者本机权威地给自己 +1（kill 事件由被杀方广播，killer 收到后给自己加分）
      if (killerId === me.id && victimId !== me.id) me.kills++;
      // 其他机器上即时把击杀者分数 +1（下次 state 同步会校正）
      if (scores[killerId] && killerId !== me.id) scores[killerId].kills++;

      var kName = nameOf(killerId), vName = nameOf(victimId);
      var wName = weaponNameById(weapon);
      pushKillfeed(kName, vName, wName, !!head);
      updateScoreboard();
    }
    var killfeed = [];
    function pushKillfeed(k, v, w, head) {
      var el = document.createElement('div'); el.className = 'kf';
      el.innerHTML = '<span class="k">' + esc(k) + '</span> <span class="w">[' + esc(w) + (head ? ' 爆头' : '') + ']›</span> <span class="v">' + esc(v) + '</span>';
      var box = document.getElementById('killfeed');
      box.appendChild(el); killfeed.push({ el:el, t:now() });
      while (killfeed.length > 5) { var old = killfeed.shift(); if (old.el.parentNode) old.el.parentNode.removeChild(old.el); }
    }
    function tickKillfeed() {
      var t = now();
      for (var i = killfeed.length - 1; i >= 0; i--) {
        var k = killfeed[i];
        if (t - k.t > 5000) { k.el.style.opacity = '0'; if (t - k.t > 5600) { if (k.el.parentNode) k.el.parentNode.removeChild(k.el); killfeed.splice(i, 1); } }
      }
    }

    // ------------------------------------------------------------------ HUD
    function updateHpHud() {
      var pct = Math.max(0, Math.min(100, me.hp / maxHp * 100));
      document.getElementById('hpbar').style.width = pct + '%';
      document.getElementById('hpnum').textContent = 'HP ' + Math.round(me.hp) + (maxHp !== 100 ? (' / ' + maxHp) : '');
    }
    function updateAmmoHud() {
      var w = activeWeapon();
      if (isZombieMode() && !cheatInfinite) {     // 僵尸模式: 显示 弹匣 / 储备弹(分类)
        if (zBatActive || (w && w.melee)) { document.getElementById('ammo').innerHTML = '🦯<span class="res"> 近战</span>'; return; }
        var cat = zAmmoCat(w), clip = superActive ? superAmmo : ammo[weaponIndex];
        document.getElementById('ammo').innerHTML = clip + '<span class="res"> / ' + (zReserve[cat] || 0) + ' ' + (ZAMMO_LABEL[cat] || '') + '</span>';
        return;
      }
      var amt = cheatInfinite ? '∞' : activeAmmo();
      var mag = (w.melee || cheatInfinite) ? '∞' : w.mag;
      document.getElementById('ammo').innerHTML = amt + '<span class="res"> / ' + mag + '</span>';
    }
    function updateWeaponHud() {
      var w = activeWeapon();
      var slots;
      if (mechaWorn) {   // 机甲模式：基础武器全部消失，只剩机甲武器(图标，不显名字)
        var god = (superKind === 'godmecha');
        if (god) slots = '<div class="slot' + (mechaWeapon===0?' active':'') + ' super">✦</div><div class="slot' + (mechaWeapon===1?' active':'') + ' super">✦</div>';
        else slots = '<div class="slot active super">★</div>';
        document.getElementById('slots').innerHTML = slots; updateAmmoHud(); return;
      }
      if (cheatMode) {
        // 测试模式(开发)：下方显示全部超级武器/仙器，滚轮切换，高亮当前
        slots = ALL_SUPER_KINDS.map(function (kk) {
          var on = superActive && superKind === kk, xian = SUPERS[kk].isXian, absw = SUPERS[kk].isAbsolute;
          return '<div class="slot' + (on?' active':'') + ((xian||absw)?' super':'') + '">' + (absw?'☠':xian?'✦':'★') + esc(SUPERS[kk].name) + '</div>';
        }).join('');
      } else {
        slots = WEAPONS.map(function (ww, i) {
          return '<div class="slot' + (!superActive && i===weaponIndex?' active':'') + '"><b>' + (i+1) + '</b>' + esc(ww.name) + '</div>';
        }).join('');
        if (slot6Kind) slots += '<div class="slot super' + (weaponIndex===5?' active':'') + '"><b>6</b>★</div>';   // 超级武器(神秘:只图标)
        if (slot7Kind) slots += '<div class="slot super' + (weaponIndex===6?' active':'') + '"><b>7</b>✦</div>';   // 仙器
        if (slot8Kind) slots += '<div class="slot super' + (weaponIndex===7?' active':'') + '"><b>8</b>☠</div>';   // 绝对特性武器
      }
      document.getElementById('slots').innerHTML = slots;

    // ------------------------------------------------------------------ 联机（PeerJS · 星型 + 主机转发）
    // 房间号 → 确定性主机 id。第一个占用该 id 的人当主机，其余连到主机；主机转发其他人的状态。
    var myPeer = null, isHost = false, hostConn = null;
    var clientConns = {};   // 主机侧：peerId -> DataConnection
    var connectTries = 0, migrating = false, reconnectTimer = 0, connectingToHost = false;

    function hostIdFor(room) {
      var s = String(room).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'lobby';
      return 'ffaclash-' + s + '-host';
    }

    function startNetwork(room) {
      me.hostId = hostIdFor(room);
      if (TEST) { me.id = 'test-local'; isHost = true; netStatus('测试模式 · 离线', 'host'); finishJoin(); return; }
      attemptHost();
    }

    function attemptHost() {
      netStatus('正在创建/加入房间…', 'warn');
      var p = new Peer(me.hostId, PEER_OPTS);
      var settled = false;
      p.on('open', function () {
        settled = true; myPeer = p; isHost = true; me.id = me.hostId; migrating = false;
        netStatus('主机 · 已就绪', 'host');
        p.on('connection', onHostConnection);
        finishJoin();
      });
      p.on('error', function (err) {
        if (err && err.type === 'unavailable-id') {
          // 已有人占用主机 id → 当客户端连接过去
          try { p.destroy(); } catch (e) {}
          if (!settled) attemptClient();
        } else if (!settled && !myPeer) {
          netStatus('网络错误：' + (err && err.type), 'bad');
        } else {
          // 运行期错误（如个别 peer 不可用），不致命
          if (window.console) console.warn('[peer:host]', err && err.type);
        }
      });
      p.on('disconnected', function () { try { p.reconnect(); } catch (e) {} });
    }

    function onHostConnection(conn) {
      conn.on('open', function () {
        clientConns[conn.peer] = conn;
        // 主机向新成员通报自己，并把当前已知玩家快照发过去（让新人立刻看到所有人）
        conn.send({ type:'hello', from:me.id, name:me.name, color:me.colorHex });
        conn.send({ type:'setup', mode:roomMode, map:roomMap });   // 同步房主选的模式+地图
        for (var id in remotes) {
          var r = remotes[id];
          conn.send({ type:'hello', from:id, name:r.name, color:r.color });
        }
      });
      conn.on('data', function (msg) {
        handleMessage(msg);
        // 星型转发：把该客户端的消息转给其他所有客户端
        for (var pid in clientConns) {
          if (pid !== conn.peer) { try { clientConns[pid].send(msg); } catch (e) {} }
        }
      });
      conn.on('close', function () { hostDrop(conn.peer); });
      conn.on('error', function () { hostDrop(conn.peer); });
    }
    function hostDrop(pid) {
      if (clientConns[pid]) delete clientConns[pid];
      removeRemote(pid); delete scores[pid];
      broadcastRaw({ type:'leave', from:pid });
      updateScoreboard();
    }

    function attemptClient() {
      var p = new Peer(PEER_OPTS);   // 随机 id
      myPeer = p; isHost = false;
      p.on('open', function (id) { me.id = id; connectTries = 0; connectToHost(); });
      p.on('error', function (err) {
        if (err && err.type === 'peer-unavailable') { becomeHostAfterHostGone(); }
        else if (window.console) console.warn('[peer:client]', err && err.type);
      });
      p.on('disconnected', function () { try { p.reconnect(); } catch (e) {} });
    }
    function connectToHost() {
      if (connectingToHost || migrating || !myPeer) return;
      connectingToHost = true;
      var conn = myPeer.connect(me.hostId, { reliable:true });
      hostConn = conn;
      var opened = false;
      conn.on('open', function () {
        opened = true; connectingToHost = false; migrating = false;
        clearTimeout(reconnectTimer);
        netStatus('已连接到主机', 'client');
        conn.send({ type:'hello', from:me.id, name:me.name, color:me.colorHex });
        finishJoin();
      });
      conn.on('data', handleMessage);
      conn.on('close', function () { onHostLost(); });
      conn.on('error', function () { if (!opened) retryConnect(); });
      reconnectTimer = setTimeout(function () { if (!opened) retryConnect(); }, 4000);
    }
    function retryConnect() {
      if (!connectingToHost) return;
      connectingToHost = false;
      clearTimeout(reconnectTimer);
      try { if (hostConn) hostConn.close(); } catch (e) {}
      connectTries++;
      if (connectTries <= 3) setTimeout(connectToHost, 500 + connectTries*300);
      else becomeHostAfterHostGone();
    }
    function becomeHostAfterHostGone() {
      if (migrating) return; migrating = true;
      netStatus('主机不可用，尝试接管…', 'warn');
      try { if (myPeer) myPeer.destroy(); } catch (e) {}
      clearTimeout(reconnectTimer);
      connectingToHost = false; myPeer = null; hostConn = null;
      setTimeout(attemptHost, 400 + Math.floor(Math.random()*600)); // 抖动避免同时抢
    }
    function onHostLost() {
      if (!joined) return;
      netStatus('与主机断开，重连中…', 'warn');
      clearAllRemotes();
      removeAllPickups();   // 主机走了，旧的超级武器道具失效，避免残留
      clearAllEffects();
      for (var k in scores) delete scores[k];
      updateScoreboard();
      becomeHostAfterHostGone();
    }

    // 发送：主机直接广播给所有客户端；客户端发给主机（主机再转发）
    function netSend(msg) {
      if (!myPeer) return;
      if (isHost) broadcastRaw(msg);
      else if (hostConn && hostConn.open) { try { hostConn.send(msg); } catch (e) {} }
    }
    function broadcastRaw(msg) {
      for (var pid in clientConns) { try { clientConns[pid].send(msg); } catch (e) {} }
    }

    function handleMessage(msg) {
      if (!msg || msg.from === me.id) return;
      switch (msg.type) {
        case 'hello':
          ensureRemote(msg.from, msg.name, msg.color);
          if (!scores[msg.from]) scores[msg.from] = { name:msg.name||'???', kills:0, deaths:0, color:msg.color };
          updateScoreboard();
          break;
        case 'setup':   // 房主同步模式 + 地图（加入者切到同一张图并重新出生）
          if (msg.mode && MODES[msg.mode]) roomMode = msg.mode;
          if (msg.map && msg.map !== roomMap) {
            roomMap = msg.map;
            if (joined) { buildMap(roomMap); playerPos.copy(randomSpawn()); }
          }
          break;
        case 'state': {
          var r = ensureRemote(msg.from, msg.name, msg.color);
          if (r) {
            r.target.set(msg.x, msg.y - EYE, msg.z); // 网络发的是"眼睛"高度，小人底座 = 眼高-EYE
            r.targetYaw = msg.yaw;
            var oldMw = r.mw; r.mw = msg.mw || 0;        // 机甲武器变体(手炮/巨剑)
            if (msg.wid) setRemoteWeapon(r, msg.wid);   // 看到对方手中的真实武器
            applyRemoteMecha(r, msg.mecha);             // 穿上机甲 → 放大 + 金属化
            if (r.mecha && r.mechRig && r.mw !== oldMw) setMechWeapon(r.mechRig, r.mw);   // 切炮/剑 → 重挂右臂武器
            if (r.hp !== msg.hp || r.alive !== msg.alive || r.maxHp !== (msg.maxHp || 100)) { r.hp = msg.hp; r.alive = msg.alive; r.maxHp = msg.maxHp || 100; r.labelDirty = true; }
            // 首个状态：直接吸附到位（避免从原点滑入）并初始化测速基准（避免首帧"奔跑"误判）
            if (!r.spawned) { r.group.position.copy(r.target); r.group.rotation.y = r.targetYaw;
              r.lastX = r.target.x; r.lastZ = r.target.z; r.spawned = true; }
            r.lastSeen = now();
          }
          scores[msg.from] = { name:msg.name, kills:msg.kills, deaths:msg.deaths, color:msg.color };
          updateScoreboard();
          break;
        }
        case 'hit':
          if (msg.to === me.id) applyDamage(msg.dmg, msg.from, msg.weapon, msg.head);
          break;
        case 'kill':
          updateKill(msg.killer, msg.victim, msg.weapon, msg.head);
          // 远端小人进入死亡态（短暂），等其 state 同步重生
          var rr = remotes[msg.victim]; if (rr) { rr.alive = false; rr.labelDirty = true; }
          // 秘境对决：对手死了 → 我赢了 → 回到主战场
          if (inRealm && msg.victim === realmOpponent) exitRealm(true);
          break;
        case 'super_spawn':           // 主机通知：地图上刷新了超级武器
          applySuperSpawn(msg);
          break;
        case 'super_taken':           // 有人捡走了某个超级武器 → 移除地图上的它
          removeSuperPickup(msg.sid);
          break;
        case 'grenade':               // 别人发射的机甲榴弹 → 本地渲染(伤害由发射者结算)
          spawnGrenade(msg);
          break;
        case 'beam':                  // 崩星炮 / 秘境枪 的激光轨迹（所有人都看得到）
          spawnBeam(msg);
          break;
        case 'blackhole':             // 黑洞炮
          spawnBlackHole(msg);
          break;
        case 'tsunami':               // 排山倒海手
          spawnTsunami(msg);
          break;
        case 'slam':                  // 青龙偃月刀劈砍：地震 + 圈内处死
          spawnSlam(msg);
          shatterRadius(msg.x, msg.z, msg.r || BLADE_KILL_R, 'explode');   // 同步摧毁(接收端同样炸碎范围内建筑/家具)
          break;
        case 'destruct':              // 摧毁同步: 触发方广播, 各端用相同(x,z,r,mode)应用(注册表确定性→毁同样的段)

    // ------------------------------------------------------------------ 超级武器拾取物（地图道具）
    function randomSuperPos() {
      for (var t = 0; t < 16; t++) {
        var x = Math.random()*44 - 22, z = Math.random()*44 - 22, ok = true;
        for (var i = 0; i < solidBoxes.length; i++) {
          var b = solidBoxes[i];
          if (x > b.min.x-1.5 && x < b.max.x+1.5 && z > b.min.z-1.5 && z < b.max.z+1.5) { ok = false; break; }
        }
        if (ok) return { x:x, y:1.3, z:z };
      }
      return { x:0, y:1.3, z:0 };
    }
    function makeTextSprite(text, colorHex) {
      var cv = document.createElement('canvas'); cv.width = 256; cv.height = 64;
      var ctx = cv.getContext('2d');
      ctx.font = 'bold 30px system-ui,"Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(0,0,0,.9)'; ctx.strokeText(text, 128, 34);
      ctx.fillStyle = '#' + ('000000' + (colorHex >>> 0).toString(16)).slice(-6); ctx.fillText(text, 128, 34);
      var tex = new THREE.CanvasTexture(cv);
      tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter; tex.generateMipmaps = false;
      var sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false, depthWrite:false }));
      sp.scale.set(2.8, 0.7, 1); sp.renderOrder = 11;
      return sp;
    }
    function makeSuperPickup(kind) {
      var w = SUPERS[kind] || SUPERS.mg, col = w.col;
      var g = new THREE.Group();
      var core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.55, 0),
        new THREE.MeshStandardMaterial({ color:col, emissive:col, emissiveIntensity:1.3, metalness:0.4, roughness:0.3 }));
      g.add(core);
      var glow = new THREE.Sprite(new THREE.SpriteMaterial({ map:glowTex, color:col,
        transparent:true, blending:THREE.AdditiveBlending, depthWrite:false }));
      glow.scale.setScalar(w.isXian ? 3.4 : 2.4); g.add(glow);   // 仙器拾取物更亮
      if (w.isXian) {   // 仙器：外加旋转光环，一眼认出（但不浮名字）
        var halo = new THREE.Mesh(new THREE.TorusGeometry(0.9, 0.08, 8, 32),
          new THREE.MeshBasicMaterial({ color:col, transparent:true, opacity:0.9, blending:THREE.AdditiveBlending, depthWrite:false }));
        halo.rotation.x = Math.PI/2.5; g.add(halo); g.userData.halo = halo;
      }
      g.userData.core = core; g.userData.kind = kind;
      return g;
    }
    function applySuperSpawn(msg) {
      if (superPickups[msg.sid]) return;                      // 已存在(去重)
      var mesh = makeSuperPickup(msg.kind);
      mesh.position.set(msg.x, msg.y, msg.z);
      mesh.userData.sid = msg.sid; mesh.userData.baseY = msg.y;
      scene.add(mesh); superPickups[msg.sid] = mesh;
      // 超出上限 → 移除最早的(sid 最小)
      var sids = Object.keys(superPickups);
      while (sids.length > MAX_PICKUPS) { var oldest = Math.min.apply(null, sids.map(Number)); removeSuperPickup(oldest); sids = Object.keys(superPickups); }
      if (SUPERS[msg.kind] && SUPERS[msg.kind].isXian) showNotice('✦ 仙器降世：' + SUPERS[msg.kind].name);
    }
    function removeSuperPickup(sid) {
      var m = superPickups[sid]; if (!m) return;
      scene.remove(m);
      m.traverse(function (o) { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
      delete superPickups[sid];
    }
    function removeAllPickups() { for (var s in superPickups) removeSuperPickup(s); }
    // 用"洗牌袋"轮流出，保证每种(含崩星炮)都会规律地刷到，而不是纯随机可能很久不出
    function nextSuperKind() {
      if (superBag.length === 0) {
        superBag = SUPER_KINDS.slice();
        for (var i = superBag.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = superBag[i]; superBag[i] = superBag[j]; superBag[j] = tmp;
        }
      }
      return superBag.pop();
    }
    // 当前模式这一次刷新出几个超级武器
    function spawnCountThisTick() {
      var m = MODES[roomMode]; if (!m || !m.interval) return 0;
      var r = Math.random();
      if (m.triple && r < m.triple) return 3;
      if (m.double && r < m.triple + m.double) return 2;
      return 1;
    }
    // 仅主机生成：按模式决定数量，每个随机位置/类型(各 5% 仙器)，本地渲染并广播
    function hostSpawnSuper() {
      var n = spawnCountThisTick(); if (n <= 0) return;
      var xian = (MODES[roomMode] && MODES[roomMode].xian) || 0;
      for (var k = 0; k < n; k++) {
        superSid++;
        var pos = randomSuperPos();
        var kind = (Math.random() < xian) ? XIAN_KINDS[Math.floor(Math.random()*XIAN_KINDS.length)] : nextSuperKind();
        var msg = { type:'super_spawn', from:me.id, sid:superSid, kind:kind, x:pos.x, y:pos.y, z:pos.z };
        applySuperSpawn(msg); netSend(msg);
      }
    }
    // 每帧检查：走到任一拾取物附近就捡起（先到先得）
    function checkSuperPickup() {
      if (!me.alive || paused || inRealm || mechaWorn) return;   // 机甲中不捡;持超武仍可捡另一类
      for (var sid in superPickups) {
        var m = superPickups[sid];
        var dx = playerPos.x - m.position.x, dz = playerPos.z - m.position.z;
        if (dx*dx + dz*dz < 1.8*1.8) {
          var kind = m.userData.kind;
          var xx = SUPERS[kind] && SUPERS[kind].isXian;
          if (xx ? slot7Kind : slot6Kind) continue;   // 对应物品栏格已满 → 不捡,留给他人
          removeSuperPickup(sid);
          netSend({ type:'super_taken', from:me.id, sid:Number(sid) });
          pickupSuper(kind);
          return;
        }
      }
    }

    function doJoin(room) {
