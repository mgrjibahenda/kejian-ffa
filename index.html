    // ------------------------------------------------------------------ 主循环
    function updateMovement(dt) {
      if (!joined || !me.alive) return;
      // 朝向（仅用水平分量做移动）
      camera.getWorldDirection(_fwd); _fwd.y = 0; _fwd.normalize();
      _right.crossVectors(_fwd, new THREE.Vector3(0,1,0)).normalize();

      var mx = 0, mz = 0;
      if (keys['KeyW']) mz += 1;
      if (keys['KeyS']) mz -= 1;
      if (keys['KeyD']) mx += 1;
      if (keys['KeyA']) mx -= 1;
      sprinting = !!(keys['ShiftLeft'] || keys['ShiftRight']) && (mx !== 0 || mz !== 0) && adsAmt < 0.3;
      isMoving = (mx !== 0 || mz !== 0) && grounded;   // 走路头部/武器摆动用
      var sp = SPEED * (sprinting ? SPRINT : 1) * (1 - adsAmt * 0.45);  // 开镜走得慢
      if (mechaWorn) sp *= (SUPERS[superKind] && SUPERS[superKind].speedMul) || 0.7;   // 机甲移速 -30%

      var move = new THREE.Vector3();
      move.addScaledVector(_fwd, mz).addScaledVector(_right, mx);
      if (move.lengthSq() > 0) move.normalize().multiplyScalar(sp * dt);

      // 逐轴碰撞解算
      var nx = playerPos.x + move.x;
      if (!collides(nx, playerPos.z)) playerPos.x = nx;
      var nz = playerPos.z + move.z;
      if (!collides(playerPos.x, nz)) playerPos.z = nz;

      // 重力 / 跳跃
      // 垂直：支持站在箱子/平台顶部（多层地图）。支撑面 = 脚下能落上的最高箱顶，否则地面 0。
      var feet0 = playerPos.y - EYE;
      var support = groundHeightAt(playerPos.x, playerPos.z, feet0);
      vy -= GRAVITY * dt; playerPos.y += vy * dt;
      var minY = support + EYE;
      if (playerPos.y <= minY) { playerPos.y = minY; vy = 0; grounded = true; } else grounded = false;
    }

    // 脚下支撑高度：玩家所站箱子的顶面（可迈上 STEP_H 内的矮台/台阶），否则地面 0
    function groundHeightAt(x, z, feetY) {
      var h = 0;
      for (var i = 0; i < solidBoxes.length; i++) {
        var b = solidBoxes[i];
        if (x > b.min.x - PLAYER_R && x < b.max.x + PLAYER_R &&
            z > b.min.z - PLAYER_R && z < b.max.z + PLAYER_R) {
          if (b.max.y <= feetY + STEP_H && b.max.y > h) h = b.max.y;   // 顶面在脚 + 一步以内 → 可作支撑
        }
      }
      return h;
    }
    function collides(x, z) {
      // 场地边界（秘境里用秘境平台的边界）
      var bx = inRealm ? REALM_CENTER.x : 0, bz = inRealm ? REALM_CENTER.z : 0;
      var lim = inRealm ? 17.5 : (isZombieMode() ? 39.0 : 29.5);   // 僵尸图 ±40, 放宽到石墙处(墙体本身在 solidBoxes 兜底)
      if (x < bx - lim || x > bx + lim || z < bz - lim || z > bz + lim) return true;
      var feet = playerPos.y - EYE, head = feet + 1.7;
      for (var i = 0; i < solidBoxes.length; i++) {
        var b = solidBoxes[i];
        if (x > b.min.x - PLAYER_R && x < b.max.x + PLAYER_R &&
            z > b.min.z - PLAYER_R && z < b.max.z + PLAYER_R) {
          // 仅当箱体挡住身体(顶面高出脚一步以上、且底面低于头顶)才算墙；矮于一步的台可直接迈上、头顶上方的平台可从下面穿过
          if (b.max.y > feet + STEP_H && b.min.y < head) return true;
        }
      }
      return false;
    }

    function updateRemotes(dt) {
      var t = now();
      for (var id in remotes) {
        var r = remotes[id];
        // 平滑插值（指数趋近）
        var k = 1 - Math.exp(-dt * 12);
        r.group.position.lerp(r.target, k);
        var dy = r.targetYaw - r.group.rotation.y;
        while (dy >  Math.PI) dy -= Math.PI*2;
        while (dy < -Math.PI) dy += Math.PI*2;
        r.group.rotation.y += dy * k;
        poseRemote(r, dt);                 // 举枪/奔跑/跳跃/死亡 动画
        if (r.labelDirty) { drawLabel(r.label, r.name, r.hp, r.alive, r.isDummy ? r.dummyMax : (r.maxHp || 100)); r.labelDirty = false; }
        // 长时间没收到状态（非正常离开）→ 移除
        if (!r.isDummy && t - r.lastSeen > 6000) { removeRemote(id); delete scores[id]; updateScoreboard(); }
      }
    }

    // 远端小人动画：根据"自身位移速度 / 是否离地 / 是否存活"摆动四肢
    function poseRemote(r, dt) {
      var nx = r.group.position.x, nz = r.group.position.z;
      var inv = 1 / Math.max(dt, 0.001);
      var speed = Math.sqrt((nx - r.lastX)*(nx - r.lastX) + (nz - r.lastZ)*(nz - r.lastZ)) * inv;
      r.lastX = nx; r.lastZ = nz;

      if (!r.alive) {                       // 死亡：缓缓侧倒 + 四肢放松
        r.deathLean = Math.min(1, r.deathLean + dt * 4);
        r.group.rotation.z = r.deathLean * 1.45;
        r.legL.rotation.x = r.legR.rotation.x = 0.25;
        r.armL.rotation.x = r.armR.rotation.x = 0.4;
        if (!r.mecha) for (var i = 0; i < r.parts.length; i++) r.parts[i].visible = true;   // 机甲化时人形保持隐藏(否则四肢穿模)
        return;
      }
      if (r.deathLean) { r.deathLean = 0; r.group.rotation.z = 0; }   // 复活：站起
      if (!r.mecha) for (var j = 0; j < r.parts.length; j++) r.parts[j].visible = true;     // 同上：机甲时不重新显示人形

      // 注意：手臂从肩部垂下，正 rotation.x 才是"朝前"（之前用负值导致双臂卡到身后）
      var airborne = r.group.position.y > 0.2;
      if (airborne) {                       // 跳跃：收腿(前抬) + 举枪
        r.legL.rotation.x = 0.8; r.legR.rotation.x = 0.5;
        r.armL.rotation.x = 1.6; r.armR.rotation.x = 1.45;
        r.runPhase = 0;
      } else if (speed > 1.0) {             // 奔跑：腿前后摆，左手随步摆，右手持枪向前
        r.runPhase += dt * ((r.mecha ? 4.5 : 7) + Math.min(speed, 10) * 0.5);
        var s = Math.sin(r.runPhase) * (r.mecha ? 0.55 : 0.85);   // 机甲步幅更沉
        r.legL.rotation.x = s;  r.legR.rotation.x = -s;
        r.armR.rotation.x = 1.45;
        r.armL.rotation.x = 1.25 - s * 0.4;
      } else {                              // 站立举枪（双手向前端枪）
        r.legL.rotation.x = 0; r.legR.rotation.x = 0;
        r.armL.rotation.x = 1.3; r.armR.rotation.x = 1.45;
        r.runPhase = 0;
      }
      // 机甲待机/起伏：即使站立也有液压般的缓慢摆动，绝不僵死(叠加在基础姿势上)
      if (r.mecha) {
        r.idlePhase = (r.idlePhase || 0) + dt;
        var ib = Math.sin(r.idlePhase * 1.6), ib2 = Math.sin(r.idlePhase * 1.6 + 1.0);
        r.armL.rotation.x += ib * 0.07; r.armR.rotation.x += ib2 * 0.05;
        r.legL.rotation.z = ib * 0.025; r.legR.rotation.z = -ib * 0.025;
        if (r.mechRig) { r.mechRig.root.position.y = Math.abs(ib) * 0.05; r.mechRig.torso.rotation.y = ib2 * 0.04; }
      }
    }

    // 用当前 yaw/pitch(+后坐力) 摆正相机；移动与开枪都基于这个朝向，保证瞄准是"当前帧"的
    function aimCamera() {
      camera.position.copy(playerPos);
      if (mechaWorn && SUPERS[superKind]) camera.position.y += SUPERS[superKind].lift || 0;   // 机甲：视角变高(变高大)
      camera.rotation.x = pitch + viewRecoil;
      camera.rotation.y = yaw;
      camera.rotation.z = 0;
    }

    // 走路头部摆动（晃相机但不动准星方向）+ 武器摇晃/后坐/换弹/开镜动画
    function updateViewBobAndGun(dt) {
      var adsK = adsAmt;                  // 0=腰射 1=开镜
      var damp = 1 - adsK * 0.82;         // 开镜时各种晃动收敛，瞄得更稳

      // 走路摆动幅度平滑：移动时升起，停下时回落
      var targetAmp = (isMoving && grounded && !reduced) ? (sprinting ? 1.0 : 0.6) : 0;
      bobAmp += (targetAmp - bobAmp) * Math.min(1, dt * 8);
      if (isMoving && grounded) bobT += dt * (sprinting ? 13 : 9);

      // 相机头部摆动：只偏移"位置"，不改"朝向"，所以准星指向不变、瞄准不受影响
      if (!reduced && bobAmp > 0.001) {
        camera.position.y += Math.sin(bobT * 2) * 0.035 * bobAmp * damp;
        var vSide = Math.cos(bobT) * 0.022 * bobAmp * damp;
        camera.position.x += _right.x * vSide;
        camera.position.z += _right.z * vSide;
      }

      if (!viewGun) return;
      var t = now();

      // 换弹动画进度：0 → 1 → 0（中途枪下沉/倾斜，像在换弹匣）
      var reloadAnim = 0;
      if (now() < reloadUntil && reloadDur > 0) {
        var prog = Math.max(0, Math.min(1, 1 - (reloadUntil - now()) / reloadDur));
        reloadAnim = Math.sin(prog * Math.PI);
      }

      // 狙击镜：开镜时把枪藏起来（改用镜头画面），且不拉到屏幕中央，避免挡视线；
      // 其它武器开镜时枪下沉到准星下方（ADS_BASE）。
      var scoped = !!activeWeapon().scoped;
      viewGun.visible = !(scoped && adsAmt > 0.4);
      var aB = scoped ? GUN_BASE : ADS_BASE;
      var gx = GUN_BASE.x + (aB.x - GUN_BASE.x) * adsK;
      var gy = GUN_BASE.y + (aB.y - GUN_BASE.y) * adsK;
      var gz = GUN_BASE.z + (aB.z - GUN_BASE.z) * adsK;
      var rx = 0, ry = 0, rz = 0;
      if (!reduced) {
        // 走路摆动（武器随脚步轻晃）
        gx += Math.cos(bobT) * 0.010 * bobAmp * damp;
        gy += Math.abs(Math.sin(bobT)) * 0.010 * bobAmp * damp;
        // 待机呼吸
        gx += Math.sin(t * 0.0011) * 0.0015 * damp;
        gy += Math.sin(t * 0.0016) * 0.0020 * damp;
        // 鼠标跟手：枪滞后于视角再回正
        gx += -gunSwayX * damp;  gy += gunSwayY * damp;
        ry +=  gunSwayX * 2.2 * damp; rx += gunSwayY * 2.2 * damp; rz += gunSwayX * 1.2 * damp;
      }
      // 开火后坐：枪向后顶 + 枪口上抬
      gz += gunKick * 0.16;  gy += gunKick * 0.05;  rx += -gunKick * 0.5;
      // 换弹动画：下沉 + 前倾 + 侧倾
      gy += -0.20 * reloadAnim;  gz += 0.05 * reloadAnim;
      rx += 1.10 * reloadAnim;   rz += 0.60 * reloadAnim;

      // 充能动画：蓄力武器按下后枪向后拉、能量颤动，炮口能量球汇聚变大
      var charging = now() < chargeUntil ? Math.min(1, (now() - chargeStart) / Math.max(1, chargeUntil - chargeStart)) : 0;
      if (charging > 0 && !reduced) {
        gz += charging * 0.11;  rx += -charging * 0.10;
        gx += (Math.random() - 0.5) * 0.008 * charging;
        gy += (Math.random() - 0.5) * 0.008 * charging;
      }

      viewGun.position.set(gx, gy, gz);
      viewGun.rotation.set(rx, ry, rz);

      if (gunCharge) {
        if (charging > 0) {
          gunCharge.visible = true; gunCharge.material.color.setHex(chargeCol);
          var fl = 0.82 + 0.18 * Math.sin(now() * 0.05);
          gunCharge.scale.setScalar((0.03 + charging * charging * 0.18) * fl);    // 收小，避免糊持炮者的眼
          gunCharge.material.opacity = Math.min(0.6, 0.28 + charging * 0.35);
        } else if (gunCharge.visible) { gunCharge.visible = false; }
      }
      // 崩星咆哮炮弹巢小星：自转轨道环 + 脉动；蓄力时转得越来越快、星越来越亮(白热)
      if (roarOrbit) {
        var rcol = charging > 0.88, rcp = rcol ? (charging - 0.88) / 0.12 : 0;   // 塌缩段：环收紧、星缩亮
        var spin = 1 + charging * 9 + rcp * 22, tt = now();
        roarOrbit.r1.rotation.z += dt * spin * 1.6; roarOrbit.r1.rotation.x = 1.2 + Math.sin(tt*0.002)*0.3;
        roarOrbit.r2.rotation.z -= dt * spin * 2.1; roarOrbit.r2.rotation.y = 1.0 + Math.cos(tt*0.0023)*0.3;
        var rs = 1 - rcp * 0.75; roarOrbit.r1.scale.setScalar(rs); roarOrbit.r2.scale.setScalar(rs);
        var puls = (1 + 0.18*Math.sin(tt*(0.01 + charging*0.05)) + charging*0.6) * (1 - rcp*0.55);
        roarOrbit.star.scale.setScalar(Math.max(0.25, puls));
        roarOrbit.star.material.emissiveIntensity = 1.6 + charging * 3.5 + rcp * 4;   // 蓄力白热、塌缩更亮
      }

      // 枪口闪光到时收起
      if (gunMuzzle && gunMuzzle.visible && now() >= muzzleHideAt) gunMuzzle.visible = false;
    }

    function animate() {
      requestAnimationFrame(animate);
      var dt = Math.min(clock ? clock.getDelta() : 0.016, 0.05);
      _gt += dt;   // 全局时间累加：驱动地图 shader uTime 与环境粒子（空注册表时为 no-op，basic 无影响）
      for (var _ui = 0; _ui < fxUniforms.length; _ui++) { var _uo = fxUniforms[_ui]; if (_uo && _uo.uTime) _uo.uTime.value = _gt; }
      for (var _pi = 0; _pi < activeParticles.length; _pi++) { try { activeParticles[_pi].update(dt, _gt); } catch (e) {} }

      // 各种衰减（先衰减，本帧瞄准用衰减后的值）
      viewRecoil *= Math.exp(-dt * 12);
      gunKick    *= Math.exp(-dt * 13);
      gunSwayX   *= Math.exp(-dt * 9);
      gunSwayY   *= Math.exp(-dt * 9);
      shake      *= Math.exp(-dt * 6);     // 视角地震衰减

      if (joined) {
        // 死亡重生计时（僵尸模式: 不自动重生, 改为观战+队友复活, M5/M6）
        if (!me.alive && now() >= deadUntil && !isZombieMode()) respawn();

        // 开镜（ADS）插值：缩放视野；狙击显示瞄准镜并隐藏准星，其它武器保留准星
        var aw = activeWeapon(), scopedW = !!aw.scoped;
        var adsTarget = (ads && me.alive && !paused) ? 1 : 0;
        adsAmt += (adsTarget - adsAmt) * Math.min(1, dt * 12);
        if (adsAmt < 0.001) adsAmt = 0;
        var wantFov = BASE_FOV * (1 + (aw.zoom - 1) * adsAmt);
        if (Math.abs(camera.fov - wantFov) > 0.02) { camera.fov = wantFov; camera.updateProjectionMatrix(); }
        document.getElementById('scope').style.opacity = (scopedW ? adsAmt : 0).toFixed(2);
        document.getElementById('crosshair').style.opacity = (scopedW ? (1 - adsAmt) : 1).toFixed(2);

        var tumbling = now() < tumbleUntil;   // 被巨浪卷起翻滚中：无法行动
        var slamming = now() < slamUntil;     // 青龙刀挥砍中：无法行动
        var chargingMove = now() < chargeUntil;  // 炮武器充能中：原地不能移动
        aimCamera();                       // 先用最新视角摆正相机
        if (!paused && !tumbling && !slamming && !chargingMove) {
          updateMovement(dt);
          aimCamera();                     // 移动后同步相机位置
          checkSuperPickup();              // 走到超级武器上就捡起
          if (firing && activeWeapon().auto) tryFire();  // 自动武器持续开火
          // 脚步声（按步伐节奏）
          if (isMoving && grounded && now() - lastStepAt > (sprinting ? 270 : 380)) { lastStepAt = now(); footstepSound(); }
        } else { isMoving = false; }
        // 青龙刀：突进=又快又高的腾空前冲；劈下=从最高点砸回地面；触地瞬间结算
        if (slamming && me.alive) {
          var sp2 = now() - slamStart;
          if (sp2 >= BLADE_RISE && sp2 < BLADE_RISE + BLADE_LUNGE) {       // 突进腾空
            camera.getWorldDirection(_bf); _bf.y = 0; if (_bf.lengthSq()>1e-6) _bf.normalize();
            var lx = playerPos.x + _bf.x * BLADE_LUNGE_SPD * dt, lz = playerPos.z + _bf.z * BLADE_LUNGE_SPD * dt;
            if (!collides(lx, playerPos.z)) playerPos.x = lx;
            if (!collides(playerPos.x, lz)) playerPos.z = lz;
            var lp = (sp2 - BLADE_RISE) / BLADE_LUNGE;
            playerPos.y = EYE + BLADE_LUNGE_UP * Math.sin(lp * Math.PI * 0.5);   // 升到最高点
            aimCamera();
          } else if (sp2 >= BLADE_RISE + BLADE_LUNGE) {                    // 劈下砸地
            var sf2 = Math.min(1, (sp2 - BLADE_RISE - BLADE_LUNGE) / BLADE_SLAM);
            playerPos.y = EYE + BLADE_LUNGE_UP * (1 - sf2) * (1 - sf2);
            aimCamera();
          }
          if (sp2 >= BLADE_RISE && !reduced) {   // 突进→劈下：视角前方留劈砍光弧
            var tcol = burstSlam ? SUPERS.godmecha.col : SUPERS.blade.col;
            spawnSlashTrail(tcol); if (Math.random() < 0.6) spawnSlashTrail(tcol);
          }
        }
        if (!slamImpactDone && now() >= slamImpactAt) doBladeImpact();
        // 翻滚结束 → 处死
        if (tumbleUntil && now() >= tumbleUntil) {
          var tk = tumbleKiller; tumbleUntil = 0; tumbleKiller = null;
          if (me.alive) {   // 排山倒海：造成 5000 伤害(机甲等高血量不再必死)
            me.hp -= SUPERS.tsunami.dmg; lastDamageAt = now(); flashDamage();
            if (me.hp <= 0) { me.hp = 0; die(tk, 'super_tsunami', false); } else updateHpHud();
          }
        }
        // 残血心跳
        if (me.alive && me.hp < 30 && now() - lastHeartAt > 850) { lastHeartAt = now(); heartbeatSound(); }
        // 秘境兜底：超过 60s 没分出胜负 → 自动结束，避免卡死
        if (inRealm && now() - realmEnteredAt > 60000) exitRealm(false);

        // 换弹完成（僵尸模式: 从储备弹补充, 含超武/仙器; 否则普通无限补满）
        if (reloadUntil && now() >= reloadUntil) {
          if (isZombieMode()) zFinishReloadZ();
          else { ammo[weaponIndex] = WEAPONS[weaponIndex].mag; reloadUntil = 0; updateAmmoHud(); }
        }
        document.getElementById('reloading').textContent = (now() < reloadUntil) ? '换弹中…' : '';

        updateRegen(dt);                   // 受伤 8 秒后开始回血
        if (scoreDirty && now() - lastScoreRender > 250) renderScoreboard();  // 计分板节流重建
        updateViewBobAndGun(dt);           // 走路头部摆动 + 武器摇晃/后坐/换弹/开镜动画

        // 超级武器拾取物：旋转 + 上下浮动（可多个，错相浮动）
        for (var _s in superPickups) {
          var _pm = superPickups[_s];
          _pm.rotation.y += dt * 1.6;
          if (_pm.userData.core) _pm.userData.core.rotation.x += dt * 1.2;
          _pm.position.y = (_pm.userData.baseY || 1.3) + (reduced ? 0 : Math.sin(now()*0.003 + (_pm.userData.sid||0)) * 0.18);
        }

        // 被巨浪卷起：疯狂翻滚的镜头（覆盖正常相机姿态）
        if (tumbling && me.alive) {
          var tp = now() - tumbleStart;
          camera.position.y = playerPos.y + Math.sin(Math.min(1, tp/900) * Math.PI) * 1.6;
          camera.rotation.z = tp * 0.018;
          camera.rotation.x = pitch + Math.sin(tp * 0.03) * 0.7;
        }

        // 青龙偃月刀：挑起 → 突进 → 劈下（覆盖武器/相机姿态）
        if (slamming && viewGun) {
          var sp3 = now() - slamStart, rx3, fwd3 = 0;
          if (sp3 < BLADE_RISE) { rx3 = -1.5 * (sp3 / BLADE_RISE); }                       // 挑起
          else if (sp3 < BLADE_RISE + BLADE_LUNGE) { rx3 = -1.5; fwd3 = 0.12; }            // 突进保持高举
          else { var sf = Math.min(1, (sp3 - BLADE_RISE - BLADE_LUNGE) / BLADE_SLAM); rx3 = -1.5 + 3.4 * sf; }  // 猛劈
          viewGun.position.set(GUN_BASE.x * 0.35, GUN_BASE.y + 0.12, GUN_BASE.z - fwd3);
          viewGun.rotation.set(rx3, 0, 0);
          if (sp3 > BLADE_RISE + BLADE_LUNGE) camera.rotation.x = pitch + ((sp3 - BLADE_RISE - BLADE_LUNGE) / BLADE_SLAM) * 0.32;  // 劈下镜头压低
        }
        // 视角地震（shake：被青龙刀/咆哮炮等触发）
        if (shake > 0.001 && !reduced) {
          camera.rotation.z += (Math.random() - 0.5) * shake;
          camera.position.x += (Math.random() - 0.5) * shake * 2;
          camera.position.y += (Math.random() - 0.5) * shake * 2;
        }
      } else {
        // 菜单背景：缓慢环绕竞技场（reduced-motion 时静止）
        var ang = reduced ? 0.7 : (now() * 0.00008);
        camera.position.set(Math.cos(ang)*34, 16, Math.sin(ang)*34);
        camera.lookAt(0, 2, 0);
      }

      updateRemotes(dt);
      if (zRunning) { zTick(dt); updateZombies(dt); }   // 僵尸模式: 刷怪+AI(非僵尸模式 zRunning=false 零开销)
      if (joined && isZombieMode() && !me.alive && zSpectating && zState && zState.phase !== 'lost') zSpectateCam(dt);   // 死亡观战: 跟随活着的队友
      updateFx(dt);
      updateDebris(dt);
      updateBeams(dt);          // 崩星/秘境 激光轨迹与结算
      updateBlackHoles(dt);     // 黑洞移动 / 吸入 / 处死
      updateTsunamis(dt);       // 排山倒海巨浪推进 / 卷入
      updateGrenades(dt);       // 机甲榴弹飞行 / 爆炸
      tickKillfeed();

      renderScene();

      // 引擎已启动标志位（供 headless 自测检测）
      if (!window.__booted) window.__booted = true;
    }

    // ------------------------------------------------------------------ 工具
    function now() { return performance.now(); }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' })[c]; }); }
    function nameOf(id) {
      if (id === me.id) return me.name;
      if (remotes[id]) return remotes[id].name;
      if (scores[id]) return scores[id].name;
      return '某玩家';
    }
    function weaponNameById(wid) {
      for (var i = 0; i < WEAPONS.length; i++) if (WEAPONS[i].id === wid) return WEAPONS[i].name;
      return '武器';
    }

    // ------------------------------------------------------------------ 启动
    function boot() {
      try {
        initThree();
        bindInput();
        wireMenu();
        // 暴露少量调试信息
        window.__game = { THREE:THREE, get remotes() { return remotes; }, me:me, isHostNow:function(){return isHost;} };
        // 自测钩子（仅 ?test=1 时存在）：让 headless 脚本能驱动并断言"单机能跑动能开枪"
        if (TEST) window.__test = {
          joined:function(){ return joined; }, paused:function(){ return paused; }, alive:function(){ return me.alive; },

          widx:function(){ return weaponIndex; }, pos:function(){ return { x:playerPos.x, y:playerPos.y, z:playerPos.z }; },

          // 动画检查：枪械位姿 / 枪口闪光 / 相机高度（验证后坐、换弹动画、走路摆动）
          gunInfo:function(){ return viewGun ? { py:viewGun.position.y, pz:viewGun.position.z,
            rx:viewGun.rotation.x, rz:viewGun.rotation.z, muzzle: gunMuzzle ? gunMuzzle.visible : false } : null; },
          camY:function(){ return camera.position.y; }, reloading:function(){ return now() < reloadUntil; },
          // 开镜 / 爆头 / 超级武器 验证

          setSuperAmmo:function(n){ superAmmo = n; updateAmmoHud(); }, drop:function(){ dropSuper(); },
          // 回血
          setHp:function(n){ me.hp = n; updateHpHud(); }, maxHp:function(){ return maxHp; },
          damageNow:function(){ lastDamageAt = now(); }, forceRegenReady:function(){ lastDamageAt = now() - REGEN_DELAY - 50; },
          // 命中上报记录（崩星炮/部位伤害用）
          sentHits:function(){ return lastSentHits.slice(); }, clearSentHits:function(){ lastSentHits.length = 0; },
          setPos:function(x,z){ playerPos.set(x, EYE, z); },
          // 黑洞 / 秘境 / 排山倒海 / 复活
          holeCount:function(){ return blackholes.length; }, beamCount:function(){ return beams.length; },
          tsunamiCount:function(){ return tsunamis.length; }, tumbling:function(){ return now() < tumbleUntil; },
          fireRealmAt:function(id){ startRealmDuel(id); }, revive:function(){ deadUntil = now() - 1; },
          realmInfo:function(){ return { inRealm:inRealm, opponent:realmOpponent, hp:me.hp, maxHp:maxHp,
            x:playerPos.x, z:playerPos.z, fireRateMul:fireRateMul }; },
          // 远端小人动画姿态（验证奔跑/跳跃/死亡）
          remotePose:function(id){ var r=remotes[id]; if(!r) return null;

          cheatOn:function(){ return cheatMode; }, nextKind:function(){ return nextSuperKind(); },
          equipSuper:function(k){ cheatMode = true; cheatEquip(k); }, slamming:function(){ return now() < slamUntil; },
          spawnShot:function(){ spawnRemoteShot({ from:'x', col:0xffe6a0, mx:0,my:1.6,mz:0, ex:0,ey:1.6,ez:-40 }); },
          // 地图 / 物理 / 模式

          zPause:function(){ zRunning = false; }, zResume:function(){ zRunning = true; },

          zRoundState:function(){ return zState ? { phase:zState.phase, round:zState.round, budget:zState.budget, spawned:zState.spawned, bossPending:!!zState.bossPending, restLeft: zState.restEndsAt?Math.max(0,Math.round(zState.restEndsAt-now())):0 } : null; },

          zForceClear:function(){ if(zState){ zState.spawned = zState.budget; zClearAll(); } },   // 模拟整波清空 → 下个tick进入休息
          zEndRest:function(){ if(zState) zState.restEndsAt = now()-1; },                          // 跳过30s休息
          zTypesOnField:function(){ var o={}; for(var k in zombies){ var t=zombies[k].type; o[t]=(o[t]||0)+1; } return o; },
          zBudgetAt:function(n){ return zRoundBudget(n); },
          // ---- M4 武器/弹药自测钩子 ----
          zWeaponNow:function(){ var w=activeWeapon(); return { id:w.id, name:w.name, bat:zBatActive, melee:!!w.melee, clip:(zBatActive?-1:(superActive?superAmmo:ammo[weaponIndex])), mag:w.mag||0, reserve:{bullet:zReserve.bullet,antimatter:zReserve.antimatter,negmatter:zReserve.negmatter} }; },

          zAddReserve:function(cat,n){ zAddAmmo(cat,n); return zReserve[cat]; },
          zForceReloadDone:function(){ if(reloadUntil) reloadUntil = now()-1; },
          zReloading:function(){ return now() < reloadUntil; },
          // ---- M5 商店自测钩子 ----
          zSetGold:function(n){ zGold = n; if(typeof zUpdateHud==='function') zUpdateHud(); if(typeof zRenderShop==='function'&&zShop) zRenderShop(); return zGold; },
          zShopState:function(){ return zShop ? { open:zShop.open, gold:zGold, items:zShop.items.map(function(it){return {id:it.id,kind:it.kind,price:it.price};}), sold:zShop.sold.slice() } : null; },
          zOpenShopT:function(){ zOpenShop(); return this.zShopState(); },
          zCloseShopT:function(){ zCloseShop(); },
          zBuy:function(slot){ zBuyItem(slot); return this.zShopState(); },
          zRevives:function(){ return zRevives; },
          zRollAt:function(round){ return zRollShop(round).map(function(it){return it.id;}); },
          // ---- M6 死亡/观战/复活 自测钩子 ----
          zDead:function(){ return { alive:me.alive, spectating:zSpectating, phase:zState?zState.phase:null, revives:zRevives }; },
          zKillMe:function(){ applyDamage(999999,'zombie','zombie',false); },
          zSetRevives:function(n){ zRevives = n; updateAmmoHud(); return zRevives; },
          zReviveTeammate:function(){ zTryRevive(); },
          zWeaponId:function(){ return activeWeapon().id; },
          addMate:function(id,x,z,alive){ var r=ensureRemote(id||'mate','队友',0x66ccff); if(r){ r.group.position.set(x||0,0,z||0); if(r.target)r.target.set(x||0,0,z||0); r.alive=(alive!==false); r.spawned=true; r.lastSeen=now(); } return r?r.id:null; },
          mateAlive:function(id){ var r=remotes[id]; return r?r.alive:null; },
          superKindsOnMap:function(){ var a=[]; for(var s in superPickups) a.push(superPickups[s].userData.kind); return a; },
          wearNow:function(){ if (superActive && SUPERS[superKind] && SUPERS[superKind].isMecha) wearMecha(superKind); },
          mechaInfo:function(){ return { worn:mechaWorn, kind:superKind, maxHp:maxHp, hp:me.hp, weapon:mechaWeapon, grenades:grenades.length }; },
          fireNow:function(){ tryFire(); }, grenadeCount:function(){ return grenades.length; },
          addDummy:function(k){ addDummy(k); }, dummyHp:function(id){ var r=remotes[id]; return r?r.hp:null; }, camY:function(){ return camera.position.y; },
          roarSfx:function(){ return roarSfxN; }, beamViz:function(){ if(!beams.length) return null; var b=beams[beams.length-1]; return { kind:b.kind, radius:b.radius, killR:Math.round((b.radius+0.55)*10)/10, dotBase:(b.dots&&b.dots[2]?Math.round(b.dots[2].userData.base*10)/10:null), thickR:(b.thick&&b.thick.geometry?b.thick.geometry.parameters.radiusTop:null), fieldR:(b.field&&b.field.geometry?Math.round(b.field.geometry.parameters.radiusTop*10)/10:null), fieldDbl:(b.field?(b.field.material.side===THREE.DoubleSide):null), fieldOp:(b.field?Math.round(b.field.material.opacity*100)/100:null) }; }, hideGun:function(){ if(typeof viewGun!=='undefined'&&viewGun) viewGun.visible=false; },
          perf:function(){ var meshes=0, tris=0, inst=0; scene.traverse(function(o){ if(o.isMesh){ meshes++; if(o.isInstancedMesh) inst++; var g=o.geometry; var n=g&&g.index?g.index.count/3:(g&&g.attributes&&g.attributes.position?g.attributes.position.count/3:0); tris+=n*(o.isInstancedMesh?(o.count||1):1); } });
            return { calls:renderer.info.render.calls, tris:renderer.info.render.triangles, geos:renderer.info.memory.geometries, textures:renderer.info.memory.textures, sceneMeshes:meshes, instanced:inst, sceneTris:Math.round(tris), solids:worldSolids.length, mapMeshes:(typeof mapMeshes!=='undefined'?mapMeshes.length:-1), destruct:destructibles.length }; },
          destructInfo:function(){ var g=0,st=0,cb=0; for(var i=0;i<destructibles.length;i++) if(destructibles[i].gone) g++; for(var j=0;j<debris.length;j++) if(debris[j].settled) st++; for(var k=0;k<townBuildings.length;k++) if(townBuildings[k].collapsing) cb++; return { total:destructibles.length, gone:g, alive:destructibles.length-g, decals:_decals.length, debris:debris.length, settled:st, collapseQ:_collapseQ.length, collapsing:cb }; },
          shatterAt:function(x,z,r,mode){ var pm = mode==='suck' ? new THREE.Vector3(x,1.0,z) : (mode==='sweep' ? {x:1,z:0} : null); return shatterRadius(x,z,r||6,mode||'explode',pm); },
          laserAt:function(ox,oz,dx,dz,oy,beamR){ return laserPunch(new THREE.Vector3(ox,(oy==null?1.5:oy),oz), new THREE.Vector3(dx,0,dz).normalize(), 80, beamR); }
        };
        tryLoadGuandao();   // 真实青龙刀(若 models/guandao.glb 存在)
        animate();
      } catch (err) {
        // 真正的启动失败才报红，方便排查；不会污染正常控制台
        if (window.console) console.error('[boot] 引擎启动失败：', err);
        var el = document.getElementById('loaderr');
        el.hidden = false;
        el.innerHTML = '<b>引擎启动失败：</b>' + esc(err && err.message || err) +
          '（可能是浏览器不支持 WebGL）。';
        try { document.getElementById('dotWebgl').className = 'dot no'; } catch (e) {}
      }
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  })();
