<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:," />
<title>课间枪战 · FFA</title>
<!--
  ============================================================================
  课间枪战 · 第一人称多人 FFA 枪战 (纯静态)
  ============================================================================
  - 纯静态：无服务端、无构建步骤。所有第三方库已 vendor 到 ./vendor，
    用普通 <script src> 引入，运行时零外部 CDN 依赖（绝不使用 importmap / esm.sh）。
  - Three.js 用 r137 的 UMD 全局构建（暴露 window.THREE）。
  - 第一人称控制（指针锁定 / 鼠标视角 / 移动）全部手写，不依赖 PointerLockControls。
  - 联机：PeerJS（vendor 到本地），信令走其公共 broker（这部分需要联网，属正常）。

  【WebRTC / NAT 说明】
  PeerJS 默认使用其公共 broker 做信令，并配了 Google/Twilio 的 STUN。
  在大多数家庭 / 校园网络里 WebRTC 可以直连。但 WebRTC 受 NAT 穿透限制：
  在某些对称型 NAT / 严格防火墙下两端可能连不上。若出现连不上的情况，可以：
    1) 改用自建 PeerServer 做信令（npm i -g peer; peerjs --port 9000），
       然后给下面的 PEER_OPTS 增加 { host, port, path } 指向你的 PeerServer；
    2) 并/或在 iceServers 里加入一个 TURN 服务器做中继（穿透失败时兜底）。
  当前版本用公共 broker 即可满足"同学之间填同一个房间号联机"的需求。
  ============================================================================
-->
<style>
  :root{
    --bg:#0b0f14; --panel:rgba(16,22,30,.92); --line:#1e2a37;
    --text:#e8eef5; --muted:#8fa3b8; --accent:#36c6ff; --accent2:#ffd24a;
    --good:#46d17a; --bad:#ff5a5a; --warn:#ffb454;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif;
    overflow:hidden; }
  #game{ position:fixed; inset:0; }
  #game canvas{ display:block; width:100%; height:100%; }

  /* ---- 通用面板 ---- */
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:12px;
    box-shadow:0 10px 40px rgba(0,0,0,.45); }

  /* ---- 加载/库错误横幅 ---- */
  #loaderr{ position:fixed; top:0; left:0; right:0; z-index:50; padding:14px 18px;
    background:#3a0d0d; color:#ffdede; border-bottom:2px solid var(--bad);
    font-size:14px; line-height:1.5; }
  #loaderr b{ color:#fff; }

  /* ---- 主菜单 ---- */
  #menu{ position:fixed; inset:0; z-index:40; display:flex; align-items:center;
    justify-content:center; backdrop-filter:blur(2px);
    background:radial-gradient(1200px 700px at 50% 30%, rgba(20,30,42,.35), rgba(6,9,13,.78)); }
  #menu .card{ width:min(440px,92vw); padding:26px 26px 22px; }
  #menu h1{ margin:0 0 2px; font-size:26px; letter-spacing:.5px; }
  #menu .sub{ color:var(--muted); font-size:13px; margin-bottom:18px; }
  #menu label{ display:block; font-size:12px; color:var(--muted); margin:12px 0 6px; }
  #menu input{ width:100%; padding:11px 12px; font-size:15px; border-radius:9px;
    border:1px solid var(--line); background:#0e151d; color:var(--text); }
  #menu input:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent); }
  #joinBtn{ margin-top:18px; width:100%; padding:12px 14px; font-size:16px; font-weight:600;
    color:#04222e; background:linear-gradient(180deg,#5fd6ff,#22b6f0); border:0; border-radius:10px;
    cursor:pointer; }
  #joinBtn:hover{ filter:brightness(1.06); }
  #joinBtn:focus-visible{ outline:2px solid #fff; outline-offset:2px; }
  #joinBtn:disabled{ filter:grayscale(.6) brightness(.8); cursor:not-allowed; }
  /* 创建/加入房间 UI */
  .bigbtn{ flex:1; padding:12px 14px; font-size:16px; font-weight:600; color:#04222e;
    background:linear-gradient(180deg,#5fd6ff,#22b6f0); border:0; border-radius:10px; cursor:pointer; }
  .bigbtn:hover{ filter:brightness(1.07); }
  .bigbtn.ghost{ color:var(--text); background:#162230; border:1px solid var(--line); }
  .row2{ display:flex; gap:10px; margin-top:14px; }
  #menu label{ display:block; margin-top:14px; margin-bottom:6px; font-size:13px; color:var(--muted); }
  .seg{ display:flex; flex-wrap:wrap; gap:8px; }
  .seg button{ flex:1 1 46%; padding:9px 10px; text-align:left; border-radius:9px; cursor:pointer;
    border:1px solid var(--line); background:#0e151d; color:var(--text); font-size:13px; line-height:1.25; }
  .seg button small{ display:block; color:var(--muted); font-size:11px; margin-top:2px; }
  .seg button:hover{ border-color:var(--accent); }
  .seg button.sel{ border-color:var(--accent2); background:rgba(255,210,74,.14); color:#ffe08a; }
  .seg button.sel small{ color:#d9c277; }
  .codebox{ margin-top:14px; padding:12px; border:1px dashed var(--accent2); border-radius:10px; text-align:center;
    font-size:14px; color:var(--muted); }
  .codebox span{ display:block; font-size:34px; font-weight:800; letter-spacing:6px; color:#ffe08a; font-family:ui-monospace,monospace; }
  .codebox small{ display:block; margin-top:4px; font-size:11px; }
  .libstatus{ margin-top:16px; font-size:12px; color:var(--muted); display:flex; gap:14px; flex-wrap:wrap; }
  .libstatus span{ display:inline-flex; align-items:center; gap:6px; }
  .dot{ width:9px; height:9px; border-radius:50%; background:var(--muted); }
  .dot.ok{ background:var(--good); } .dot.no{ background:var(--bad); }
  .hint{ margin-top:14px; font-size:11.5px; color:#6f8194; line-height:1.6; }
  kbd{ background:#0e151d; border:1px solid var(--line); border-bottom-width:2px; border-radius:5px;
    padding:1px 6px; font-size:11px; color:#cdd9e6; }

  /* ---- HUD ---- */
  #hud{ position:fixed; inset:0; z-index:20; pointer-events:none; font-variant-numeric:tabular-nums; }
  #hud[hidden]{ display:none; }
  /* 准星 */
  #crosshair{ position:absolute; left:50%; top:50%; width:24px; height:24px;
    transform:translate(-50%,-50%); }
  #crosshair::before,#crosshair::after{ content:""; position:absolute; background:#eafaff;
    box-shadow:0 0 2px rgba(0,0,0,.8); }
  #crosshair::before{ left:50%; top:0; width:2px; height:100%; transform:translateX(-50%); }
  #crosshair::after{ top:50%; left:0; height:2px; width:100%; transform:translateY(-50%); }
  #crosshair .dot{ position:absolute; left:50%; top:50%; width:3px; height:3px; border-radius:50%;
    background:#eafaff; transform:translate(-50%,-50%); }
  /* 命中标记 */
  #hitmarker{ position:absolute; left:50%; top:50%; width:26px; height:26px;
    transform:translate(-50%,-50%) rotate(45deg); opacity:0; }
  #hitmarker::before,#hitmarker::after{ content:""; position:absolute; background:#ff5a5a; }
  #hitmarker::before{ left:50%; top:0; width:3px; height:100%; transform:translateX(-50%); }
  #hitmarker::after{ top:50%; left:0; height:3px; width:100%; transform:translateY(-50%); }
  /* 爆头：更大、金色 */
  #hitmarker.head{ width:34px; height:34px; }
  #hitmarker.head::before,#hitmarker.head::after{ background:#ffd24a; }

  /* 顶部中央临时提示（捡到超级武器等） */
  #notice{ position:absolute; left:50%; top:14%; transform:translateX(-50%); opacity:0;
    transition:opacity .25s; font-size:17px; font-weight:700; color:#eafaff; text-align:center;
    text-shadow:0 0 10px rgba(0,0,0,.9); padding:8px 16px; border-radius:10px;
    background:rgba(10,40,52,.55); border:1px solid rgba(102,255,255,.5); }

  /* 狙击镜：中间透明圆=镜片(看到放大后的世界)，外圈黑色=镜身，叠加准星刻线 */
  #scope{ position:absolute; inset:0; z-index:24; pointer-events:none; opacity:0; transition:opacity .1s; }
  #scope .lens{ position:absolute; inset:0; background: radial-gradient(circle at 50% 50%,
      rgba(0,0,0,0) 0, rgba(0,0,0,0) 33vmin, rgba(0,0,0,.35) 33.2vmin,
      rgba(0,0,0,.92) 35vmin, #03060a 36vmin, #03060a 100%); }
  #scope .ring{ position:absolute; left:50%; top:50%; width:70vmin; height:70vmin;
    transform:translate(-50%,-50%); border-radius:50%; border:4px solid #11181f;
    box-shadow: inset 0 0 40px 8px rgba(0,0,0,.85), 0 0 0 2px rgba(120,140,160,.22); }
  #scope .reticle{ position:absolute; left:50%; top:50%; width:66vmin; height:66vmin;
    transform:translate(-50%,-50%); filter:drop-shadow(0 0 1px rgba(255,255,255,.45)); }

  /* 左下：血量 + 武器 */
  #botleft{ position:absolute; left:22px; bottom:20px; min-width:230px; }
  #hpwrap{ height:16px; border-radius:8px; background:#10202a; border:1px solid var(--line); overflow:hidden; }
  #hpbar{ height:100%; width:100%; background:linear-gradient(90deg,#46d17a,#9bee7a); transition:width .12s; }
  #hpnum{ font-size:13px; color:var(--muted); margin-top:5px; }
  #wepname{ font-size:20px; font-weight:700; margin-top:10px; }
  #wepname small{ font-size:12px; color:var(--muted); font-weight:400; }

  /* 右下：弹药 */
  #botright{ position:absolute; right:24px; bottom:18px; text-align:right; }
  #ammo{ font-size:40px; font-weight:800; line-height:1; }
  #ammo .res{ font-size:18px; color:var(--muted); font-weight:500; }
  #reloading{ font-size:13px; color:var(--accent2); margin-top:4px; height:16px; }

  /* 武器槽 */
  #slots{ position:absolute; left:50%; bottom:18px; transform:translateX(-50%); display:flex; gap:8px; }
  .slot{ padding:6px 10px; border-radius:8px; background:rgba(10,16,22,.7); border:1px solid var(--line);
    font-size:12px; color:var(--muted); }
  .slot b{ color:var(--accent); margin-right:5px; }
  .slot.active{ background:rgba(54,198,255,.18); border-color:var(--accent); color:#fff; }
  .slot.super{ background:rgba(102,255,255,.2); border-color:#66ffff; color:#dffefe; }
  .slot.super b{ color:#66ffff; }

  /* 右上：积分板 + killfeed */
  #scorebox{ position:absolute; right:20px; top:16px; width:230px; }
  #scorebox .panel{ padding:8px 10px; }
  #scorebox h3{ margin:0 0 6px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .scrow{ display:flex; justify-content:space-between; font-size:13px; padding:2px 0; }
  .scrow .nm{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:150px; }
  .scrow .kd{ color:var(--muted); }
  .scrow.me .nm{ color:var(--accent2); font-weight:700; }
  #killfeed{ position:absolute; right:20px; top:0; margin-top:8px; text-align:right; }
  #killfeed.below{ position:static; margin-top:8px; }
  .kf{ font-size:13px; margin:3px 0; opacity:1; transition:opacity .5s; }
  .kf .k{ color:var(--accent); font-weight:600; } .kf .v{ color:var(--bad); font-weight:600; }
  .kf .w{ color:var(--muted); }

  /* 网络状态 */
  #netstat{ position:absolute; left:22px; top:16px; font-size:12px; color:var(--muted);
    display:flex; align-items:center; gap:7px; }
  #netstat .dot{ width:9px; height:9px; }
  /* 左上角测试按钮（z-index 高于暂停层，松开鼠标后可点） */
  #testpanel{ position:absolute; left:22px; top:38px; z-index:60; pointer-events:auto; display:flex; gap:6px; }
  #devpanel{ position:absolute; left:22px; top:72px; z-index:60; pointer-events:auto; width:210px;
    background:rgba(10,16,22,.9); border:1px solid var(--accent2); border-radius:9px; padding:9px 10px; }
  #devpanel .dp-t{ font-size:12px; font-weight:700; color:var(--accent2); margin-bottom:7px; }
  #devpanel .dp-row{ display:flex; gap:6px; }
  #devpanel button{ flex:1; padding:6px 4px; font-size:12px; border-radius:7px; cursor:pointer;
    border:1px solid var(--line); background:#0e151d; color:var(--text); }
  #devpanel button:hover{ border-color:var(--accent2); color:#ffe08a; }
  #devpanel .dp-hint{ margin-top:7px; font-size:11px; color:var(--muted); line-height:1.4; }
  #testbtn{ width:26px; height:26px; padding:0; border-radius:7px; border:1px solid var(--line);
    background:rgba(10,16,22,.85); color:#cdd9e6; font-size:14px; cursor:pointer; line-height:1; }
  #testbtn:hover{ border-color:var(--accent); }
  #testbtn.on{ border-color:var(--accent2); background:rgba(255,210,74,.18); }
  #testpw{ width:88px; padding:3px 8px; font-size:12px; border-radius:7px; border:1px solid var(--accent);
    background:#0e151d; color:var(--text); }
  #testpw:focus-visible{ outline:2px solid var(--accent); }

  /* 死亡 / 暂停 大屏提示 */
  .bigmsg{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:8px; text-align:center; pointer-events:none; }
  #deathmsg{ display:none; }
  #deathmsg .t{ font-size:30px; font-weight:800; color:var(--bad); }
  #deathmsg .s{ font-size:16px; color:var(--text); }
  #pausemsg{ display:none; pointer-events:auto; background:rgba(6,9,13,.55); }
  #pausemsg .t{ font-size:26px; font-weight:800; }
  #pausemsg .s{ font-size:14px; color:var(--muted); }
  #pausemsg button{ margin-top:14px; padding:10px 22px; font-size:15px; border-radius:9px; border:0;
    background:var(--accent); color:#04222e; font-weight:700; cursor:pointer; }

  /* 全屏积分板 (Tab) */
  #fullboard{ position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(6,9,13,.6); }
  #fullboard .panel{ width:min(560px,92vw); padding:18px 20px; }
  #fullboard h2{ margin:0 0 12px; font-size:18px; }
  #fullboard table{ width:100%; border-collapse:collapse; font-size:14px; }
  #fullboard th{ text-align:left; color:var(--muted); font-size:11px; text-transform:uppercase;
    border-bottom:1px solid var(--line); padding:6px 4px; }
  #fullboard td{ padding:7px 4px; border-bottom:1px solid rgba(30,42,55,.5); }
  #fullboard tr.me td{ color:var(--accent2); font-weight:700; }

  /* 受伤红屏 */
  #dmgflash{ position:absolute; inset:0; background:radial-gradient(circle at 50% 60%, rgba(255,0,0,0), rgba(180,0,0,.55));
    opacity:0; pointer-events:none; transition:opacity .12s; }
  /* 处于激光范围内：屏幕渐亮（不是纯白挡视线） */
  #beamflash{ position:absolute; inset:0; pointer-events:none; opacity:0;
    background:radial-gradient(circle at 50% 50%, rgba(255,255,255,.95), rgba(220,235,255,.4)); mix-blend-mode:screen; }
  /* 崩星咆哮炮蓄力：力量汇聚的压暗角(只压边缘，中心清楚，不糊持枪者) */
  #chargevig{ position:absolute; inset:0; pointer-events:none; opacity:0;
    background:radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 30%, rgba(40,0,40,.5) 70%, rgba(10,0,16,.92) 100%); }
  /* 机甲座舱 HUD + 滤镜（穿上机甲时） */
  #mechhud{ position:absolute; inset:0; pointer-events:none; --mhc:255,154,60; }
  #mechhud.god{ --mhc:255,60,120; }
  #mechhud::before{ content:''; position:absolute; inset:0; box-shadow:inset 0 0 240px rgba(var(--mhc),.30); }
  #mechhud::after{ content:''; position:absolute; inset:0; opacity:.5;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 3px, rgba(var(--mhc),.05) 4px, rgba(0,0,0,0) 5px); }
  .mh-corner{ position:absolute; width:78px; height:78px; border:3px solid rgba(var(--mhc),.85); box-shadow:0 0 14px rgba(var(--mhc),.5); }
  .mh-corner.tl{ top:16px; left:16px; border-right:0; border-bottom:0; }
  .mh-corner.tr{ top:16px; right:16px; border-left:0; border-bottom:0; }
  .mh-corner.bl{ bottom:16px; left:16px; border-right:0; border-top:0; }
  .mh-corner.br{ bottom:16px; right:16px; border-left:0; border-top:0; }
  .mh-ring{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:360px; height:360px; max-width:48vw; max-height:48vw;
    border:2px solid rgba(var(--mhc),.45); border-radius:50%; }
  .mh-ring.inner{ width:170px; height:170px; border-style:dashed; opacity:.6; }
  .mh-tag{ position:absolute; top:18px; left:50%; transform:translateX(-50%); color:rgba(var(--mhc),.95);
    font-size:12px; font-weight:800; letter-spacing:3px; text-shadow:0 0 10px rgba(var(--mhc),.7); }

  @media (prefers-reduced-motion: reduce){
    #hpbar{ transition:none; } .kf{ transition:none; } #dmgflash{ transition:none; } #notice{ transition:none; }
    #scope{ transition:none; }
  }
</style>
</head>
<body>
  <div id="game"></div>

  <!-- 库加载失败横幅（默认隐藏；存在性检查失败时显示，并指明是哪一个库） -->
  <div id="loaderr" hidden></div>

  <!-- HUD -->
  <div id="hud" hidden aria-hidden="true">
    <div id="crosshair"><span class="dot"></span></div>
    <div id="hitmarker"></div>
    <div id="notice"></div>

    <!-- 狙击镜：开镜时显示。中间圆形镜片(透出放大后的世界) + 周围黑色镜身 + 准星刻线 -->
    <div id="scope">
      <div class="lens"></div>
      <div class="ring"></div>
      <svg class="reticle" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <g stroke="#0a0a0a" stroke-width="1.1" fill="none">
          <line x1="100" y1="6"   x2="100" y2="86"/>
          <line x1="100" y1="114" x2="100" y2="194"/>
          <line x1="6"   y1="100" x2="86"  y2="100"/>
          <line x1="114" y1="100" x2="194" y2="100"/>
          <!-- 密位刻度 -->
          <line x1="120" y1="98" x2="120" y2="102"/><line x1="140" y1="97" x2="140" y2="103"/>
          <line x1="160" y1="96" x2="160" y2="104"/>
          <line x1="80"  y1="98" x2="80"  y2="102"/><line x1="60"  y1="97" x2="60"  y2="103"/>
          <line x1="40"  y1="96" x2="40"  y2="104"/>
          <line x1="98" y1="120" x2="102" y2="120"/><line x1="97" y1="140" x2="103" y2="140"/>
          <line x1="98" y1="80"  x2="102" y2="80"/> <line x1="97" y1="60"  x2="103" y2="60"/>
        </g>
        <circle cx="100" cy="100" r="1.7" fill="#e23b3b"/>
      </svg>
    </div>

    <div id="netstat"><span class="dot" id="netdot"></span><span id="nettext">未连接</span></div>

    <!-- 左上角测试按钮：输入密码 67 获得超级武器 / 再输一次补满弹药 -->
    <div id="testpanel">
      <button id="testbtn" type="button" title="测试超级武器">🔧</button>
      <input id="testpw" type="text" inputmode="numeric" maxlength="6" placeholder="密码" hidden autocomplete="off" />
    </div>
    <!-- 开发者模式面板（输入 67 后出现）：添加假人 -->
    <div id="devpanel" hidden>
      <div class="dp-t">开发者模式 · 添加假人</div>
      <div class="dp-row">
        <button type="button" data-dummy="normal">普通</button>
        <button type="button" data-dummy="mecha">超级机甲</button>
        <button type="button" data-dummy="godmecha">终焉机神</button>
      </div>
      <div class="dp-hint">机甲模式中按 <b>X</b> 退出 · 滚轮/数字键切换全部武器</div>
    </div>

    <div id="scorebox">
      <div class="panel"><h3>积分板 · FFA</h3><div id="scorerows"></div></div>
      <div id="killfeed"></div>
    </div>

    <div id="botleft">
      <div id="hpwrap"><div id="hpbar"></div></div>
      <div id="hpnum">HP 100</div>
      <div id="wepname">—</div>
    </div>

    <div id="botright">
      <div id="ammo">0<span class="res"> / 0</span></div>
      <div id="reloading"></div>
    </div>

    <div id="slots"></div>

    <div id="deathmsg" class="bigmsg">
      <div class="t">你被击杀了</div>
      <div class="s" id="respawnText">3 秒后重生…</div>
    </div>

    <div id="dmgflash"></div>
    <div id="beamflash"></div>
    <div id="chargevig"></div>
    <div id="mechhud" hidden>
      <div class="mh-corner tl"></div><div class="mh-corner tr"></div><div class="mh-corner bl"></div><div class="mh-corner br"></div>
      <div class="mh-ring"></div><div class="mh-ring inner"></div>
      <div class="mh-tag">MECH UNIT · 机甲控制</div>
    </div>

    <div id="fullboard">
      <div class="panel">

  <!-- ====== 库存在性检查（失败时明确报出是哪一个库） ====== -->
  <script>
  (function () {
    var missing = [];
    var dotThree = document.getElementById('dotThree');
    var dotPeer  = document.getElementById('dotPeer');
    if (typeof window.THREE === 'undefined') { missing.push('Three.js（./vendor/three.min.js）'); dotThree.className = 'dot no'; }
    else { dotThree.className = 'dot ok'; }
    if (typeof window.Peer === 'undefined')  { missing.push('PeerJS（./vendor/peerjs.min.js）'); dotPeer.className = 'dot no'; }
    else { dotPeer.className = 'dot ok'; }

    if (missing.length) {
      var el = document.getElementById('loaderr');
      el.hidden = false;
      el.innerHTML = '<b>加载失败：</b>以下本地库没能加载成功 → <b>' + missing.join('、') +
        '</b>。请确认 <code>./vendor/</code> 文件夹和这些文件已经一起上传，且路径为相对路径。';
      var btn = document.getElementById('joinBtn');
      if (btn) { btn.disabled = true; btn.textContent = '库未加载，无法开始'; }
      // 标记：让自测脚本能区分"库缺失"导致的未启动
      window.__libError = missing.slice();
    }
  })();
  </script>

    function buildStars() {
      var N = 1500, geo = new THREE.BufferGeometry(), pos = new Float32Array(N * 3);
      for (var i = 0; i < N; i++) {
        var r = 380 + Math.random() * 70, th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
        pos[i*3] = r * Math.sin(ph) * Math.cos(th);
        pos[i*3+1] = Math.abs(r * Math.cos(ph)) * 0.85 + 15;   // 偏上半天空
        pos[i*3+2] = r * Math.sin(ph) * Math.sin(th);
      }
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      var stars = new THREE.Points(geo, new THREE.PointsMaterial({ color:0xffffff, size:1.5, sizeAttenuation:false, fog:false, transparent:true, opacity:0.9 }));

    }
    function initThree() {

      buildStars();                                    // 黑色天空 + 星星

      camera = new THREE.PerspectiveCamera(76, window.innerWidth/window.innerHeight, 0.05, 1000);
      camera.rotation.order = 'YXZ';

      renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.22;
      renderer.physicallyCorrectLights = false;   // 与最初版一致(物理光照会让同样强度暗很多)
      renderer.shadowMap.enabled = false;   // 极简：移除光影(阴影)
      gameRoot.appendChild(renderer.domElement);
      try { document.getElementById('dotWebgl').className = 'dot ok'; } catch (e) {}

      var hemi = new THREE.HemisphereLight(0xbfe3ff, 0x2a3340, 0.95);
      scene.add(hemi);
      var key = new THREE.DirectionalLight(0xffffff, 0.65);
      key.position.set(20, 40, 12); scene.add(key);

      buildMap('basic');
      initBloom();
      clock = new THREE.Clock();

    // 程序化"影棚"环境：几块发光面板围成的盒子，PMREM 后作为 PBR 反射/环境光
    function buildEnvScene() {
      var s = new THREE.Scene();
      s.add(new THREE.Mesh(new THREE.BoxGeometry(40,40,40),
        new THREE.MeshStandardMaterial({ color:0x20262f, side:THREE.BackSide, roughness:1 })));
      function panel(x, y, z, sx, sy, sz, col, inten) {
        var m = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz),
          new THREE.MeshStandardMaterial({ emissive:col, emissiveIntensity:inten, color:0x000000 }));
        m.position.set(x, y, z); s.add(m);
      }
      panel(0, 19, 0, 30, 1, 30, 0xfff4e2, 4);     // 顶光
      panel(-19, 4, 0, 1, 20, 30, 0x88a8ff, 2.2);  // 冷侧
      panel(19, 4, 0, 1, 20, 30, 0xffd9a0, 2.0);   // 暖侧
      panel(0, 4, -19, 30, 20, 1, 0x6f86c0, 1.4);
      return s;

    function buildGunModel(w, mwv) {
      var g = new THREE.Group();
      if (w.isMecha) { buildMechaViewModel(g, w, mwv || 0); return g; }
      // 零件表对普通枪按 id 取(pistol…)，对超级武器/仙器按 kind 取(star/roar…，因其 id 是 super_star/xian_roar)
      var d = GUN_PARTS[w.id] || (w.kind ? GUN_PARTS[w.kind] : null);
      if (d) { buildFromParts(g, d.parts, w); g.userData.muzzleZ = d.muzzleZ; return g; }
      var dark = gmat(0x171c22);                       // 兜底
      gbox(g, 0.10,0.12,0.46, dark, 0,0,0); gcyl(g, 0.026,0.026,0.4, dark, 0,0.01,-0.5);
      g.userData.muzzleZ = -0.7; return g;
    }
    // 机甲第一人称：mwv 0=手炮/熔炮  1=爆地能量巨剑(终焉机神武器2)
    function buildMechaViewModel(g, w, mwv) {
      var col = w.col, big = (w.kind === 'godmecha');
      var metal = gmat(0x2b313b), darkm = gmat(0x14171c), glow = gmat(col, col), gold = gmat(0xd4af37, 0x2a2208);
      if (big && mwv === 1) {
        // 爆地：精制能量巨剑(仙器级)
        gbox(g, 0.14, 0.14, 0.44, darkm, 0.04, -0.14, 0.36);                       // 握柄
        [0.46,0.3,0.14].forEach(function (zz) { gcyl(g, 0.08,0.08,0.035, gold, 0.04,-0.14,zz); });   // 缠金箍
        gpart(g, new THREE.OctahedronGeometry(0.1,0), glow, 0.04,-0.14,0.55);      // 柄尾宝珠(发光)
        gbox(g, 0.52, 0.16, 0.16, metal, 0.04, -0.03, 0.0);                        // 十字护手
        [-0.24,0.24].forEach(function (xx) { gpart(g, new THREE.ConeGeometry(0.07,0.18,4), gold, 0.04+xx,-0.03,0.0, 0,0, xx<0?1.0:-1.0); });  // 护手翼尖
        gpart(g, new THREE.BoxGeometry(0.045, 0.5, 1.6), glow, 0.04, 0.14, -0.84);  // 主刃(发光)
        gpart(g, new THREE.BoxGeometry(0.09, 0.18, 1.5), metal, 0.04, 0.12, -0.8);  // 中脊(金属)
        gpart(g, new THREE.BoxGeometry(0.05, 0.34, 0.5), glow, 0.04, 0.34, -1.72, 0.32);  // 上挑剑尖
        gpart(g, new THREE.BoxGeometry(0.02, 0.12, 1.0), gmat(0xffffff, col), 0.096, 0.14, -0.84);  // 刃口高光
        gpart(g, new THREE.BoxGeometry(0.02, 0.12, 1.0), gmat(0xffffff, col), -0.016, 0.14, -0.84);
        g.userData.muzzleZ = -1.5; return;
      }
      // 手炮 / 熔炮(终焉更壮)
      gbox(g, big?0.42:0.36, big?0.42:0.36, 0.52, metal, 0.04, -0.04, 0.16);     // 前臂/机匣
      gbox(g, big?0.5:0.42, 0.18, 0.24, darkm, 0.04, big?0.2:0.16, 0.18);        // 顶部装甲
      gbox(g, 0.1, 0.1, 0.48, darkm, big?0.26:0.22, 0, 0.0);                     // 侧导轨
      gcyl(g, big?0.23:0.19, big?0.2:0.16, big?0.86:0.74, darkm, 0.04, -0.02, big?-0.48:-0.42);   // 粗炮管
      gcyl(g, big?0.29:0.24, big?0.29:0.24, 0.13, metal, 0.04, -0.02, big?-0.92:-0.78);           // 炮口
      (big?[-0.6,-0.72,-0.84,-0.96]:[-0.52,-0.64,-0.76]).forEach(function (zz) { gcyl(g, big?0.26:0.21, big?0.26:0.21, 0.04, glow, 0.04, -0.02, zz); });   // 发光环
      gpart(g, new THREE.SphereGeometry(big?0.2:0.15, 14, 12), glow, 0.04, -0.02, 0.14);   // 发光弹巢
      if (big) [-0.1,0.1].forEach(function (xx) { gbox(g, 0.04, 0.3, 0.5, glow, 0.04+xx, 0.18, -0.2); });  // 终焉：侧翼发光
      gbox(g, 0.12, 0.28, 0.16, darkm, 0.04, -0.26, 0.2);         // 握把
      g.userData.muzzleZ = big ? -0.98 : -0.82;
    }

      document.addEventListener('mousemove', function (e) {

        var mxv = e.movementX || 0, myv = e.movementY || 0;
        var effSens = SENS * (1 - adsAmt * 0.5);
        yaw   -= mxv * effSens;
        pitch -= myv * effSens;

        gunSwayX = Math.max(-0.05, Math.min(0.05, gunSwayX + mxv * 0.00035));

    function tryFire() {
      if (!joined || paused || !me.alive) return;
      if (now() < slamUntil) return;                 // 青龙刀挥砍动画中：不能行动
      var w = activeWeapon();
      var kind = superActive ? w.kind : null;

      // 青龙偃月刀：独立冷却 + 挥砍动画，不消耗弹药
      if (kind === 'blade') { if (now() >= bladeReadyAt) startBladeSlam(); return; }

      // 机甲：未穿上→左键穿上(不可脱)；已穿上→开火
      if (kind === 'mecha' || kind === 'godmecha') {
        if (!mechaWorn) { wearMecha(kind); return; }
        if (kind === 'godmecha' && mechaWeapon === 1) { if (now() >= bladeReadyAt) startBurstSlam(); return; }   // 爆地巨剑
        if (now() < fireCooldown) return;
        if (superAmmo <= 0) { dropSuper(); return; }
        if (!cheatInfinite) superAmmo--;
        fireCooldown = now() + (60000 / w.rpm) * fireRateMul;
        viewRecoil = Math.min(viewRecoil + w.kick, 0.12); gunKick = Math.min(gunKick + w.kick * 7 + 0.2, 1.3);
        fireGrenade(kind, w); fireMuzzle();
        updateAmmoHud();
        if (!cheatInfinite && superAmmo <= 0) dropSuper();
        return;
      }

      if (now() < reloadUntil) return;
      if (now() < fireCooldown) return;
      if (activeAmmo() <= 0) { if (!superActive) startReload(); return; }

      aimCamera();   // 直接点击开火时，确保用最新的视角方向做射线检测
      if (superActive) { if (!cheatInfinite) superAmmo--; } else ammo[weaponIndex]--;
      fireCooldown = now() + (60000 / w.rpm) * fireRateMul;
      shootSound(w);
      viewRecoil = Math.min(viewRecoil + w.kick, 0.12);   // 视角向上的后坐力
      gunKick = Math.min(gunKick + w.kick * 7 + 0.12, 1.3); // 枪械后坐（后顶 + 上抬）
      if (kind !== 'roar') fireMuzzle();                  // 咆哮炮有自己的蓄力特效

      if (kind === 'star' || kind === 'realm' || kind === 'roar') fireBeam(kind, w);  // 等离子/秘境/崩星咆哮：激光

      me.hp = Math.min(maxHp, me.hp + dt * (maxHp / (REGEN_FULL / 1000)));
      updateHpHud();
    }
    function flashDamage() {
      var f = document.getElementById('dmgflash');
      f.style.opacity = '0.9';
      setTimeout(function () { f.style.opacity = '0'; }, 90);
    }
    function die(byId, weapon, head) {
      me.alive = false; me.deaths++;
      deadUntil = now() + 3000;
      slamUntil = 0; slamImpactDone = true;   // 取消未落下的青龙刀，死后不再造成伤害
      chargeUntil = 0;                         // 取消蓄力动画
      dropSuper();             // 死亡失去超级武器
      ads = false;
      deathSound();
      // 广播击杀事件（由被击杀方广播，更新所有人的计分/击杀提示）
      netSend({ type:'kill', from:me.id, killer:byId, victim:me.id, weapon:weapon, head:!!head });
      updateKill(byId, me.id, weapon, !!head);
      document.getElementById('deathmsg').style.display = 'flex';
      updateScoreboard();
    }
    function respawn() {
      me.alive = true;
      vy = 0; tumbleUntil = 0; tumbleKiller = null; slamUntil = 0; slamImpactDone = true; shake = 0;
      for (var i = 0; i < ammo.length; i++) ammo[i] = WEAPONS[i].mag;
      dropSuper();             // 重生用普通武器
      if (inRealm) exitRealm(false); // 在秘境里死亡 → 落败，回到主竞技场
      else { me.hp = 100; maxHp = 100; playerPos.copy(randomSpawn()); }
      lastDamageAt = now();
      document.getElementById('deathmsg').style.display = 'none';
      updateHpHud(); updateAmmoHud();
    }

    // ------------------------------------------------------------------ 秘境 1v1
    function enterRealm(opponentId, myPos, asHolder) {
      if (inRealm || !me.alive) return;     // 已在秘境 / 已死亡：忽略（避免被拖入第二个秘境）
      inRealm = true; realmOpponent = opponentId; realmEnteredAt = now();
      dropSuper(); ads = false; tumbleUntil = 0; tumbleKiller = null;
      playerPos.copy(myPos); vy = 0;
      yaw = asHolder ? -Math.PI/2 : Math.PI/2; pitch = 0;   // 面朝对手
      for (var i = 0; i < ammo.length; i++) ammo[i] = WEAPONS[i].mag;  // 秘境里用初始武器，弹匣装满
      if (asHolder) { maxHp = 200; me.hp = 200; fireRateMul = 0.55; }  // 持枪者：200血 + 更快射速
      else          { maxHp = 100; me.hp = 100; fireRateMul = 1; }
      lastDamageAt = now();
      updateHpHud(); updateWeaponHud(); updateAmmoHud();
      showNotice(asHolder ? '⚔ 进入秘境！200 血 + 高射速，干掉对手！' : '⚔ 你被拖入秘境！1v1 决生死！');
    }
    function exitRealm(won) {
      if (!inRealm) return;
      inRealm = false; realmOpponent = null;
      maxHp = 100; me.hp = 100; fireRateMul = 1; tumbleUntil = 0; tumbleKiller = null;
      playerPos.copy(randomSpawn()); vy = 0;
      lastDamageAt = now();
      updateHpHud(); updateWeaponHud(); updateAmmoHud();
      showNotice(won ? '🏆 你赢了！回到战场' : '🏁 秘境结束，回到战场');
    }

    // ------------------------------------------------------------------ 计分 / 击杀提示
    function selfScore() { return { name:me.name, kills:me.kills, deaths:me.deaths, color:me.colorHex, me:true }; }
    function allScores() {
      var list = [];
      list.push(selfScore());
      for (var id in scores) list.push(scores[id]);
      list.sort(function (a, b) { return (b.kills - a.kills) || (a.deaths - b.deaths); });
      return list;
    }
    // 计分板渲染节流：state 包每秒来很多次，只标脏，由主循环每 ~250ms 真正重建一次 DOM
    var scoreDirty = true, lastScoreRender = 0;
    function updateScoreboard() { scoreDirty = true; }
    function renderScoreboard() {
      scoreDirty = false; lastScoreRender = now();
      var rows = allScores();
      var top = rows.slice(0, 6).map(function (s) {
        return '<div class="scrow' + (s.me ? ' me' : '') + '"><span class="nm">' + esc(s.name) +
               '</span><span class="kd">' + s.kills + ' / ' + s.deaths + '</span></div>';
      }).join('');
      document.getElementById('scorerows').innerHTML = top || '<div class="scrow"><span class="nm">等待玩家…</span></div>';
      if (boardOpen) renderFullBoard();
    }
    function renderFullBoard() {
      var rows = allScores();
      document.getElementById('fullrows').innerHTML = rows.map(function (s) {
        return '<tr class="' + (s.me ? 'me' : '') + '"><td>' + esc(s.name) + '</td><td>' + s.kills + '</td><td>' + s.deaths + '</td></tr>';
      }).join('');
    }
    function updateKill(killerId, victimId, weapon, head) {
      // 计分：击杀者本机权威地给自己 +1（kill 事件由被杀方广播，killer 收到后给自己加分）
      if (killerId === me.id && victimId !== me.id) me.kills++;
      // 其他机器上即时把击杀者分数 +1（下次 state 同步会校正）
      if (scores[killerId] && killerId !== me.id) scores[killerId].kills++;

      var kName = nameOf(killerId), vName = nameOf(victimId);
      var wName = weaponNameById(weapon);
      pushKillfeed(kName, vName, wName, !!head);
      updateScoreboard();
    }
    var killfeed = [];
    function pushKillfeed(k, v, w, head) {
      var el = document.createElement('div'); el.className = 'kf';
      el.innerHTML = '<span class="k">' + esc(k) + '</span> <span class="w">[' + esc(w) + (head ? ' 爆头' : '') + ']›</span> <span class="v">' + esc(v) + '</span>';
      var box = document.getElementById('killfeed');
      box.appendChild(el); killfeed.push({ el:el, t:now() });
      while (killfeed.length > 5) { var old = killfeed.shift(); if (old.el.parentNode) old.el.parentNode.removeChild(old.el); }
    }
    function tickKillfeed() {
      var t = now();
      for (var i = killfeed.length - 1; i >= 0; i--) {
        var k = killfeed[i];
        if (t - k.t > 5000) { k.el.style.opacity = '0'; if (t - k.t > 5600) { if (k.el.parentNode) k.el.parentNode.removeChild(k.el); killfeed.splice(i, 1); } }
      }
    }

    // ------------------------------------------------------------------ HUD
    function updateHpHud() {
      var pct = Math.max(0, Math.min(100, me.hp / maxHp * 100));
      document.getElementById('hpbar').style.width = pct + '%';
      document.getElementById('hpnum').textContent = 'HP ' + Math.round(me.hp) + (maxHp !== 100 ? (' / ' + maxHp) : '');
    }
    function updateAmmoHud() {
      var w = activeWeapon();
      var amt = cheatInfinite ? '∞' : activeAmmo();
      var mag = (w.melee || cheatInfinite) ? '∞' : w.mag;
      document.getElementById('ammo').innerHTML = amt + '<span class="res"> / ' + mag + '</span>';
    }
    function weaponDesc(w) {
      if (w.kind === 'star')    return '蓄力 · 贯穿一切 · 碰到即死';
      if (w.kind === 'hole')    return '发射黑洞 · 吸入即死';
      if (w.kind === 'realm')   return '命中第一人 → 拖入秘境 1v1';
      if (w.kind === 'tsunami') return '一次性 · 滔天巨浪 · 卷入即死';
      if (w.kind === 'roar')    return '✦仙器 蓄力2s · 半地图直径激光 · 持续1s';
      if (w.kind === 'blade')   return '✦仙器 左键蓄势猛劈 · 1/4地图圆内全灭 · 冷却3s';
      return (w.auto ? '全自动' : '单发') + ' · 伤害' + w.dmg + (w.pellets>1?('×'+w.pellets):'') + '（爆头×' + HEAD_MULT + '）';
    }
    function updateWeaponHud() {

        if (god) slots = '<div class="slot' + (mechaWeapon===0?' active':'') + ' super">✦ 熔炮</div><div class="slot' + (mechaWeapon===1?' active':'') + ' super">✦ 爆地</div>';
        else slots = '<div class="slot active super">★ 机甲手炮</div>';
        document.getElementById('slots').innerHTML = slots; updateAmmoHud(); return;
      }
      document.getElementById('wepname').innerHTML = esc(w.name) + ' <small>' + esc(weaponDesc(w)) + '</small>';
      if (cheatMode) {
        // 测试模式：下方显示全部超级武器/仙器，滚轮切换，高亮当前
        slots = ALL_SUPER_KINDS.map(function (kk) {
          var on = superActive && superKind === kk, xian = SUPERS[kk].isXian;
          return '<div class="slot' + (on?' active':'') + (xian?' super':'') + '">' + (xian?'✦':'★') + esc(SUPERS[kk].name) + '</div>';
        }).join('');
      } else if (superActive) {
        slots = '<div class="slot active super">' + (w.isXian?'✦':'★') + ' ' + esc(w.name) + '</div>';
      } else {
        slots = WEAPONS.map(function (ww, i) {
          return '<div class="slot' + (i===weaponIndex?' active':'') + '"><b>' + (i+1) + '</b>' + esc(ww.name) + '</div>';
        }).join('');
      }
      document.getElementById('slots').innerHTML = slots;
      updateAmmoHud();
    }

    // ------------------------------------------------------------------ 联机（PeerJS · 星型 + 主机转发）
    // 房间号 → 确定性主机 id。第一个占用该 id 的人当主机，其余连到主机；主机转发其他人的状态。
    var myPeer = null, isHost = false, hostConn = null;
    var clientConns = {};   // 主机侧：peerId -> DataConnection
    var connectTries = 0, migrating = false, reconnectTimer = 0, connectingToHost = false;

    function hostIdFor(room) {
      var s = String(room).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'lobby';
      return 'ffaclash-' + s + '-host';
    }

    function startNetwork(room) {
      me.hostId = hostIdFor(room);
      if (TEST) { me.id = 'test-local'; isHost = true; netStatus('测试模式 · 离线', 'host'); finishJoin(); return; }
      attemptHost();
    }

    function attemptHost() {
      netStatus('正在创建/加入房间…', 'warn');
      var p = new Peer(me.hostId, PEER_OPTS);
      var settled = false;
      p.on('open', function () {
        settled = true; myPeer = p; isHost = true; me.id = me.hostId; migrating = false;
        netStatus('主机 · 已就绪', 'host');
        p.on('connection', onHostConnection);
        finishJoin();
      });
      p.on('error', function (err) {
        if (err && err.type === 'unavailable-id') {
          // 已有人占用主机 id → 当客户端连接过去
          try { p.destroy(); } catch (e) {}
          if (!settled) attemptClient();
        } else if (!settled && !myPeer) {
          netStatus('网络错误：' + (err && err.type), 'bad');
        } else {
          // 运行期错误（如个别 peer 不可用），不致命
          if (window.console) console.warn('[peer:host]', err && err.type);
        }
      });
      p.on('disconnected', function () { try { p.reconnect(); } catch (e) {} });
    }

    function onHostConnection(conn) {
      conn.on('open', function () {
        clientConns[conn.peer] = conn;
        // 主机向新成员通报自己，并把当前已知玩家快照发过去（让新人立刻看到所有人）
        conn.send({ type:'hello', from:me.id, name:me.name, color:me.colorHex });
        conn.send({ type:'setup', mode:roomMode, map:roomMap });   // 同步房主选的模式+地图
        for (var id in remotes) {
          var r = remotes[id];
          conn.send({ type:'hello', from:id, name:r.name, color:r.color });
        }
      });
      conn.on('data', function (msg) {
        handleMessage(msg);
        // 星型转发：把该客户端的消息转给其他所有客户端
        for (var pid in clientConns) {
          if (pid !== conn.peer) { try { clientConns[pid].send(msg); } catch (e) {} }
        }
      });
      conn.on('close', function () { hostDrop(conn.peer); });
      conn.on('error', function () { hostDrop(conn.peer); });
    }
    function hostDrop(pid) {
      if (clientConns[pid]) delete clientConns[pid];
      removeRemote(pid); delete scores[pid];
      broadcastRaw({ type:'leave', from:pid });
      updateScoreboard();
    }

    function attemptClient() {
      var p = new Peer(PEER_OPTS);   // 随机 id
      myPeer = p; isHost = false;
      p.on('open', function (id) { me.id = id; connectTries = 0; connectToHost(); });
      p.on('error', function (err) {
        if (err && err.type === 'peer-unavailable') { becomeHostAfterHostGone(); }
        else if (window.console) console.warn('[peer:client]', err && err.type);
      });
      p.on('disconnected', function () { try { p.reconnect(); } catch (e) {} });
    }
    function connectToHost() {
      if (connectingToHost || migrating || !myPeer) return;
      connectingToHost = true;
      var conn = myPeer.connect(me.hostId, { reliable:true });
      hostConn = conn;
      var opened = false;
      conn.on('open', function () {
        opened = true; connectingToHost = false; migrating = false;
        clearTimeout(reconnectTimer);
        netStatus('已连接到主机', 'client');
        conn.send({ type:'hello', from:me.id, name:me.name, color:me.colorHex });
        finishJoin();
      });
      conn.on('data', handleMessage);
      conn.on('close', function () { onHostLost(); });
      conn.on('error', function () { if (!opened) retryConnect(); });
      reconnectTimer = setTimeout(function () { if (!opened) retryConnect(); }, 4000);
    }
    function retryConnect() {
      if (!connectingToHost) return;
      connectingToHost = false;
      clearTimeout(reconnectTimer);
      try { if (hostConn) hostConn.close(); } catch (e) {}
      connectTries++;
      if (connectTries <= 3) setTimeout(connectToHost, 500 + connectTries*300);
      else becomeHostAfterHostGone();
    }
    function becomeHostAfterHostGone() {
      if (migrating) return; migrating = true;
      netStatus('主机不可用，尝试接管…', 'warn');
      try { if (myPeer) myPeer.destroy(); } catch (e) {}
      clearTimeout(reconnectTimer);
      connectingToHost = false; myPeer = null; hostConn = null;
      setTimeout(attemptHost, 400 + Math.floor(Math.random()*600)); // 抖动避免同时抢
    }
    function onHostLost() {
      if (!joined) return;
      netStatus('与主机断开，重连中…', 'warn');
      clearAllRemotes();
      removeAllPickups();   // 主机走了，旧的超级武器道具失效，避免残留
      clearAllEffects();
      for (var k in scores) delete scores[k];
      updateScoreboard();
      becomeHostAfterHostGone();
    }

    // 发送：主机直接广播给所有客户端；客户端发给主机（主机再转发）
    function netSend(msg) {
      if (!myPeer) return;
      if (isHost) broadcastRaw(msg);
      else if (hostConn && hostConn.open) { try { hostConn.send(msg); } catch (e) {} }
    }
    function broadcastRaw(msg) {
      for (var pid in clientConns) { try { clientConns[pid].send(msg); } catch (e) {} }
    }

    function handleMessage(msg) {
      if (!msg || msg.from === me.id) return;
      switch (msg.type) {
        case 'hello':
          ensureRemote(msg.from, msg.name, msg.color);
          if (!scores[msg.from]) scores[msg.from] = { name:msg.name||'???', kills:0, deaths:0, color:msg.color };
          updateScoreboard();
          break;
        case 'setup':   // 房主同步模式 + 地图（加入者切到同一张图并重新出生）
          if (msg.mode && MODES[msg.mode]) roomMode = msg.mode;
          if (msg.map && msg.map !== roomMap) {
            roomMap = msg.map;
            if (joined) { buildMap(roomMap); playerPos.copy(randomSpawn()); }
          }
          break;
        case 'state': {
          var r = ensureRemote(msg.from, msg.name, msg.color);
          if (r) {
            r.target.set(msg.x, msg.y - EYE, msg.z); // 网络发的是"眼睛"高度，小人底座 = 眼高-EYE
            r.targetYaw = msg.yaw;
            r.mw = msg.mw || 0;                          // 机甲武器变体(手炮/巨剑)
            if (msg.wid) setRemoteWeapon(r, msg.wid);   // 看到对方手中的真实武器
            applyRemoteMecha(r, msg.mecha);             // 穿上机甲 → 放大 + 金属化
            // 机甲：炮口已雕进右臂模型，不再额外端武器
            if (r.hp !== msg.hp || r.alive !== msg.alive) { r.hp = msg.hp; r.alive = msg.alive; r.labelDirty = true; }
            // 首个状态：直接吸附到位（避免从原点滑入）并初始化测速基准（避免首帧"奔跑"误判）
            if (!r.spawned) { r.group.position.copy(r.target); r.group.rotation.y = r.targetYaw;
              r.lastX = r.target.x; r.lastZ = r.target.z; r.spawned = true; }
            r.lastSeen = now();
          }
          scores[msg.from] = { name:msg.name, kills:msg.kills, deaths:msg.deaths, color:msg.color };
          updateScoreboard();
          break;
        }
        case 'hit':
          if (msg.to === me.id) applyDamage(msg.dmg, msg.from, msg.weapon, msg.head);
          break;
        case 'kill':
          updateKill(msg.killer, msg.victim, msg.weapon, msg.head);
          // 远端小人进入死亡态（短暂），等其 state 同步重生
          var rr = remotes[msg.victim]; if (rr) { rr.alive = false; rr.labelDirty = true; }
          // 秘境对决：对手死了 → 我赢了 → 回到主战场
          if (inRealm && msg.victim === realmOpponent) exitRealm(true);
          break;
        case 'super_spawn':           // 主机通知：地图上刷新了超级武器
          applySuperSpawn(msg);
          break;
        case 'super_taken':           // 有人捡走了某个超级武器 → 移除地图上的它
          removeSuperPickup(msg.sid);
          break;
        case 'grenade':               // 别人发射的机甲榴弹 → 本地渲染(伤害由发射者结算)
          spawnGrenade(msg);
          break;
        case 'beam':                  // 崩星炮 / 秘境枪 的激光轨迹（所有人都看得到）
          spawnBeam(msg);
          break;
        case 'blackhole':             // 黑洞炮
          spawnBlackHole(msg);
          break;
        case 'tsunami':               // 排山倒海手
          spawnTsunami(msg);
          break;
        case 'slam':                  // 青龙偃月刀劈砍：地震 + 圈内处死
          spawnSlam(msg);
          break;
        case 'shot':                  // 别人开了一枪：渲染其枪口闪光 + 弹道
          spawnRemoteShot(msg);
          break;
        case 'realm_start':           // 被秘境枪命中 → 被拖入 1v1
          if (msg.victim === me.id) {
            enterRealm(msg.holder, new THREE.Vector3(msg.vx, msg.vy, msg.vz), false);
          }
          break;
        case 'leave':
          removeRemote(msg.from); delete scores[msg.from]; updateScoreboard();
          break;
      }
    }

    function sendHit(victimId, dmg, weaponId, head) {
      if (TEST) lastSentHits.push({ to:victimId, dmg:dmg, weapon:weaponId, head:!!head });
      var dr = remotes[victimId];
      if (dr) { var gp = dr.group.position; spawnDamageNumber(gp.x, gp.y + (dr.mecha ? 2.8 : 2.0), gp.z, dmg, dmg >= 200); }   // 头顶飘伤害数字
      if (dr && dr.isDummy) { hitDummy(dr, dmg); return; }   // 假人：本地结算，不联机
      netSend({ type:'hit', from:me.id, to:victimId, dmg:dmg, weapon:weaponId, head:!!head });
    }
    // ---- 开发者模式假人：本地可被打的靶子(普通/超级机甲/终焉机神，血量模型与真机甲一致) ----
    var dummySeq = 0;
    function addDummy(kind) {
      if (!joined) return;
      dummySeq++;
      var id = 'dummy-' + dummySeq;
      var col = kind === 'godmecha' ? 0xff2d6e : kind === 'mecha' ? 0xff9a3c : 0x9fb0c0;
      var name = kind === 'godmecha' ? '终焉机神·假人' : kind === 'mecha' ? '超级机甲·假人' : '假人';
      var r = ensureRemote(id, name, col); if (!r) return;
      camera.getWorldDirection(_bf); _bf.y = 0; if (_bf.lengthSq() < 1e-6) _bf.set(0,0,-1); _bf.normalize();
      var px = playerPos.x + _bf.x * 9 + (dummySeq % 3 - 1) * 3, pz = playerPos.z + _bf.z * 9;
      r.isDummy = true;
      r.dummyMax = kind === 'godmecha' ? 10000 : kind === 'mecha' ? 1000 : 100;
      r.hp = r.dummyMax; r.alive = true;
      r.target.set(px, 0, pz); r.group.position.set(px, 0, pz); r.spawned = true;
      r.targetYaw = yaw + Math.PI; r.group.rotation.y = r.targetYaw; r.lastX = px; r.lastZ = pz; r.lastSeen = now();
      if (kind === 'mecha' || kind === 'godmecha') { r.mw = 0; applyRemoteMecha(r, kind); setRemoteWeapon(r, SUPERS[kind].id); }
      r.labelDirty = true;
    }
    function hitDummy(r, dmg) {
      if (!r.alive) return;
      r.hp = Math.max(0, r.hp - dmg); r.labelDirty = true; r.lastSeen = now();
      if (r.hp <= 0) { r.alive = false; deathSound(); showHitmarker(false); }   // 假人死了不复活(倒地)
      else hitSound();
    }

    // 约 18Hz 广播自身状态（99 = 持超级武器）
    function sendState() {
      if (!joined || !myPeer) return;
      netSend({
        type:'state', from:me.id, name:me.name, color:me.colorHex,
        x:playerPos.x, y:playerPos.y, z:playerPos.z, yaw:yaw, pitch:pitch,
        wid:activeWeapon().id, hp:me.hp, alive:me.alive, kills:me.kills, deaths:me.deaths,
        mecha: mechaWorn ? superKind : null,  // 穿上的机甲种类(远端据此放大渲染)
        mw: mechaWorn ? mechaWeapon : 0       // 机甲当前武器(0=手炮/熔炮 1=爆地巨剑)
      });
    }

    function netStatus(text, kind) {
      var dot = document.getElementById('netdot'), tx = document.getElementById('nettext');
      if (tx) tx.textContent = text;
      if (dot) dot.style.background = ({ host:'#46d17a', client:'#36c6ff', warn:'#ffb454', bad:'#ff5a5a' })[kind] || '#8fa3b8';
    }

    // ------------------------------------------------------------------ 超级武器拾取物（地图道具）
    function randomSuperPos() {
      for (var t = 0; t < 16; t++) {
        var x = Math.random()*44 - 22, z = Math.random()*44 - 22, ok = true;
        for (var i = 0; i < solidBoxes.length; i++) {
          var b = solidBoxes[i];
          if (x > b.min.x-1.5 && x < b.max.x+1.5 && z > b.min.z-1.5 && z < b.max.z+1.5) { ok = false; break; }
        }
        if (ok) return { x:x, y:1.3, z:z };
      }
      return { x:0, y:1.3, z:0 };
    }
    function makeTextSprite(text, colorHex) {
      var cv = document.createElement('canvas'); cv.width = 256; cv.height = 64;
      var ctx = cv.getContext('2d');
      ctx.font = 'bold 30px system-ui,"Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(0,0,0,.9)'; ctx.strokeText(text, 128, 34);
      ctx.fillStyle = '#' + ('000000' + (colorHex >>> 0).toString(16)).slice(-6); ctx.fillText(text, 128, 34);
      var tex = new THREE.CanvasTexture(cv);
      tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter; tex.generateMipmaps = false;
      var sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false, depthWrite:false }));
      sp.scale.set(2.8, 0.7, 1); sp.renderOrder = 11;
      return sp;
    }
    function makeSuperPickup(kind) {
      var w = SUPERS[kind] || SUPERS.mg, col = w.col;
      var g = new THREE.Group();
      var core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.55, 0),
        new THREE.MeshStandardMaterial({ color:col, emissive:col, emissiveIntensity:1.3, metalness:0.4, roughness:0.3 }));
      g.add(core);
      var glow = new THREE.Sprite(new THREE.SpriteMaterial({ map:glowTex, color:col,
        transparent:true, blending:THREE.AdditiveBlending, depthWrite:false }));
      glow.scale.setScalar(w.isXian ? 3.4 : 2.4); g.add(glow);   // 仙器拾取物更亮
      if (w.isXian) {   // 仙器：外加旋转光环，一眼认出（但不浮名字）
        var halo = new THREE.Mesh(new THREE.TorusGeometry(0.9, 0.08, 8, 32),
          new THREE.MeshBasicMaterial({ color:col, transparent:true, opacity:0.9, blending:THREE.AdditiveBlending, depthWrite:false }));
        halo.rotation.x = Math.PI/2.5; g.add(halo); g.userData.halo = halo;
      }
      g.userData.core = core; g.userData.kind = kind;
      return g;
    }
    function applySuperSpawn(msg) {
      if (superPickups[msg.sid]) return;                      // 已存在(去重)
      var mesh = makeSuperPickup(msg.kind);
      mesh.position.set(msg.x, msg.y, msg.z);
      mesh.userData.sid = msg.sid; mesh.userData.baseY = msg.y;
      scene.add(mesh); superPickups[msg.sid] = mesh;
      // 超出上限 → 移除最早的(sid 最小)
      var sids = Object.keys(superPickups);
      while (sids.length > MAX_PICKUPS) { var oldest = Math.min.apply(null, sids.map(Number)); removeSuperPickup(oldest); sids = Object.keys(superPickups); }
      if (SUPERS[msg.kind] && SUPERS[msg.kind].isXian) showNotice('✦ 仙器降世：' + SUPERS[msg.kind].name);
    }
    function removeSuperPickup(sid) {
      var m = superPickups[sid]; if (!m) return;
      scene.remove(m);
      m.traverse(function (o) { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
      delete superPickups[sid];
    }
    function removeAllPickups() { for (var s in superPickups) removeSuperPickup(s); }
    // 用"洗牌袋"轮流出，保证每种(含崩星炮)都会规律地刷到，而不是纯随机可能很久不出
    function nextSuperKind() {
      if (superBag.length === 0) {
        superBag = SUPER_KINDS.slice();
        for (var i = superBag.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = superBag[i]; superBag[i] = superBag[j]; superBag[j] = tmp;
        }
      }
      return superBag.pop();
    }
    // 当前模式这一次刷新出几个超级武器
    function spawnCountThisTick() {
      var m = MODES[roomMode]; if (!m || !m.interval) return 0;
      var r = Math.random();
      if (m.triple && r < m.triple) return 3;
      if (m.double && r < m.triple + m.double) return 2;
      return 1;
    }
    // 仅主机生成：按模式决定数量，每个随机位置/类型(各 5% 仙器)，本地渲染并广播
    function hostSpawnSuper() {
      var n = spawnCountThisTick(); if (n <= 0) return;
      var xian = (MODES[roomMode] && MODES[roomMode].xian) || 0;
      for (var k = 0; k < n; k++) {
        superSid++;
        var pos = randomSuperPos();
        var kind = (Math.random() < xian) ? XIAN_KINDS[Math.floor(Math.random()*XIAN_KINDS.length)] : nextSuperKind();
        var msg = { type:'super_spawn', from:me.id, sid:superSid, kind:kind, x:pos.x, y:pos.y, z:pos.z };
        applySuperSpawn(msg); netSend(msg);
      }
    }
    // 每帧检查：走到任一拾取物附近就捡起（先到先得）
    function checkSuperPickup() {
      if (!me.alive || paused || superActive || inRealm) return;
      for (var sid in superPickups) {
        var m = superPickups[sid];
        var dx = playerPos.x - m.position.x, dz = playerPos.z - m.position.z;
        if (dx*dx + dz*dz < 1.8*1.8) {
          var kind = m.userData.kind;
          removeSuperPickup(sid);
          netSend({ type:'super_taken', from:me.id, sid:Number(sid) });
          pickupSuper(kind);
          return;
        }
      }
    }

    // ------------------------------------------------------------------ 进入战场
    var joinDone = false;
    function finishJoin() {
      if (joinDone) return; joinDone = true;
      // 第一个 state 出去，并以 STATE_HZ 周期广播
      setInterval(sendState, Math.round(1000 / STATE_HZ));
      // 超级武器：只有主机负责生成，间隔/数量由模式决定（基础模式不刷）。首刷稍早。
      setTimeout(hostSpawnLoop, 8000);
    }
    var spawnTimer = 0;
    function hostSpawnLoop() {
      var iv = (MODES[roomMode] && MODES[roomMode].interval) || 0;
      if (isHost && iv) hostSpawnSuper();
      clearTimeout(spawnTimer);
      spawnTimer = setTimeout(hostSpawnLoop, iv || 5000);   // 基础模式 iv=0：5s 空转(不刷)；模式不变则恒定
    }

    // 主菜单：创建/加入房间 + 房主选模式/地图
    var selMode = 'normal', selMap = 'basic';
    function _seg(containerId, list, get, set) {
      var c = document.getElementById(containerId); if (!c) return; c.innerHTML = '';
      list.forEach(function (it) {
        var btn = document.createElement('button'); btn.type = 'button';
        btn.innerHTML = esc(it.name) + (it.desc ? '<small>' + esc(it.desc) + '</small>' : '');
        if (it.id === get()) btn.className = 'sel';
        btn.addEventListener('click', function () {
          set(it.id);
          Array.prototype.forEach.call(c.children, function (b) { b.classList.remove('sel'); });
          btn.classList.add('sel');
        });
        c.appendChild(btn);
      });
    }
    function _show(id, on) { var e = document.getElementById(id); if (e) e.hidden = !on; }
    function _home() { _show('menuHome', true); _show('createPanel', false); _show('joinPanel', false); }
    function wireMenu() {
      document.getElementById('createBtn').addEventListener('click', function () {
        selMode = 'normal'; selMap = 'basic';
        document.getElementById('roomCodeShow').textContent = String(Math.floor(Math.random()*900 + 100));
        _seg('modeSel', MODE_LIST, function(){ return selMode; }, function(v){ selMode = v; });
        _seg('mapSel', MAP_LIST, function(){ return selMap; }, function(v){ selMap = v; });
        _show('mapSection', MAP_LIST.length > 1);   // 只有一张图就不显示选图
        _show('menuHome', false); _show('createPanel', true); _show('joinPanel', false);
      });
      document.getElementById('joinModeBtn').addEventListener('click', function () {
        _show('menuHome', false); _show('joinPanel', true); _show('createPanel', false);
        document.getElementById('codeInput').focus();
      });
      Array.prototype.forEach.call(document.querySelectorAll('.backBtn'), function (b) { b.addEventListener('click', _home); });
      document.getElementById('startBtn').addEventListener('click', function () {
        if (joined) return; roomMode = selMode; roomMap = selMap;
        doJoin(document.getElementById('roomCodeShow').textContent);
      });
      document.getElementById('doJoinBtn').addEventListener('click', function () {
        if (joined) return;
        var code = (document.getElementById('codeInput').value || '').replace(/\D/g, '').slice(0, 3);
        if (!code) { document.getElementById('codeInput').focus(); return; }
        doJoin(code);
      });
      document.getElementById('codeInput').addEventListener('keydown', function (e) { if (e.code === 'Enter') document.getElementById('doJoinBtn').click(); });
      // 隐藏后门表单（自测/快速加入）
      document.getElementById('joinForm').addEventListener('submit', function (e) { e.preventDefault(); if (!joined) doJoin(); });
    }

    function doJoin(room) {
      var name = (document.getElementById('nameInput').value || '').trim().slice(0, 14) || ('玩家' + Math.floor(Math.random()*900+100));
      room = (room || (document.getElementById('roomInput').value || '').trim() || 'lobby');
      me.name = name;
      joined = true;
      buildMap(roomMap);          // 按所选地图构建(房主已设；加入者先 basic，收到 setup 再重建)
      playerPos.copy(randomSpawn());
      if (TEST) { playerPos.set(20, EYE, 0); yaw = 0; pitch = 0; }  // 固定出生点，便于自测移动方向
      ensureAudio();
      buildViewGun(); updateWeaponHud(); updateHpHud(); updateAmmoHud(); updateScoreboard();

      document.getElementById('menu').style.display = 'none';
      var hud = document.getElementById('hud'); hud.hidden = false; hud.setAttribute('aria-hidden', 'false');

      startNetwork(room);
      // 默认进入"未锁定"状态并显示提示，再尝试自动锁定；若浏览器拒绝自动锁定，
      // 玩家点一下画面即可锁定（见 canvas click 处理）。这样不会出现"无法瞄准"的死局。
      if (!TEST) {
        paused = true;
        document.getElementById('pausemsg').style.display = 'flex';
        requestLock();
      }
    }

    // ------------------------------------------------------------------ 主循环
    function updateMovement(dt) {
      if (!joined || !me.alive) return;
      // 朝向（仅用水平分量做移动）
      camera.getWorldDirection(_fwd); _fwd.y = 0; _fwd.normalize();
      _right.crossVectors(_fwd, new THREE.Vector3(0,1,0)).normalize();

      var mx = 0, mz = 0;
      if (keys['KeyW']) mz += 1;
      if (keys['KeyS']) mz -= 1;
      if (keys['KeyD']) mx += 1;
      if (keys['KeyA']) mx -= 1;
      sprinting = !!(keys['ShiftLeft'] || keys['ShiftRight']) && (mx !== 0 || mz !== 0) && adsAmt < 0.3;
      isMoving = (mx !== 0 || mz !== 0) && grounded;   // 走路头部/武器摆动用
      var sp = SPEED * (sprinting ? SPRINT : 1) * (1 - adsAmt * 0.45);  // 开镜走得慢
      if (mechaWorn) sp *= (SUPERS[superKind] && SUPERS[superKind].speedMul) || 0.7;   // 机甲移速 -30%

      var move = new THREE.Vector3();
      move.addScaledVector(_fwd, mz).addScaledVector(_right, mx);
      if (move.lengthSq() > 0) move.normalize().multiplyScalar(sp * dt);

      // 逐轴碰撞解算
      var nx = playerPos.x + move.x;
      if (!collides(nx, playerPos.z)) playerPos.x = nx;
      var nz = playerPos.z + move.z;
      if (!collides(playerPos.x, nz)) playerPos.z = nz;

      // 重力 / 跳跃
      // 垂直：支持站在箱子/平台顶部（多层地图）。支撑面 = 脚下能落上的最高箱顶，否则地面 0。
      var feet0 = playerPos.y - EYE;
      var support = groundHeightAt(playerPos.x, playerPos.z, feet0);
      vy -= GRAVITY * dt; playerPos.y += vy * dt;
      var minY = support + EYE;
      if (playerPos.y <= minY) { playerPos.y = minY; vy = 0; grounded = true; } else grounded = false;
    }

    // 脚下支撑高度：玩家所站箱子的顶面（可迈上 STEP_H 内的矮台/台阶），否则地面 0
    function groundHeightAt(x, z, feetY) {
      var h = 0;
      for (var i = 0; i < solidBoxes.length; i++) {
        var b = solidBoxes[i];
        if (x > b.min.x - PLAYER_R && x < b.max.x + PLAYER_R &&
            z > b.min.z - PLAYER_R && z < b.max.z + PLAYER_R) {
          if (b.max.y <= feetY + STEP_H && b.max.y > h) h = b.max.y;   // 顶面在脚 + 一步以内 → 可作支撑
        }
      }
      return h;
    }
    function collides(x, z) {
      // 场地边界（秘境里用秘境平台的边界）
      var bx = inRealm ? REALM_CENTER.x : 0, bz = inRealm ? REALM_CENTER.z : 0;
      var lim = inRealm ? 17.5 : 29.5;
      if (x < bx - lim || x > bx + lim || z < bz - lim || z > bz + lim) return true;
      var feet = playerPos.y - EYE, head = feet + 1.7;
      for (var i = 0; i < solidBoxes.length; i++) {
        var b = solidBoxes[i];
        if (x > b.min.x - PLAYER_R && x < b.max.x + PLAYER_R &&
            z > b.min.z - PLAYER_R && z < b.max.z + PLAYER_R) {
          // 仅当箱体挡住身体(顶面高出脚一步以上、且底面低于头顶)才算墙；矮于一步的台可直接迈上、头顶上方的平台可从下面穿过
          if (b.max.y > feet + STEP_H && b.min.y < head) return true;
        }
      }
      return false;
    }

    function updateRemotes(dt) {
      var t = now();
      for (var id in remotes) {
        var r = remotes[id];
        // 平滑插值（指数趋近）
        var k = 1 - Math.exp(-dt * 12);
        r.group.position.lerp(r.target, k);
        var dy = r.targetYaw - r.group.rotation.y;
        while (dy >  Math.PI) dy -= Math.PI*2;
        while (dy < -Math.PI) dy += Math.PI*2;
        r.group.rotation.y += dy * k;
        poseRemote(r, dt);                 // 举枪/奔跑/跳跃/死亡 动画
        if (r.labelDirty) { drawLabel(r.label, r.name, r.hp, r.alive, r.isDummy ? r.dummyMax : 100); r.labelDirty = false; }
        // 长时间没收到状态（非正常离开）→ 移除
        if (!r.isDummy && t - r.lastSeen > 6000) { removeRemote(id); delete scores[id]; updateScoreboard(); }
      }
    }

    // 远端小人动画：根据"自身位移速度 / 是否离地 / 是否存活"摆动四肢
    function poseRemote(r, dt) {
      var nx = r.group.position.x, nz = r.group.position.z;
      var inv = 1 / Math.max(dt, 0.001);
      var speed = Math.sqrt((nx - r.lastX)*(nx - r.lastX) + (nz - r.lastZ)*(nz - r.lastZ)) * inv;
      r.lastX = nx; r.lastZ = nz;

      if (!r.alive) {                       // 死亡：缓缓侧倒 + 四肢放松
        r.deathLean = Math.min(1, r.deathLean + dt * 4);
        r.group.rotation.z = r.deathLean * 1.45;
        r.legL.rotation.x = r.legR.rotation.x = 0.25;
        r.armL.rotation.x = r.armR.rotation.x = 0.4;
        for (var i = 0; i < r.parts.length; i++) r.parts[i].visible = true;
        return;
      }
      if (r.deathLean) { r.deathLean = 0; r.group.rotation.z = 0; }   // 复活：站起
      for (var j = 0; j < r.parts.length; j++) r.parts[j].visible = true;

      // 注意：手臂从肩部垂下，正 rotation.x 才是"朝前"（之前用负值导致双臂卡到身后）
      var airborne = r.group.position.y > 0.2;
      if (airborne) {                       // 跳跃：收腿(前抬) + 举枪
        r.legL.rotation.x = 0.8; r.legR.rotation.x = 0.5;
        r.armL.rotation.x = 1.6; r.armR.rotation.x = 1.45;
        r.runPhase = 0;
      } else if (speed > 1.0) {             // 奔跑：腿前后摆，左手随步摆，右手持枪向前
        r.runPhase += dt * (7 + Math.min(speed, 10) * 0.5);
        var s = Math.sin(r.runPhase) * 0.85;
        r.legL.rotation.x = s;  r.legR.rotation.x = -s;
        r.armR.rotation.x = 1.45;
        r.armL.rotation.x = 1.25 - s * 0.4;
      } else {                              // 站立举枪（双手向前端枪）
        r.legL.rotation.x = 0; r.legR.rotation.x = 0;
        r.armL.rotation.x = 1.3; r.armR.rotation.x = 1.45;
        r.runPhase = 0;
      }
    }

    // 用当前 yaw/pitch(+后坐力) 摆正相机；移动与开枪都基于这个朝向，保证瞄准是"当前帧"的
    function aimCamera() {
      camera.position.copy(playerPos);
      if (mechaWorn && SUPERS[superKind]) camera.position.y += SUPERS[superKind].lift || 0;   // 机甲：视角变高(变高大)
      camera.rotation.x = pitch + viewRecoil;
      camera.rotation.y = yaw;
      camera.rotation.z = 0;
    }

    // 走路头部摆动（晃相机但不动准星方向）+ 武器摇晃/后坐/换弹/开镜动画
    function updateViewBobAndGun(dt) {
      var adsK = adsAmt;                  // 0=腰射 1=开镜
      var damp = 1 - adsK * 0.82;         // 开镜时各种晃动收敛，瞄得更稳

      // 走路摆动幅度平滑：移动时升起，停下时回落
      var targetAmp = (isMoving && grounded && !reduced) ? (sprinting ? 1.0 : 0.6) : 0;
      bobAmp += (targetAmp - bobAmp) * Math.min(1, dt * 8);
      if (isMoving && grounded) bobT += dt * (sprinting ? 13 : 9);

      // 相机头部摆动：只偏移"位置"，不改"朝向"，所以准星指向不变、瞄准不受影响
      if (!reduced && bobAmp > 0.001) {
        camera.position.y += Math.sin(bobT * 2) * 0.035 * bobAmp * damp;
        var vSide = Math.cos(bobT) * 0.022 * bobAmp * damp;
        camera.position.x += _right.x * vSide;
        camera.position.z += _right.z * vSide;
      }

      if (!viewGun) return;
      var t = now();

      // 换弹动画进度：0 → 1 → 0（中途枪下沉/倾斜，像在换弹匣）
      var reloadAnim = 0;
      if (now() < reloadUntil && reloadDur > 0) {
        var prog = Math.max(0, Math.min(1, 1 - (reloadUntil - now()) / reloadDur));
        reloadAnim = Math.sin(prog * Math.PI);
      }

      // 狙击镜：开镜时把枪藏起来（改用镜头画面），且不拉到屏幕中央，避免挡视线；
      // 其它武器开镜时枪下沉到准星下方（ADS_BASE）。
      var scoped = !!activeWeapon().scoped;
      viewGun.visible = !(scoped && adsAmt > 0.4);
      var aB = scoped ? GUN_BASE : ADS_BASE;
      var gx = GUN_BASE.x + (aB.x - GUN_BASE.x) * adsK;
      var gy = GUN_BASE.y + (aB.y - GUN_BASE.y) * adsK;
      var gz = GUN_BASE.z + (aB.z - GUN_BASE.z) * adsK;
      var rx = 0, ry = 0, rz = 0;
      if (!reduced) {
        // 走路摆动（武器随脚步轻晃）
        gx += Math.cos(bobT) * 0.010 * bobAmp * damp;
        gy += Math.abs(Math.sin(bobT)) * 0.010 * bobAmp * damp;
        // 待机呼吸
        gx += Math.sin(t * 0.0011) * 0.0015 * damp;
        gy += Math.sin(t * 0.0016) * 0.0020 * damp;
        // 鼠标跟手：枪滞后于视角再回正
        gx += -gunSwayX * damp;  gy += gunSwayY * damp;
        ry +=  gunSwayX * 2.2 * damp; rx += gunSwayY * 2.2 * damp; rz += gunSwayX * 1.2 * damp;
      }
      // 开火后坐：枪向后顶 + 枪口上抬
      gz += gunKick * 0.16;  gy += gunKick * 0.05;  rx += -gunKick * 0.5;
      // 换弹动画：下沉 + 前倾 + 侧倾
      gy += -0.20 * reloadAnim;  gz += 0.05 * reloadAnim;
      rx += 1.10 * reloadAnim;   rz += 0.60 * reloadAnim;

      // 充能动画：蓄力武器按下后枪向后拉、能量颤动，炮口能量球汇聚变大
      var charging = now() < chargeUntil ? Math.min(1, (now() - chargeStart) / Math.max(1, chargeUntil - chargeStart)) : 0;
      if (charging > 0 && !reduced) {
        gz += charging * 0.11;  rx += -charging * 0.10;
        gx += (Math.random() - 0.5) * 0.008 * charging;
        gy += (Math.random() - 0.5) * 0.008 * charging;
      }

      viewGun.position.set(gx, gy, gz);
      viewGun.rotation.set(rx, ry, rz);

      if (gunCharge) {
        if (charging > 0) {
          gunCharge.visible = true; gunCharge.material.color.setHex(chargeCol);
          var fl = 0.82 + 0.18 * Math.sin(now() * 0.05);
          gunCharge.scale.setScalar((0.03 + charging * charging * 0.18) * fl);    // 收小，避免糊持炮者的眼
          gunCharge.material.opacity = Math.min(0.6, 0.28 + charging * 0.35);
        } else if (gunCharge.visible) { gunCharge.visible = false; }
      }
      // 崩星咆哮炮弹巢小星：自转轨道环 + 脉动；蓄力时转得越来越快、星越来越亮(白热)
      if (roarOrbit) {
        var rcol = charging > 0.88, rcp = rcol ? (charging - 0.88) / 0.12 : 0;   // 塌缩段：环收紧、星缩亮
        var spin = 1 + charging * 9 + rcp * 22, tt = now();
        roarOrbit.r1.rotation.z += dt * spin * 1.6; roarOrbit.r1.rotation.x = 1.2 + Math.sin(tt*0.002)*0.3;
        roarOrbit.r2.rotation.z -= dt * spin * 2.1; roarOrbit.r2.rotation.y = 1.0 + Math.cos(tt*0.0023)*0.3;
        var rs = 1 - rcp * 0.75; roarOrbit.r1.scale.setScalar(rs); roarOrbit.r2.scale.setScalar(rs);
        var puls = (1 + 0.18*Math.sin(tt*(0.01 + charging*0.05)) + charging*0.6) * (1 - rcp*0.55);
        roarOrbit.star.scale.setScalar(Math.max(0.25, puls));
        roarOrbit.star.material.emissiveIntensity = 1.6 + charging * 3.5 + rcp * 4;   // 蓄力白热、塌缩更亮
      }

      // 枪口闪光到时收起
      if (gunMuzzle && gunMuzzle.visible && now() >= muzzleHideAt) gunMuzzle.visible = false;
    }

    function animate() {
      requestAnimationFrame(animate);
      var dt = Math.min(clock ? clock.getDelta() : 0.016, 0.05);

      // 各种衰减（先衰减，本帧瞄准用衰减后的值）
      viewRecoil *= Math.exp(-dt * 12);
      gunKick    *= Math.exp(-dt * 13);
      gunSwayX   *= Math.exp(-dt * 9);
      gunSwayY   *= Math.exp(-dt * 9);
      shake      *= Math.exp(-dt * 6);     // 视角地震衰减

      if (joined) {
        // 死亡重生计时
        if (!me.alive && now() >= deadUntil) respawn();

        // 开镜（ADS）插值：缩放视野；狙击显示瞄准镜并隐藏准星，其它武器保留准星
        var aw = activeWeapon(), scopedW = !!aw.scoped;
        var adsTarget = (ads && me.alive && !paused) ? 1 : 0;
        adsAmt += (adsTarget - adsAmt) * Math.min(1, dt * 12);
        if (adsAmt < 0.001) adsAmt = 0;
        var wantFov = BASE_FOV * (1 + (aw.zoom - 1) * adsAmt);
        if (Math.abs(camera.fov - wantFov) > 0.02) { camera.fov = wantFov; camera.updateProjectionMatrix(); }
        document.getElementById('scope').style.opacity = (scopedW ? adsAmt : 0).toFixed(2);
        document.getElementById('crosshair').style.opacity = (scopedW ? (1 - adsAmt) : 1).toFixed(2);

        var tumbling = now() < tumbleUntil;   // 被巨浪卷起翻滚中：无法行动
        var slamming = now() < slamUntil;     // 青龙刀挥砍中：无法行动
        var chargingMove = now() < chargeUntil;  // 炮武器充能中：原地不能移动
        aimCamera();                       // 先用最新视角摆正相机
        if (!paused && !tumbling && !slamming && !chargingMove) {
          updateMovement(dt);
          aimCamera();                     // 移动后同步相机位置
          checkSuperPickup();              // 走到超级武器上就捡起
          if (firing && activeWeapon().auto) tryFire();  // 自动武器持续开火
          // 脚步声（按步伐节奏）
          if (isMoving && grounded && now() - lastStepAt > (sprinting ? 270 : 380)) { lastStepAt = now(); footstepSound(); }
        } else { isMoving = false; }
        // 青龙刀：突进=又快又高的腾空前冲；劈下=从最高点砸回地面；触地瞬间结算
        if (slamming && me.alive) {
          var sp2 = now() - slamStart;
          if (sp2 >= BLADE_RISE && sp2 < BLADE_RISE + BLADE_LUNGE) {       // 突进腾空
            camera.getWorldDirection(_bf); _bf.y = 0; if (_bf.lengthSq()>1e-6) _bf.normalize();
            var lx = playerPos.x + _bf.x * BLADE_LUNGE_SPD * dt, lz = playerPos.z + _bf.z * BLADE_LUNGE_SPD * dt;
            if (!collides(lx, playerPos.z)) playerPos.x = lx;
            if (!collides(playerPos.x, lz)) playerPos.z = lz;
            var lp = (sp2 - BLADE_RISE) / BLADE_LUNGE;
            playerPos.y = EYE + BLADE_LUNGE_UP * Math.sin(lp * Math.PI * 0.5);   // 升到最高点
            aimCamera();
          } else if (sp2 >= BLADE_RISE + BLADE_LUNGE) {                    // 劈下砸地
            var sf2 = Math.min(1, (sp2 - BLADE_RISE - BLADE_LUNGE) / BLADE_SLAM);
            playerPos.y = EYE + BLADE_LUNGE_UP * (1 - sf2) * (1 - sf2);
            aimCamera();
          }
          if (sp2 >= BLADE_RISE && !reduced) {   // 突进→劈下：视角前方留劈砍光弧
            var tcol = burstSlam ? SUPERS.godmecha.col : SUPERS.blade.col;
            spawnSlashTrail(tcol); if (Math.random() < 0.6) spawnSlashTrail(tcol);
          }
        }
        if (!slamImpactDone && now() >= slamImpactAt) doBladeImpact();
        // 翻滚结束 → 处死
        if (tumbleUntil && now() >= tumbleUntil) {
          var tk = tumbleKiller; tumbleUntil = 0; tumbleKiller = null;
          if (me.alive) die(tk, 'super_tsunami', false);
        }
        // 残血心跳
        if (me.alive && me.hp < 30 && now() - lastHeartAt > 850) { lastHeartAt = now(); heartbeatSound(); }
        // 秘境兜底：超过 60s 没分出胜负 → 自动结束，避免卡死
        if (inRealm && now() - realmEnteredAt > 60000) exitRealm(false);

        // 换弹完成（超级武器没有换弹）
        if (reloadUntil && now() >= reloadUntil) {
          ammo[weaponIndex] = WEAPONS[weaponIndex].mag; reloadUntil = 0; updateAmmoHud();
        }
        document.getElementById('reloading').textContent = (now() < reloadUntil) ? '换弹中…' : '';

        updateRegen(dt);                   // 受伤 8 秒后开始回血
        if (scoreDirty && now() - lastScoreRender > 250) renderScoreboard();  // 计分板节流重建
        updateViewBobAndGun(dt);           // 走路头部摆动 + 武器摇晃/后坐/换弹/开镜动画

        // 超级武器拾取物：旋转 + 上下浮动（可多个，错相浮动）
        for (var _s in superPickups) {
          var _pm = superPickups[_s];
          _pm.rotation.y += dt * 1.6;
          if (_pm.userData.core) _pm.userData.core.rotation.x += dt * 1.2;
          _pm.position.y = (_pm.userData.baseY || 1.3) + (reduced ? 0 : Math.sin(now()*0.003 + (_pm.userData.sid||0)) * 0.18);
        }

        // 被巨浪卷起：疯狂翻滚的镜头（覆盖正常相机姿态）
        if (tumbling && me.alive) {
          var tp = now() - tumbleStart;
          camera.position.y = playerPos.y + Math.sin(Math.min(1, tp/900) * Math.PI) * 1.6;
          camera.rotation.z = tp * 0.018;
          camera.rotation.x = pitch + Math.sin(tp * 0.03) * 0.7;
        }

        // 青龙偃月刀：挑起 → 突进 → 劈下（覆盖武器/相机姿态）
        if (slamming && viewGun) {
          var sp3 = now() - slamStart, rx3, fwd3 = 0;
          if (sp3 < BLADE_RISE) { rx3 = -1.5 * (sp3 / BLADE_RISE); }                       // 挑起
          else if (sp3 < BLADE_RISE + BLADE_LUNGE) { rx3 = -1.5; fwd3 = 0.12; }            // 突进保持高举
          else { var sf = Math.min(1, (sp3 - BLADE_RISE - BLADE_LUNGE) / BLADE_SLAM); rx3 = -1.5 + 3.4 * sf; }  // 猛劈
          viewGun.position.set(GUN_BASE.x * 0.35, GUN_BASE.y + 0.12, GUN_BASE.z - fwd3);
          viewGun.rotation.set(rx3, 0, 0);
          if (sp3 > BLADE_RISE + BLADE_LUNGE) camera.rotation.x = pitch + ((sp3 - BLADE_RISE - BLADE_LUNGE) / BLADE_SLAM) * 0.32;  // 劈下镜头压低
        }
        // 视角地震（shake：被青龙刀/咆哮炮等触发）
        if (shake > 0.001 && !reduced) {
          camera.rotation.z += (Math.random() - 0.5) * shake;
          camera.position.x += (Math.random() - 0.5) * shake * 2;
          camera.position.y += (Math.random() - 0.5) * shake * 2;
        }
      } else {
        // 菜单背景：缓慢环绕竞技场（reduced-motion 时静止）
        var ang = reduced ? 0.7 : (now() * 0.00008);
        camera.position.set(Math.cos(ang)*34, 16, Math.sin(ang)*34);
        camera.lookAt(0, 2, 0);
      }

      updateRemotes(dt);
      updateFx(dt);
      updateBeams(dt);          // 崩星/秘境 激光轨迹与结算
      updateBlackHoles(dt);     // 黑洞移动 / 吸入 / 处死
      updateTsunamis(dt);       // 排山倒海巨浪推进 / 卷入
      updateGrenades(dt);       // 机甲榴弹飞行 / 爆炸
      tickKillfeed();

      renderScene();

      // 引擎已启动标志位（供 headless 自测检测）
      if (!window.__booted) window.__booted = true;
    }

    // ------------------------------------------------------------------ 工具
    function now() { return performance.now(); }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' })[c]; }); }
    function nameOf(id) {
      if (id === me.id) return me.name;
      if (remotes[id]) return remotes[id].name;
      if (scores[id]) return scores[id].name;
      return '某玩家';
    }
    function weaponNameById(wid) {
      for (var i = 0; i < WEAPONS.length; i++) if (WEAPONS[i].id === wid) return WEAPONS[i].name;
      return '武器';
    }

    // ------------------------------------------------------------------ 启动
    function boot() {
      try {
        initThree();
        bindInput();
        wireMenu();
        // 暴露少量调试信息
        window.__game = { THREE:THREE, get remotes() { return remotes; }, me:me, isHostNow:function(){return isHost;} };
        // 自测钩子（仅 ?test=1 时存在）：让 headless 脚本能驱动并断言"单机能跑动能开枪"
        if (TEST) window.__test = {
          joined:function(){ return joined; }, paused:function(){ return paused; }, alive:function(){ return me.alive; },
          hp:function(){ return me.hp; }, ammo:function(){ return ammo[weaponIndex]; }, mag:function(){ return WEAPONS[weaponIndex].mag; },
          widx:function(){ return weaponIndex; }, pos:function(){ return { x:playerPos.x, y:playerPos.y, z:playerPos.z }; },
          fxCount:function(){ return fx.length; },
          setKey:function(c,v){ keys[c] = !!v; }, fire:function(){ tryFire(); }, weapon:function(i){ selectWeapon(i); },
          reloadNow:function(){ startReload(); }, takeHit:function(d){ applyDamage(d, 'tester', 'rifle'); },
          // 联机逻辑：把一条对端消息喂进真实的 handleMessage，验证增删小人 / 命中 / 计分
          myId:function(){ return me.id; }, recv:function(m){ handleMessage(m); },
          remoteCount:function(){ return Object.keys(remotes).length; }, kills:function(){ return me.kills; },
          scoreNames:function(){ return Object.keys(scores).map(function(k){ return scores[k].name; }); },
          // 动画检查：枪械位姿 / 枪口闪光 / 相机高度（验证后坐、换弹动画、走路摆动）
          gunInfo:function(){ return viewGun ? { py:viewGun.position.y, pz:viewGun.position.z,
            rx:viewGun.rotation.x, rz:viewGun.rotation.z, muzzle: gunMuzzle ? gunMuzzle.visible : false } : null; },
          camY:function(){ return camera.position.y; }, reloading:function(){ return now() < reloadUntil; },
          // 开镜 / 爆头 / 超级武器 验证
          setAds:function(v){ ads = !!v; }, fov:function(){ return camera.fov; }, adsAmt:function(){ return adsAmt; },
          scopeOpacity:function(){ var e=document.getElementById('scope'); return e?parseFloat(e.style.opacity||'0'):0; },
          crosshairOpacity:function(){ var e=document.getElementById('crosshair'); return e?parseFloat(e.style.opacity||'1'):1; },
          gunVisible:function(){ return viewGun ? viewGun.visible : null; },
          lastHit:function(){ return lastHitInfo; },
          spawnSuperAt:function(x,z,kind){ superSid++; applySuperSpawn({ sid: superSid, kind:kind||'mg', x:x, y:1.3, z:z }); },
          superInfo:function(){ return { active:superActive, kind:superKind, ammo:superAmmo, onMap: Object.keys(superPickups).length > 0 }; },
          setSuperAmmo:function(n){ superAmmo = n; updateAmmoHud(); }, drop:function(){ dropSuper(); },
          // 回血
          setHp:function(n){ me.hp = n; updateHpHud(); }, maxHp:function(){ return maxHp; },
          damageNow:function(){ lastDamageAt = now(); }, forceRegenReady:function(){ lastDamageAt = now() - REGEN_DELAY - 50; },
          // 命中上报记录（崩星炮/部位伤害用）
          sentHits:function(){ return lastSentHits.slice(); }, clearSentHits:function(){ lastSentHits.length = 0; },
          setPos:function(x,z){ playerPos.set(x, EYE, z); },
          // 黑洞 / 秘境 / 排山倒海 / 复活
          holeCount:function(){ return blackholes.length; }, beamCount:function(){ return beams.length; },
          tsunamiCount:function(){ return tsunamis.length; }, tumbling:function(){ return now() < tumbleUntil; },
          fireRealmAt:function(id){ startRealmDuel(id); }, revive:function(){ deadUntil = now() - 1; },
          realmInfo:function(){ return { inRealm:inRealm, opponent:realmOpponent, hp:me.hp, maxHp:maxHp,
            x:playerPos.x, z:playerPos.z, fireRateMul:fireRateMul }; },
          // 远端小人动画姿态（验证奔跑/跳跃/死亡）
          remotePose:function(id){ var r=remotes[id]; if(!r) return null;
            return { legL:r.legL.rotation.x, armR:r.armR.rotation.x, leanZ:r.group.rotation.z, y:r.group.position.y }; },
          // 测试模式 / 刷新概率 / 仙器
          cheatOn:function(){ return cheatMode; }, nextKind:function(){ return nextSuperKind(); },
          equipSuper:function(k){ cheatMode = true; cheatEquip(k); }, slamming:function(){ return now() < slamUntil; },
          spawnShot:function(){ spawnRemoteShot({ from:'x', col:0xffe6a0, mx:0,my:1.6,mz:0, ex:0,ey:1.6,ez:-40 }); },
          // 地图 / 物理 / 模式
          loadMap:function(id){ buildMap(id); }, mapInfo:function(){ return { map:currentMap, solids:solidBoxes.length, spawns:spawnPoints.length }; },
          setPos3:function(x,y,z){ playerPos.set(x,y,z); vy = 0; }, surfaceAt:function(x,z){ return highestSurfaceAt(x,z); },
          playerY:function(){ return playerPos.y; }, grounded:function(){ return grounded; },
          setMode:function(m){ roomMode = m; }, spawnCount:function(){ return spawnCountThisTick(); },
          join:function(room){ if (!joined) doJoin(room || 'demo'); },
          superKindsOnMap:function(){ var a=[]; for(var s in superPickups) a.push(superPickups[s].userData.kind); return a; },
          wearNow:function(){ if (superActive && SUPERS[superKind] && SUPERS[superKind].isMecha) wearMecha(superKind); },
          mechaInfo:function(){ return { worn:mechaWorn, kind:superKind, maxHp:maxHp, hp:me.hp, weapon:mechaWeapon, grenades:grenades.length }; },
          fireNow:function(){ tryFire(); }, grenadeCount:function(){ return grenades.length; },
          addDummy:function(k){ addDummy(k); }, dummyHp:function(id){ var r=remotes[id]; return r?r.hp:null; }, camY:function(){ return camera.position.y; },
          roarSfx:function(){ return roarSfxN; }
        };
        animate();
      } catch (err) {
        // 真正的启动失败才报红，方便排查；不会污染正常控制台
        if (window.console) console.error('[boot] 引擎启动失败：', err);
        var el = document.getElementById('loaderr');
        el.hidden = false;
        el.innerHTML = '<b>引擎启动失败：</b>' + esc(err && err.message || err) +
          '（可能是浏览器不支持 WebGL）。';
        try { document.getElementById('dotWebgl').className = 'dot no'; } catch (e) {}
      }
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  })();
  </script>
